<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Direction Pop! Trainer</title>
    <!-- Pretendard 폰트 불러오기 (CDN) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-teal: #0d9488;
            --btn-accent: #0f172a;
            --btn-hover: #115e59;
            --accent-pink: #db2777;
            --bg-gray: #f0fdfa;
        }

        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; background-color: var(--bg-gray); margin: 0; padding: 40px 0; color: #333; -webkit-font-smoothing: antialiased;
        }

        .card { 
            background: white; padding: 30px 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(13, 148, 136, 0.08); 
            text-align: center; width: 95%; max-width: 500px; border: 1px solid #ccfbf1; position: relative; 
            display: flex; flex-direction: column; align-items: center;
        }
        
        /* 상단 제어 바 (구석 버튼들) */
        .top-controls {
            display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 15px;
            order: 1;
        }
        .top-controls.active { display: flex; }

        /* 🚀 제목 스타일 */
        h1 { 
            color: var(--btn-accent); font-size: 20px !important; margin: 10px 0 25px 0; 
            font-weight: 900; letter-spacing: -0.05em; line-height: 1.2; order: 2;
        }

        /* 큰 문구 스타일 */
        #korean-task { 
            font-size: 19px; font-weight: 700; margin: 20px 0 15px 0; min-height: 120px; 
            color: #1e293b; line-height: 1.6; word-break: keep-all; display: flex; align-items: center; justify-content: center; 
            padding: 0 10px; letter-spacing: -0.02em; order: 3;
        }

        /* 🚀 시작 버튼 컨테이너: 큰 문구 아래 */
        .start-container { order: 4; margin-bottom: 20px; }
        .lvl-btn { 
            background: var(--primary-teal); color: white; border: none; padding: 12px 32px; 
            border-radius: 50px; font-size: 15px; cursor: pointer; font-weight: 800; transition: all 0.2s; 
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.25);
        }
        /* 구석으로 이동했을 때의 다시 섞기 버튼 스타일 */
        .top-controls .lvl-btn { padding: 6px 14px; font-size: 12px; opacity: 0.9; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); }
        .lvl-btn:active { transform: scale(0.95); }

        /* 자동/수동 토글 버튼 */
        .auto-toggle {
            display: flex; align-items: center; gap: 5px; background: #e6fffa; padding: 4px; border-radius: 12px;
        }
        .toggle-btn {
            padding: 4px 10px; font-size: 11px; border-radius: 8px; cursor: pointer; font-weight: 700; border: none; color: #115e59;
        }
        .toggle-btn.active { background: var(--btn-accent); color: white; }
        
        /* 🚀 정답창 영역 고정 */
        .answer-container {
            min-height: 90px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; width: 100%; order: 5;
        }

        #english-answer { 
            font-size: 16px; color: #0f172a; width: 100%; padding: 15px; 
            background: #f0fdfa; border-radius: 12px; border: 1px solid #ccfbf1; font-weight: 600; 
            line-height: 1.5; visibility: hidden; opacity: 0; transition: opacity 0.3s ease;
        }
        #english-answer.show { visibility: visible; opacity: 1; }

        #action-area { order: 6; width: 100%; }
        .main-controls { display: flex; justify-content: center; gap: 8px; width: 100%; }
        .ans-btn { background: var(--primary-teal); color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .next-btn { background: var(--btn-accent); color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .back-btn { background: transparent; color: #adb5bd; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; border: 1px dashed #dee2e6; font-size: 13px; margin-top: 15px; width: 100%; }
        
        .hidden { display: none !important; }
        #banner-container { order: 7; }

        #auto-progress {
            width: 0%; height: 4px; background: var(--accent-pink); position: absolute; top: 0; left: 0; border-radius: 24px 24px 0 0; transition: width 0.1s linear;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="auto-progress"></div>
    <div id="top-controls" class="top-controls">
        <div id="lvl-container-mini"></div>
        <div class="auto-toggle">
            <button id="mode-manual" class="toggle-btn active" onclick="setPlayMode('manual')">수동</button>
            <button id="mode-auto" class="toggle-btn" onclick="setPlayMode('auto')">자동</button>
        </div>
    </div>

    <h1>📍 실전 길 묻기 & 이정표 확인 트레이너</h1>
    <div id="korean-task">낯선 여행지에서도 당당하게 대화하며 목적지까지 완벽하게! 🧭</div>
    
    <div id="start-container" class="start-container">
        <button id="btn-start-main" class="lvl-btn" onclick="startTrainer()">트레이닝 시작</button>
    </div>

    <div class="answer-container">
        <div id="english-answer"></div>
    </div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button id="manual-ans-btn" class="ans-btn" onclick="showAnswer()">정답 확인 👀</button>
            <button id="manual-next-btn" class="next-btn" onclick="generate()">다음 상황 🎲</button>
        </div>
        <button class="back-btn" onclick="goBack()">이전 문장으로 되돌리기 ↩️</button>
    </div>

    <div id="banner-container" class="promo-banner bg-white border border-teal-50 p-3 rounded-[1.5rem] mt-10 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-w-sm mx-auto" 
         onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
        <div id="banner-content" class="banner-inner flex items-center gap-3 text-left">
            <div id="banner-icon" class="w-10 h-10 bg-teal-600 rounded-2xl flex items-center justify-center text-xl shadow-teal-100 shadow-lg text-white font-bold">🔥</div>
            <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center">
                <h3 id="banner-title" class="font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                <p class="text-teal-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
            </div>
        </div>
    </div>
</div>

<script>
    const allClaims = [
        // 1️⃣ 이 근처 명소 추천받기 (10문항)
        { kr: "이 근처에 유명한 베이커리가 있나요?", en: "Is there a famous bakery around here?" },
        { kr: "이 근처에 괜찮은 로컬 맛집이 있나요?", en: "Is there a good local restaurant around here?" },
        { kr: "이 근처에 인기 있는 커피숍이 있나요?", en: "Is there a popular coffee shop around here?" },
        { kr: "이 근처에 예쁜 사진 명소가 있나요?", en: "Is there a nice photo spot around here?" },
        { kr: "이 근처에 핫한 야시장이 있나요?", en: "Is there a trendy night market around here?" },
        { kr: "이 근처에 분위기 좋은 브런치 카페가 있나요?", en: "Is there a cozy brunch spot around here?" },
        { kr: "이 근처에 가볼 만한 벼룩시장이 있나요?", en: "Is there a great flea market around here?" },
        { kr: "이 근처에 전망 좋은 곳이 있나요?", en: "Is there a scenic viewpoint around here?" },
        { kr: "이 근처에 믿을 만한 환전소가 있나요?", en: "Is there a reliable currency exchange around here?" },
        { kr: "이 근처에 24시간 약국이 있나요?", en: "Is there a 24-hour pharmacy around here?" },

        // 2️⃣ 방향 제대로 가고 있는지 확인하기 (15문항)
        { kr: "이 길이 지하철역으로 가는 길인가요?", en: "Is this the right way to the subway station?" },
        { kr: "이 길이 박물관으로 가는 길인가요?", en: "Is this the right way to the museum?" },
        { kr: "이 길이 메인 거리로 가는 길인가요?", en: "Is this the right way to the main street?" },
        { kr: "이 길이 시청으로 가는 길인가요?", en: "Is this the right way to City Hall?" },
        { kr: "이 길이 분수대로 가는 길인가요?", en: "Is this the right way to the fountain?" },
        { kr: "이 길이 쇼핑몰로 가는 길인가요?", en: "Is this the right way to the shopping mall?" },
        { kr: "이 길이 기념품 가게로 가는 길인가요?", en: "Is this the right way to the souvenir shop?" },
        { kr: "이 길이 화장실로 가는 길인가요?", en: "Is this the right way to the restroom?" },
        { kr: "이 길이 관광 안내소로 가는 길인가요?", en: "Is this the right way to the information center?" },
        { kr: "이 길이 미술관으로 가는 길인가요?", en: "Is this the right way to the art gallery?" },
        { kr: "이 길이 중앙 광장으로 가는 길인가요?", en: "Is this the right way to the central square?" },
        { kr: "이 길이 대성당으로 가는 길인가요?", en: "Is this the right way to the cathedral?" },
        { kr: "이 길이 공원 입구로 가는 길인가요?", en: "Is this the right way to the park entrance?" },
        { kr: "이 길이 가장 가까운 ATM으로 가는 길인가요?", en: "Is this the right way to the nearest ATM?" },
        { kr: "이 길이 전망대로 가는 길인가요?", en: "Is this the right way to the observation deck?" },

        // 3️⃣ 예상 소요 시간 및 이동 수단 검증하기 (10문항)
        { kr: "여기서 버스 정류장까지 걸어서 5분 거리인가요?", en: "Is the bus stop a 5-minute walk from here?" },
        { kr: "여기서 기차역까지 버스로 15분 거리인가요?", en: "Is the train station a 15-minute bus ride from here?" },
        { kr: "여기서 박물관까지 지하철로 10분 거리인가요?", en: "Is the museum a 10-minute subway ride from here?" },
        { kr: "여기서 호텔까지 택시로 12분 거리인가요?", en: "Is the hotel a 12-minute taxi ride from here?" },
        { kr: "여기서 공항까지 차로 40분 거리인가요?", en: "Is the airport a 40-minute drive from here?" },
        { kr: "여기서 시내까지 걸어서 20분 거리인가요?", en: "Is downtown a 20-minute walk from here?" },
        { kr: "여기서 쇼핑몰까지 버스로 8분 거리인가요?", en: "Is the shopping mall an 8-minute bus ride from here?" },
        { kr: "여기서 중앙 광장까지 지하철로 5분 거리인가요?", en: "Is the central square a 5-minute subway ride from here?" },
        { kr: "여기서 해변까지 택시로 15분 거리인가요?", en: "Is the beach a 15-minute taxi ride from here?" },
        { kr: "여기서 시청까지 차로 10분 거리인가요?", en: "Is City Hall a 10-minute drive from here?" }
    ];

    let currentTask = { kr: '', en: '' };
    let history = [];
    let playMode = 'manual';
    let autoTimer = null;

    function startTrainer() {
        document.getElementById('start-container').classList.add('hidden');
        document.getElementById('top-controls').classList.add('active');
        document.getElementById('action-area').classList.remove('hidden');
        const miniContainer = document.getElementById('lvl-container-mini');
        miniContainer.innerHTML = `<button class="lvl-btn" onclick="generate()">다시 섞기 🎲</button>`;
        generate();
    }

    function setPlayMode(mode) {
        playMode = mode;
        document.getElementById('mode-manual').className = `toggle-btn ${mode === 'manual' ? 'active' : ''}`;
        document.getElementById('mode-auto').className = `toggle-btn ${mode === 'auto' ? 'active' : ''}`;
        const isAuto = (mode === 'auto');
        document.getElementById('manual-ans-btn').disabled = isAuto;
        document.getElementById('manual-next-btn').disabled = isAuto;
        document.getElementById('manual-ans-btn').style.opacity = isAuto ? "0.5" : "1";
        document.getElementById('manual-next-btn').style.opacity = isAuto ? "0.5" : "1";
        if (isAuto) generate();
        else { clearTimeout(autoTimer); updateProgressBar(0, 0); }
    }

    function generate() {
        clearTimeout(autoTimer);
        if (currentTask.kr) history.push({...currentTask});
        if (history.length > 50) history.shift();

        const randomIndex = Math.floor(Math.random() * allClaims.length);
        currentTask = allClaims[randomIndex];
        updateDisplay();
        if (playMode === 'auto') runAutoCycle();
    }

    function runAutoCycle() {
        updateProgressBar(100, 5000);
        autoTimer = setTimeout(() => {
            showAnswer();
            updateProgressBar(100, 3000);
            autoTimer = setTimeout(() => { generate(); }, 3000);
        }, 5000);
    }

    function updateProgressBar(width, duration) {
        const bar = document.getElementById('auto-progress');
        bar.style.transition = 'none'; bar.style.width = '0%';
        if(duration > 0) {
            setTimeout(() => {
                bar.style.transition = `width ${duration}ms linear`;
                bar.style.width = '100%';
            }, 10);
        }
    }

    function goBack() {
        if (history.length === 0) return;
        if (playMode === 'auto') setPlayMode('manual');
        currentTask = history.pop();
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('korean-task').innerText = currentTask.kr;
        const ans = document.getElementById('english-answer');
        ans.classList.remove('show');
        ans.innerText = currentTask.en;
    }

    function showAnswer() { document.getElementById('english-answer').classList.add('show'); }

    setInterval(() => {
        const bannerMsgs = [{ icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" }, { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }];
        const currentBannerIdx = Math.floor(Date.now() / 4000) % bannerMsgs.length;
        const bIcon = document.getElementById('banner-icon');
        const bTitle = document.getElementById('banner-title');
        if(bIcon && bTitle) {
            bIcon.innerText = bannerMsgs[currentBannerIdx].icon;
            bTitle.innerText = bannerMsgs[currentBannerIdx].text;
        }
    }, 4000);
</script>

</body>
</html>
