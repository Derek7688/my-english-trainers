<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In-flight Service Trainer v5.1</title>
    <!-- Pretendard 폰트 불러오기 (CDN) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 폰트 적용 및 기본 스타일 최적화 */
        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            background-color: #f0f7ff; 
            margin: 0; 
            padding: 40px 0; 
            color: #333; 
            -webkit-font-smoothing: antialiased;
        }

        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); text-align: center; width: 95%; max-width: 500px; border: 1px solid #dbeafe; position: relative; }
        
        /* 🚀 제목: 폰트 교체와 자간 조절로 세련된 느낌 강조 */
        h1 { 
            color: #1e40af; 
            font-size: 18px !important; 
            margin-bottom: 15px; 
            font-weight: 800; 
            letter-spacing: -0.04em; 
            line-height: 1.2; 
        }

        .level-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid #eff6ff; padding-bottom: 20px; }
        .lvl-btn { background: #3b82f6; color: white; border: 2px solid transparent; padding: 10px 20px; border-radius: 50px; font-size: 14px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .lvl-btn:active { transform: scale(0.95); }
        
        #korean-task { 
            font-size: 19px; 
            font-weight: 700; 
            margin: 25px 0; 
            min-height: 100px; 
            color: #1e3a8a; 
            line-height: 1.6; 
            word-break: keep-all; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 0 10px;
            letter-spacing: -0.02em;
        }

        #english-answer { font-size: 16px; color: #059669; margin-bottom: 25px; min-height: 60px; display: none; padding: 15px; background: #f0fdf4; border-radius: 12px; border: 1px solid #dcfce7; font-weight: 500; line-height: 1.5; }
        .main-controls { display: flex; justify-content: center; gap: 8px; }
        .ans-btn { background: #3b82f6; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; border:none; font-size: 15px; }
        .next-btn { background: #64748b; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; border:none; font-size: 15px; }
        .back-btn { background: #f1f5f9; color: #475569; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; border:none; font-size: 13px; margin-top: 10px; width: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="card">
    <h1>✈️ 실전 기내 서비스 & 매너 트레이너</h1>

    <div class="level-selector">
        <button id="btn-start" class="lvl-btn" onclick="startTrainer()">트레이닝 시작</button>
    </div>
    
    <div id="korean-task">하늘 위에서도 당당하고 세련되게! 🍽️</div>
    <div id="english-answer"></div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button class="ans-btn" onclick="showAnswer()">정답 확인 👀</button>
            <button class="next-btn" onclick="generate()">다음 상황 🎲</button>
        </div>
        <button class="back-btn" onclick="goBack()">이전 문장으로 ↩️</button>
    </div>

    <!-- PSE 광고 배너 -->
    <div id="banner-container" class="promo-banner bg-white border border-blue-50 p-3 rounded-[1.5rem] mt-8 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-w-sm mx-auto" 
         onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
        <div id="banner-content" class="banner-inner flex items-center gap-3 text-left">
            <div id="banner-icon" class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-blue-200 shadow-lg text-white font-bold">🔥</div>
            <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center">
                <h3 id="banner-title" class="font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
            </div>
        </div>
    </div>
</div>

<script>
    const allClaims = [
        // [패턴 1] Do you have any [물품] available?
        { kr: "혹시 남는 담요 있나요?", en: "Do you have any blankets available?" },
        { kr: "혹시 남는 베개 있나요?", en: "Do you have any extra pillows available?" },
        { kr: "혹시 슬리퍼 제공되나요?", en: "Do you have any slippers available?" },
        { kr: "혹시 남는 안대 있나요?", en: "Do you have any eye masks available?" },
        { kr: "혹시 남는 헤드폰 있나요?", en: "Do you have any headphones available?" },
        { kr: "혹시 남는 귀마개 있나요?", en: "Do you have any earplugs available?" },
        { kr: "혹시 제공되는 간식 있나요?", en: "Do you have any snacks available?" },

        // [패턴 2] I’ll go with [결정한 옵션], please.
        { kr: "전 소고기 요리로 할게요.", en: "I’ll go with the beef, please." },
        { kr: "전 치킨 요리로 할게요.", en: "I’ll go with the chicken, please." },
        { kr: "전 생선 요리로 할게요.", en: "I’ll go with the fish, please." },
        { kr: "전 파스타로 할게요.", en: "I’ll go with the pasta, please." },
        { kr: "전 레드 와인으로 할게요.", en: "I’ll go with the red wine, please." },
        { kr: "전 화이트 와인으로 할게요.", en: "I’ll go with the white wine, please." },
        { kr: "전 맥주로 할게요.", en: "I’ll go with a beer, please." },
        { kr: "전 콜라로 할게요.", en: "I’ll go with a Coke, please." },
        { kr: "전 사이다로 할게요.", en: "I’ll go with a Sprite, please." },
        { kr: "전 채식 요리로 할게요.", en: "I’ll go with the vegetarian option, please." },
        { kr: "전 오렌지 주스로 할게요.", en: "I’ll go with orange juice, please." },

        // [패턴 3] Do you mind if [주어 동사]?
        { kr: "의자를 뒤로 좀 젖혀도 될까요?", en: "Do you mind if I recline my seat?" },
        { kr: "의자를 좀 똑바로 세워주실 수 있을까요?", en: "Do you mind if you put your seat up?" },
        { kr: "의자를 좀 앞쪽으로 당겨주실 수 있을까요?", en: "Do you mind if you move your seat forward?" },
        { kr: "제가 좀 지나가도 될까요?", en: "Do you mind if I pass through?" },
        { kr: "창문 덮개를 좀 내려도 될까요?", en: "Do you mind if I lower the window shade?" },
        { kr: "독서등을 좀 켜도 될까요?", en: "Do you mind if I turn on the reading light?" },
        { kr: "저 빈자리로 옮겨도 될까요?", en: "Do you mind if I move to that empty seat?" },
        { kr: "자리를 서로 바꿀 수 있을까요?", en: "Do you mind if we switch seats?" },
        { kr: "창문 덮개를 좀 올려도 될까요?", en: "Do you mind if I open the window shade?" }
    ];

    let currentTask = { kr: '', en: '' };
    let history = [];

    function startTrainer() {
        document.getElementById('btn-start').innerText = "다시 섞기 🎲";
        document.getElementById('action-area').classList.remove('hidden');
        generate();
    }

    function generate() {
        if (currentTask.kr) history.push({...currentTask});
        if (history.length > 50) history.shift();

        const randomIndex = Math.floor(Math.random() * allClaims.length);
        currentTask = allClaims[randomIndex];
        updateDisplay();
    }

    function goBack() {
        if (history.length === 0) return;
        currentTask = history.pop();
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('korean-task').innerText = currentTask.kr;
        document.getElementById('english-answer').style.display = 'none';
        document.getElementById('english-answer').innerText = currentTask.en;
    }

    function showAnswer() {
        document.getElementById('english-answer').style.display = 'block';
    }

    const bannerMsgs = [
        { icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" },
        { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }
    ];
    let currentBannerIdx = 0;
    function rotateBanner() {
        currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
        const msg = bannerMsgs[currentBannerIdx];
        const inner = document.getElementById('banner-content');
        if(!inner) return;
        inner.style.opacity = 0;
        setTimeout(() => {
            document.getElementById('banner-icon').innerText = msg.icon;
            document.getElementById('banner-title').innerText = msg.text;
            inner.style.opacity = 1;
        }, 500);
    }
    setInterval(rotateBanner, 4000);
</script>

</body>
</html>
