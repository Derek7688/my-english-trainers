<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transportation Trainer v7.0</title>
    <!-- Pretendard 폰트 불러오기 (CDN) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 폰트 적용 및 기본 스타일 최적화 */
        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            background-color: #fffbeb; 
            margin: 0; 
            padding: 40px 0; 
            color: #333; 
            -webkit-font-smoothing: antialiased;
        }

        .card { 
            background: white; 
            padding: 30px 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            text-align: center; 
            width: 95%; 
            max-width: 500px; 
            border: 1px solid #fef3c7; 
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 🚀 제목 스타일: 더 굵게 강조 및 순서 조정 */
        h1 { 
            color: #92400e; 
            font-size: 20px !important; 
            margin: 10px 0 25px 0; 
            font-weight: 900; 
            letter-spacing: -0.05em; 
            line-height: 1.2; 
            order: 2; /* 버튼 다음으로 배치 */
        }

        /* 🚀 시작/다시섞기 버튼 컨테이너: 상단 독립 공간 확보 */
        .level-selector { 
            display: inline-flex; 
            justify-content: center; 
            margin-bottom: 10px;
            order: 1; /* 최상단 배치 */
        }

        /* PC와 모바일 모두 동일하게 최상단 독립 공간을 쓰도록 static 설정 */
        @media (min-width: 640px) {
            .level-selector {
                position: static; 
                margin-top: 5px;
            }
        }
        
        .lvl-btn { 
            background: #d97706; 
            color: white; 
            border: none; 
            padding: 6px 16px; 
            border-radius: 50px; 
            font-size: 13px; 
            cursor: pointer; 
            font-weight: 800; 
            transition: all 0.2s; 
            box-shadow: 0 2px 8px rgba(217, 119, 6, 0.2);
        }
        .lvl-btn:active { transform: scale(0.95); }
        
        #korean-task { 
            font-size: 19px; 
            font-weight: 700; 
            margin: 20px 0 15px 0; 
            min-height: 100px; 
            color: #451a03; 
            line-height: 1.6; 
            word-break: keep-all; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 0 10px;
            letter-spacing: -0.02em;
            order: 3;
        }
        
        /* 🚀 정답창 영역 고정: 버튼 출렁임 방지 */
        .answer-container {
            min-height: 90px; 
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            order: 4;
        }

        #english-answer { 
            font-size: 16px; 
            color: #059669; 
            width: 100%;
            padding: 15px; 
            background: #ecfdf5; 
            border-radius: 12px; 
            border: 1px solid #a7f3d0; 
            font-weight: 600; 
            line-height: 1.5; 
            visibility: hidden; 
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        #english-answer.show {
            visibility: visible;
            opacity: 1;
        }

        #action-area { order: 5; width: 100%; }
        .main-controls { display: flex; justify-content: center; gap: 8px; }
        .ans-btn { background: #d97706; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .next-btn { background: #78350f; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .back-btn { background: transparent; color: #92400e; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; border: 1px dashed #fef3c7; font-size: 13px; margin-top: 15px; width: 100%; }
        
        .hidden { display: none !important; }
        #banner-container { order: 6; }
    </style>
</head>
<body>

<div class="card">
    <div class="level-selector">
        <button id="btn-start" class="lvl-btn" onclick="startTrainer()">트레이닝 시작</button>
    </div>

    <h1>🚕 실전 도심 진입 교통 트레이너</h1>
    
    <div id="korean-task">교통수단 이용, 당황하지 말고 정중하게! 🚌</div>
    
    <div class="answer-container">
        <div id="english-answer"></div>
    </div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button class="ans-btn" onclick="showAnswer()">정답 확인 👀</button>
            <button class="next-btn" onclick="generate()">다음 상황 🎲</button>
        </div>
        <button class="back-btn" onclick="goBack()">이전 문장으로 되돌리기 ↩️</button>
    </div>

    <!-- PSE 광고 배너 -->
    <div id="banner-container" class="promo-banner bg-white border border-blue-50 p-3 rounded-[1.5rem] mt-10 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-sm mx-auto" 
         onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
        <div id="banner-content" class="banner-inner flex items-center gap-3 text-left">
            <div id="banner-icon" class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-blue-200 shadow-lg text-white font-bold">🔥</div>
            <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center">
                <h3 id="banner-title" class="font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
            </div>
        </div>
    </div>
</div>

<script>
    const allClaims = [
        { kr: "이 버스, 시내로 가나요?", en: "Does this bus go to downtown?" },
        { kr: "이 기차, 중앙역으로 가나요?", en: "Does this train go to Central station?" },
        { kr: "이 셔틀, 공항으로 가나요?", en: "Does this shuttle go to the airport?" },
        { kr: "이 버스, 쇼핑몰로 가나요?", en: "Does this bus go to the shopping mall?" },
        { kr: "이 기차, 박물관으로 가나요?", en: "Does this train go to the museum?" },
        { kr: "이 셔틀, 페리 터미널로 가나요?", en: "Does this shuttle go to the ferry terminal?" },
        { kr: "이 버스, 해변으로 가나요?", en: "Does this bus go to the beach?" },
        { kr: "이 셔틀, 지하철역으로 가나요?", en: "Does this shuttle go to the subway station?" },
        { kr: "이 기차, 경기장으로 가나요?", en: "Does this train go to the stadium?" },
        { kr: "이 버스, 도서관으로 가나요?", en: "Does this bus go to the library?" },
        { kr: "힐튼 호텔까지 얼마인가요?", en: "How much to the Hilton?" },
        { kr: "타임스퀘어까지 얼마에요?", en: "How much to Times Square?" },
        { kr: "이 주소까지 얼마인가요?", en: "How much to this address?" },
        { kr: "시내 중심가까지 얼마인가요?", en: "How much to the city center?" },
        { kr: "구시가지까지 얼마인가요?", en: "How much to the old town?" },
        { kr: "항구까지 얼마에요?", en: "How much to the harbor?" },
        { kr: "공원까지 얼마인가요?", en: "How much to the park?" },
        { kr: "시장까지 얼마인가요?", en: "How much to the market?" },
        { kr: "기차역까지 얼마인가요?", en: "How much to the train station?" },
        { kr: "은행까지 얼마에요?", en: "How much to the bank?" },
        { kr: "호텔까지 얼마나 걸리나요?", en: "How long does it take to the hotel?" },
        { kr: "시내까지 얼마나 걸리나요?", en: "How long does it take to downtown?" },
        { kr: "제 목적지까지 얼마나 걸리나요?", en: "How long does it take to my destination?" },
        { kr: "공항 터미널까지 얼마나 걸리나요?", en: "How long does it take to the airport terminal?" },
        { kr: "컨벤션 센터까지 얼마나 걸리나요?", en: "How long does it take to the convention center?" },
        { kr: "극장까지 얼마나 걸리나요?", en: "How long does it take to the theater?" },
        { kr: "병원까지 얼마나 걸리나요?", en: "How long does it take to the hospital?" },
        { kr: "대학교까지 얼마나 걸리나요?", en: "How long does it take to the university?" },
        { kr: "궁전까지 얼마나 걸리나요?", en: "How long does it take to the palace?" },
        { kr: "체육관까지 얼마나 걸리나요?", en: "How long does it take to the gym?" }
    ];

    let currentTask = { kr: '', en: '' };
    let history = [];

    function startTrainer() {
        document.getElementById('btn-start').innerText = "다시 섞기 🎲";
        document.getElementById('action-area').classList.remove('hidden');
        generate();
    }

    function generate() {
        if (currentTask.kr) history.push({...currentTask});
        if (history.length > 50) history.shift();
        const randomIndex = Math.floor(Math.random() * allClaims.length);
        currentTask = allClaims[randomIndex];
        updateDisplay();
    }

    function goBack() {
        if (history.length === 0) return;
        currentTask = history.pop();
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('korean-task').innerText = currentTask.kr;
        const ans = document.getElementById('english-answer');
        ans.classList.remove('show');
        ans.innerText = currentTask.en;
    }

    function showAnswer() {
        document.getElementById('english-answer').classList.add('show');
    }

    const bannerMsgs = [{ icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" }, { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }];
    let currentBannerIdx = 0;
    function rotateBanner() {
        currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
        const msg = bannerMsgs[currentBannerIdx];
        const inner = document.getElementById('banner-content');
        if(!inner) return;
        inner.style.opacity = 0;
        setTimeout(() => {
            document.getElementById('banner-icon').innerText = msg.icon;
            document.getElementById('banner-title').innerText = msg.text;
            inner.style.opacity = 1;
        }, 500);
    }
    setInterval(rotateBanner, 4000);
</script>

</body>
</html>
