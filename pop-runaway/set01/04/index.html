<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cafe Facility Trainer v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; background-color: #fcfaf8; margin: 0; padding: 40px 0; color: #333; }
        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 95%; max-width: 500px; border: 1px solid #e9ecef; position: relative; }
        h1 { color: #5d4037; font-size: 18px !important; margin-bottom: 15px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2; }
        .level-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid #f1f3f5; padding-bottom: 20px; }
        .lvl-btn { background: #795548; color: white; border: 2px solid transparent; padding: 10px 20px; border-radius: 50px; font-size: 14px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .lvl-btn:active { transform: scale(0.95); }
        #korean-task { font-size: 19px; font-weight: 700; margin: 25px 0; min-height: 100px; color: #343a40; line-height: 1.6; word-break: keep-all; display: flex; align-items: center; justify-content: center; padding: 0 10px; }
        #english-answer { font-size: 16px; color: #2f9e44; margin-bottom: 25px; min-height: 60px; display: none; padding: 15px; background: #ebfbee; border-radius: 12px; border: 1px solid #d3f9d8; font-weight: 500; line-height: 1.5; }
        .main-controls { display: flex; justify-content: center; gap: 8px; }
        .ans-btn { background: #795548; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; border:none; font-size: 15px; }
        .next-btn { background: #a1887f; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; border:none; font-size: 15px; }
        .back-btn { background: #f1f3f5; color: #495057; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; border:none; font-size: 13px; margin-top: 10px; width: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="card">
    <h1>☕ 실전 카페 자리 & 편의시설 트레이너</h1>

    <div class="level-selector">
        <button id="btn-start" class="lvl-btn" onclick="startTrainer()">트레이닝 시작</button>
    </div>
    
    <div id="korean-task">자신 있게 자리를 잡고 시설을 이용해 보세요! 🪑</div>
    <div id="english-answer"></div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button class="ans-btn" onclick="showAnswer()">정답 확인 👀</button>
            <button class="next-btn" onclick="generate()">다음 상황 🎲</button>
        </div>
        <button class="back-btn" onclick="goBack()">이전 문장으로 ↩️</button>
    </div>

    <!-- PSE 광고 배너 -->
    <div id="banner-container" class="promo-banner bg-white border border-blue-50 p-3 rounded-[1.5rem] mt-8 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-w-sm mx-auto" 
         onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
        <div id="banner-content" class="banner-inner flex items-center gap-3 text-left">
            <div id="banner-icon" class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-blue-200 shadow-lg text-white font-bold">🔥</div>
            <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center">
                <h3 id="banner-title" class="font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
            </div>
        </div>
    </div>
</div>

<script>
    const allClaims = [
        // [패턴 1] Is 명사 taken?
        { kr: "여기 좌석 자리 있나요?", en: "Is this seat taken?" },
        { kr: "이 테이블 자리 있나요?", en: "Is this table taken?" },
        { kr: "창가 자리 주인 있나요?", en: "Is the window seat taken?" },
        { kr: "구석 자리 주인 있나요?", en: "Is the corner seat taken?" },
        { kr: "부스 석(칸막이 석) 주인 있나요?", en: "Is the booth taken?" },
        { kr: "테라스(야외 테이블) 자리 있나요?", en: "Is the outside table taken?" },
        { kr: "이 소파 자리 있나요?", en: "Is this sofa taken?" },
        { kr: "이 공간 자리 있나요?", en: "Is this space taken?" },

        // [패턴 2] Is it okay if I 동사?
        { kr: "제가 여기에 좀 앉아도 될까요?", en: "Is it okay if I sit here?" },
        { kr: "제가 이 콘센트를 사용해도 될까요?", en: "Is it okay if I use this outlet?" },
        { kr: "테이블을 좀 붙여도 될까요?", en: "Is it okay if I join these tables together?" },
        { kr: "제 노트북 코드를 좀 꽂아도 될까요?", en: "Is it okay if I plug in my laptop?" },
        { kr: "제가 이 의자 좀 가져가도 될까요?", en: "Is it okay if I take this chair?" },
        { kr: "이 스툴(의자)을 좀 옮겨도 될까요?", en: "Is it okay if I move this stool?" },
        { kr: "블라인드를 좀 올려도 될까요?", en: "Is it okay if I raise the blinds?" },
        { kr: "블라인드를 좀 내려도 될까요?", en: "Is it okay if I lower the blinds?" },
        { kr: "잠깐 짐을 여기에 두어도 될까요?", en: "Is it okay if I leave my stuff here for a second?" },
        { kr: "메뉴판을 좀 빌려가도 될까요?", en: "Is it okay if I borrow the menu?" },
        { kr: "제 휴대폰을 충전해도 될까요?", en: "Is it okay if I charge my phone?" },
        { kr: "제가 창문을 열어도 될까요?", en: "Is it okay if I open the window?" },

        // [패턴 3] Where can I find 명사?
        { kr: "혹시 화장실이 어디일까요?", en: "Where can I find the restroom?" },
        { kr: "제품 받는 곳이 어디인가요?", en: "Where can I find the pickup area?" },
        { kr: "셀프바가 어디에 있나요?", en: "Where can I find the condiment station?" },
        { kr: "물 마시는 곳이 어디인가요?", en: "Where can I find the water station?" },
        { kr: "혹시 쓰레기통이 어디에 있나요?", en: "Where can I find the trash can?" },
        { kr: "냅킨이랑 빨대가 어디에 있나요?", en: "Where can I find napkins and straws?" },
        { kr: "와이파이 비밀번호가 어디에 있나요?", en: "Where can I find the Wi-Fi password?" },
        { kr: "혹시 흡연 구역이 어디인가요?", en: "Where can I find the smoking area?" },
        { kr: "메뉴판이 어디에 있나요?", en: "Where can I find the menu?" },
        { kr: "입구가 어디인가요?", en: "Where can I find the entrance?" }
    ];

    let currentTask = { kr: '', en: '' };
    let history = [];

    function startTrainer() {
        document.getElementById('btn-start').innerText = "다시 섞기 🎲";
        document.getElementById('action-area').classList.remove('hidden');
        generate();
    }

    function generate() {
        if (currentTask.kr) history.push({...currentTask});
        if (history.length > 50) history.shift();

        const randomIndex = Math.floor(Math.random() * allClaims.length);
        currentTask = allClaims[randomIndex];
        updateDisplay();
    }

    function goBack() {
        if (history.length === 0) return;
        currentTask = history.pop();
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('korean-task').innerText = currentTask.kr;
        document.getElementById('english-answer').style.display = 'none';
        document.getElementById('english-answer').innerText = currentTask.en;
    }

    function showAnswer() {
        document.getElementById('english-answer').style.display = 'block';
    }

    const bannerMsgs = [
        { icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" },
        { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }
    ];
    let currentBannerIdx = 0;
    function rotateBanner() {
        currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
        const msg = bannerMsgs[currentBannerIdx];
        const inner = document.getElementById('banner-content');
        if(!inner) return;
        inner.style.opacity = 0;
        setTimeout(() => {
            document.getElementById('banner-icon').innerText = msg.icon;
            document.getElementById('banner-title').innerText = msg.text;
            inner.style.opacity = 1;
        }, 500);
    }
    setInterval(rotateBanner, 4000);
</script>

</body>
</html>
