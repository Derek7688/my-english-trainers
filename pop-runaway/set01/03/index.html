<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Payment Trainer v2.0</title>
    <!-- Pretendard 폰트 불러오기 (CDN) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 폰트 적용 및 기본 스타일 최적화 */
        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            background-color: #f8f9fa; 
            margin: 0; 
            padding: 40px 0; 
            color: #333; 
            -webkit-font-smoothing: antialiased;
        }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center; 
            width: 95%; 
            max-width: 500px; 
            border: 1px solid #eee; 
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 🚀 제목: 더 굵게 강조 및 여백 조정 */
        h1 { 
            color: #1a365d; 
            font-size: 20px !important; 
            margin: 10px 0 25px 0; 
            font-weight: 900; 
            letter-spacing: -0.05em; 
            line-height: 1.2; 
            order: 2;
        }

        /* 🚀 시작/다시섞기 버튼 컨테이너: 상단 독립 공간 확보 */
        .level-selector { 
            display: inline-flex; 
            justify-content: center; 
            margin-bottom: 10px;
            order: 1;
        }
        
        .lvl-btn { 
            background: #2b6cb0; 
            color: white; 
            border: none; 
            padding: 6px 16px; 
            border-radius: 50px; 
            font-size: 13px; 
            cursor: pointer; 
            font-weight: 800; 
            transition: all 0.2s; 
            box-shadow: 0 2px 8px rgba(43, 108, 176, 0.2);
        }
        .lvl-btn:active { transform: scale(0.95); }
        
        #korean-task { 
            font-size: 19px; 
            font-weight: 700; 
            margin: 20px 0 15px 0; 
            min-height: 100px; 
            color: #2d3748; 
            line-height: 1.6; 
            word-break: keep-all; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 0 10px;
            letter-spacing: -0.02em;
            order: 3;
        }

        /* 🚀 정답창 영역 고정: 버튼 출렁임 방지 */
        .answer-container {
            min-height: 90px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            order: 4;
        }

        #english-answer { 
            font-size: 16px; 
            color: #27ae60; 
            width: 100%;
            padding: 15px; 
            background: #f0fff4; 
            border-radius: 12px; 
            border: 1px solid #c6f6d5; 
            font-weight: 600; 
            line-height: 1.5; 
            visibility: hidden; 
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #english-answer.show {
            visibility: visible;
            opacity: 1;
        }

        #action-area { order: 5; width: 100%; }
        .main-controls { display: flex; justify-content: center; gap: 8px; }
        .ans-btn { background: #2b6cb0; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .next-btn { background: #4a5568; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .back-btn { background: transparent; color: #adb5bd; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; border: 1px dashed #dee2e6; font-size: 13px; margin-top: 15px; width: 100%; }
        
        .hidden { display: none !important; }
        #banner-container { order: 6; }
    </style>
</head>
<body>

<div class="card">
    <div class="level-selector">
        <button id="btn-start" class="lvl-btn" onclick="startTrainer()">트레이닝 시작</button>
    </div>

    <h1>💳 실전 결제 & 혜택 트레이너</h1>

    <div id="korean-task">계산대 앞에서 당황하지 말고 당당하게! 💸</div>
    
    <div class="answer-container">
        <div id="english-answer"></div>
    </div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button class="ans-btn" onclick="showAnswer()">정답 확인 👀</button>
            <button class="next-btn" onclick="generate()">다음 상황 🎲</button>
        </div>
        <button class="back-btn" onclick="goBack()">이전 문장으로 되돌리기 ↩️</button>
    </div>

    <!-- PSE 광고 배너 -->
    <div id="banner-container" class="promo-banner bg-white border border-blue-50 p-3 rounded-[1.5rem] mt-10 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-w-sm mx-auto" 
         onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
        <div id="banner-content" class="banner-inner flex items-center gap-3 text-left">
            <div id="banner-icon" class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-blue-200 shadow-lg text-white font-bold">🔥</div>
            <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center">
                <h3 id="banner-title" class="font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
            </div>
        </div>
    </div>
</div>

<script>
    const allClaims = [
        { kr: "저희 따로 결제할 수 있을까요?", en: "Could we pay separately?" },
        { kr: "제가 한꺼번에 계산할게요.", en: "Could I pay for everything together?" },
        { kr: "저희 N분의 1 할 수 있을까요?", en: "Could we split the bill?" },
        { kr: "저희 카드 2장으로 나눠서 결제할 수 있을까요?", en: "Could we split it between two cards?" },
        { kr: "제가 애플페이로 결제해도 될까요?", en: "Could I pay with Apple Pay?" },
        { kr: "제가 현금으로 결제해도 될까요?", en: "Could I pay with cash?" },
        { kr: "제가 신용카드로 결제해도 될까요?", en: "Could I pay with a credit card?" },
        { kr: "이거 리필하고 싶어요.", en: "I’d like to get a refill on this, please." },
        { kr: "무료 음료 쿠폰을 쓰고 싶어요.", en: "I’d like to redeem a free drink, please." },
        { kr: "제 포인트 사용하고 싶어요.", en: "I’d like to use my points, please." },
        { kr: "스탬프 적립하고 싶어요.", en: "I’d like to get a stamp, please." },
        { kr: "이 쿠폰 적용하고 싶어요.", en: "I’d like to apply this coupon, please." },
        { kr: "제 카드에 10달러를 충전하고 싶어요.", en: "I’d like to add 10 dollars to my card, please." },
        { kr: "주문하고 싶어요.", en: "I’d like to order, please." },
        { kr: "이거 취소하고 싶어요.", en: "I’d like to cancel this, please." },
        { kr: "제 주문을 변경하고 싶어요.", en: "I’d like to change my order, please." },
        { kr: "제 카드에 20달러를 충전하고 싶어요.", en: "I’d like to add 20 dollars to my card, please." },
        { kr: "혹시 빨대 하나 주실 수 있나요?", en: "May I have a straw, please?" },
        { kr: "혹시 영수증 좀 주실 수 있나요?", en: "May I have a receipt, please?" },
        { kr: "혹시 캐리어 하나 주실 수 있나요?", en: "May I have a carrier, please?" },
        { kr: "혹시 설탕 좀 주실 수 있나요?", en: "May I have some sugar, please?" },
        { kr: "혹시 우유 좀 주실 수 있나요?", en: "May I have some milk, please?" },
        { kr: "혹시 컵 홀더 하나 주실 수 있나요?", en: "May I have a sleeve, please?" },
        { kr: "혹시 물 좀 주실 수 있나요?", en: "May I have water, please?" },
        { kr: "혹시 냅킨 좀 주실 수 있나요?", en: "May I have some napkins, please?" },
        { kr: "혹시 포크 하나 주실 수 있나요?", en: "May I have a fork, please?" },
        { kr: "혹시 숟가락 하나 주실 수 있나요?", en: "May I have a spoon, please?" }
    ];

    let currentTask = { kr: '', en: '' };
    let history = [];

    function startTrainer() {
        document.getElementById('btn-start').innerText = "다시 섞기 🎲";
        document.getElementById('action-area').classList.remove('hidden');
        generate();
    }

    function generate() {
        if (currentTask.kr) history.push({...currentTask});
        if (history.length > 50) history.shift();
        const randomIndex = Math.floor(Math.random() * allClaims.length);
        currentTask = allClaims[randomIndex];
        updateDisplay();
    }

    function goBack() {
        if (history.length === 0) return;
        currentTask = history.pop();
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('korean-task').innerText = currentTask.kr;
        const ans = document.getElementById('english-answer');
        ans.classList.remove('show');
        ans.innerText = currentTask.en;
    }

    function showAnswer() {
        document.getElementById('english-answer').classList.add('show');
    }

    const bannerMsgs = [{ icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" }, { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }];
    let currentBannerIdx = 0;
    function rotateBanner() {
        currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
        const msg = bannerMsgs[currentBannerIdx];
        const inner = document.getElementById('banner-content');
        if(!inner) return;
        inner.style.opacity = 0;
        setTimeout(() => {
            document.getElementById('banner-icon').innerText = msg.icon;
            document.getElementById('banner-title').innerText = msg.text;
            inner.style.opacity = 1;
        }, 500);
    }
    setInterval(rotateBanner, 4000);
</script>

</body>
</html>
