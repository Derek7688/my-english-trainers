<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Cafe Trainer v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pretendard 폰트가 없을 경우 대비하여 기본 폰트 최적화 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; background-color: #f8f9fa; margin: 0; padding: 40px 0; color: #333; }
        
        /* 카드 너비를 PC에서 너무 퍼지지 않게 500px로 제한 */
        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 95%; max-width: 500px; border: 1px solid #eee; position: relative; }
        
        /* 🚀 제목: px 단위를 사용하여 브라우저 설정과 상관없이 크기를 18px로 강제 고정 */
        h1 { 
            color: #4b3621; 
            font-size: 18px !important; 
            margin-bottom: 15px; 
            font-weight: 800; 
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .level-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .lvl-btn { background: #f1f3f5; color: #495057; border: 2px solid transparent; padding: 6px 14px; border-radius: 50px; font-size: 13px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .lvl-btn.active-blue { background: #e3f2fd; color: #1976d2; border-color: #1976d2; }
        .lvl-btn.active-orange { background: #fff3e0; color: #f57c00; border-color: #f57c00; }
        
        /* 문제 문구는 학습을 위해 적절한 크기(20px) 유지 */
        #korean-task { font-size: 20px; font-weight: 700; margin: 25px 0; min-height: 80px; color: #2c3e50; line-height: 1.5; word-break: keep-all; display: flex; align-items: center; justify-content: center; }
        
        #english-answer { font-size: 17px; color: #27ae60; margin-bottom: 25px; min-height: 50px; display: none; padding: 15px; background: #f0fff4; border-radius: 12px; border: 1px solid #c6f6d5; font-weight: 500; }
        
        .main-controls { display: flex; justify-content: center; gap: 8px; }
        .ans-btn { background: #4b3621; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; border:none; font-size: 15px; }
        .next-btn { background: #6f4e37; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; border:none; font-size: 15px; }
        .back-btn { background: #dee2e6; color: #495057; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; border:none; font-size: 13px; margin-top: 10px; width: 100%; }
        
        .hidden { display: none !important; }
        .banner-inner { transition: all 0.5s ease; }
    </style>
</head>
<body>

<div class="card">
    <h1>☕ 실전 카페 주문 트레이너</h1>

    <div class="level-selector">
        <button id="btn-beg" class="lvl-btn" onclick="setMode('beginner')">초급 모드</button>
        <button id="btn-adv" class="lvl-btn" onclick="setMode('advanced')">고급 모드</button>
    </div>
    
    <div id="korean-task">먼저 난이도를 선택해 주세요!</div>
    <div id="english-answer"></div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button class="ans-btn" onclick="showAnswer()">정답 확인 👀</button>
            <button class="next-btn" onclick="generate()">다음 주문 🎲</button>
        </div>
        <button class="back-btn" onclick="goBack()">이전 주문으로 되돌리기 ↩️</button>
    </div>

    <div id="banner-container" class="promo-banner bg-white border border-blue-50 p-3 rounded-[1.5rem] mt-8 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-w-sm mx-auto" 
         onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
        <div id="banner-content" class="banner-inner flex items-center gap-3 text-left">
            <div id="banner-icon" class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-blue-200 shadow-lg text-white font-bold">🔥</div>
            <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center">
                <h3 id="banner-title" class="font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
            </div>
        </div>
    </div>
</div>

<script>
    const data = {
        sizes: { "톨": "a Tall", "그란데": "a Grande", "벤티": "a Venti" },
        temps: { "따뜻한": "Hot", "아이스": "Iced" },
        menus: { "아메리카노": "Americano", "라떼": "Latte", "플랫 화이트": "Flat white", "콜드 브루": "Cold brew", "바닐라 라떼": "Vanilla Latte" },
        milks: { "두유": "soy milk", "오트 우유": "oat milk", "아몬드 우유": "almond milk", "무지방 우유": "non-fat milk", "저지방 우유": "low-fat milk" },
        options: { 
            "샷 추가": "with an extra shot", "샷은 반만": "with only a half-shot", "덜 달게": "half-sweet", 
            "시럽 빼고": "without syrup", "얼음 적게": "with less ice", "얼음 빼고": "without ice", 
            "휘핑 크림 많이": "with extra whipped cream", "아주 뜨겁게": "extra hot", 
            "아이용으로 미지근하게": "at kids' temperature", "캐리어에 담아서": "in a carrier", 
            "테이크아웃": "to go", "홀더와 뚜껑 끼워서": "with a sleeve and a lid", "거품 없이": "with no foam" 
        }
    };

    let currentMode = '';
    let currentTask = { kr: '', en: '' };
    let history = [];

    const bannerMsgs = [
        { icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" },
        { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }
    ];
    let currentBannerIdx = 0;

    function rotateBanner() {
        currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
        const msg = bannerMsgs[currentBannerIdx];
        const inner = document.getElementById('banner-content');
        if(!inner) return;
        
        inner.style.opacity = 0;
        inner.style.transform = "translateY(2px)";
        
        setTimeout(() => {
            document.getElementById('banner-icon').innerText = msg.icon;
            document.getElementById('banner-title').innerText = msg.text;
            inner.style.opacity = 1;
            inner.style.transform = "translateY(0)";
        }, 500);
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('action-area').classList.remove('hidden');
        document.getElementById('btn-beg').className = 'lvl-btn' + (mode === 'beginner' ? ' active-blue' : '');
        document.getElementById('btn-adv').className = 'lvl-btn' + (mode === 'advanced' ? ' active-orange' : '');
        generate();
    }

    function getRandom(obj) {
        const keys = Object.keys(obj);
        const randomKey = keys[Math.floor(Math.random() * keys.length)];
        return { kr: randomKey, en: obj[randomKey] };
    }

    function generate() {
        if (!currentMode) return;
        if (currentTask.kr) history.push({...currentTask});
        if (history.length > 10) history.shift();
        const s = getRandom(data.sizes);
        const t = getRandom(data.temps);
        const m = getRandom(data.menus);
        let krText = "";
        let enText = "";
        if (currentMode === 'beginner') {
            krText = `${s.kr} 사이즈 ${t.kr} ${m.kr} 하나 주세요.`;
            enText = `I'll have ${s.en} ${t.en} ${m.en}, please.`;
        } else {
            if (Math.random() > 0.5) {
                const mk = getRandom(data.milks);
                krText = `${s.kr} ${t.kr} ${m.kr} 하나 주시고요, 우유를 ${mk.kr}로 바꿀 수 있을까요?`;
                enText = `I'll have ${s.en} ${t.en} ${m.en}, and is it possible to change the milk to ${mk.en}?`;
            } else {
                const o = getRandom(data.options);
                krText = `${s.kr} ${t.kr} ${m.kr} 하나 주세요. ${o.kr} 부탁드려요.`;
                enText = `I'll have ${s.en} ${t.en} ${m.en}, and can I get this ${o.en}?`;
            }
        }
        currentTask = { kr: krText, en: enText };
        updateDisplay();
    }

    function goBack() {
        if (history.length === 0) return;
        currentTask = history.pop();
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('korean-task').innerText = currentTask.kr;
        document.getElementById('english-answer').style.display = 'none';
        document.getElementById('english-answer').innerText = currentTask.en;
    }

    function showAnswer() {
        document.getElementById('english-answer').style.display = 'block';
    }

    setInterval(rotateBanner, 4000);
</script>

</body>
</html>
