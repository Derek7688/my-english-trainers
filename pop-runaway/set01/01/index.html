<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Cafe Trainer Pro</title>
    
    <!-- 폰트: Pretendard Variable 적용 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --primary-coffee: #4b3621;
            --accent-orange: #f57c00;
            --accent-blue: #1976d2;
            --bg-gray: #f8f9fa;
        }

        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            background-color: var(--bg-gray); 
            margin: 0; 
            padding: 40px 0; 
            color: #333; 
            -webkit-font-smoothing: antialiased;
        }

        .card { 
            background: white; 
            padding: 35px 25px; 
            border-radius: 28px; 
            box-shadow: 0 15px 35px rgba(75, 54, 33, 0.08); 
            text-align: center; 
            width: 95%; 
            max-width: 480px; 
            border: 1px solid rgba(0,0,0,0.03);
            position: relative; 
        }

        /* 🚀 제목 스타일 */
        h1 { 
            color: var(--primary-coffee); 
            font-size: 24px !important; 
            margin: 10px 0 40px 0; 
            font-weight: 900; 
            letter-spacing: -0.05em; 
            line-height: 1.2;
        }

        /* 🚀 모드 선택 컨테이너: 반응형 레이아웃 */
        .level-selector { 
            display: flex;
            justify-content: flex-end; /* 모바일: 우측 정렬 */
            margin-bottom: 15px;
            background: #f1f3f5;
            padding: 4px;
            border-radius: 12px;
            display: inline-flex; /* 너비를 내용에 맞게 */
        }

        /* PC 환경: 카드 내부 우측 상단 고정 */
        @media (min-width: 640px) {
            .level-selector {
                position: absolute;
                top: 25px;
                right: 25px;
                margin-bottom: 0;
            }
        }

        .lvl-btn { 
            padding: 6px 16px; 
            border-radius: 9px; 
            font-size: 13px; 
            background: transparent; 
            color: #868e96; 
            border: none;
            cursor: pointer; 
            font-weight: 700; 
            transition: all 0.2s ease; 
        }

        .lvl-btn.active-blue { 
            background: white; 
            color: var(--accent-blue); 
            box-shadow: 0 2px 8px rgba(25, 118, 210, 0.12);
        }

        .lvl-btn.active-orange { 
            background: white; 
            color: var(--accent-orange); 
            box-shadow: 0 2px 8px rgba(245, 124, 0, 0.12);
        }

        #korean-task { 
            font-size: 20px; 
            font-weight: 700; 
            margin: 20px 0; 
            min-height: 90px; 
            color: #2c3e50; 
            line-height: 1.55; 
            word-break: keep-all; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            letter-spacing: -0.02em;
        }

        #english-answer { 
            font-size: 17px; 
            color: #2e7d32; 
            margin-bottom: 25px; 
            min-height: 80px; 
            display: flex; 
            align-items: center;
            justify-content: center;
            padding: 18px; 
            background: #f1fbf3; 
            border-radius: 16px; 
            border: 1px solid #c8e6c9; 
            font-weight: 600;
            line-height: 1.5;
            visibility: hidden; 
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #english-answer.show {
            visibility: visible;
            opacity: 1;
        }

        .main-controls { display: flex; justify-content: center; gap: 10px; }
        
        .ans-btn { 
            background: var(--primary-coffee); 
            color: white; 
            flex: 1; 
            padding: 15px; 
            border-radius: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            font-size: 15px;
            transition: transform 0.1s;
        }

        .next-btn { 
            background: #6f4e37; 
            color: white; 
            flex: 1; 
            padding: 15px; 
            border-radius: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            font-size: 15px;
            transition: transform 0.1s;
        }

        .ans-btn:active, .next-btn:active { transform: scale(0.97); }

        .back-btn { 
            background: transparent;
            color: #adb5bd; 
            padding: 12px; 
            border-radius: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            border: 1px dashed #dee2e6; 
            font-size: 13px; 
            margin-top: 15px; 
            width: 100%; 
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="card">
    <!-- 모드 선택 버튼 (반응형 위치 적용) -->
    <div class="level-selector">
        <button id="btn-beg" class="lvl-btn" onclick="setMode('beginner')">초급 모드</button>
        <button id="btn-adv" class="lvl-btn" onclick="setMode('advanced')">고급 모드</button>
    </div>

    <h1>☕ 실전 카페 주문 트레이너</h1>

    <div id="korean-task">원하시는 난이도를 선택해 주세요!</div>
    <div id="english-answer"></div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button class="ans-btn" onclick="showAnswer()">정답 확인 👀</button>
            <button class="next-btn" onclick="generate()">다음 주문 🎲</button>
        </div>
        <button class="back-btn" onclick="goBack()">이전 주문으로 되돌리기 ↩️</button>
    </div>

    <!-- PSE 광고 배너 -->
    <div id="banner-container" class="promo-banner bg-white border border-blue-50 p-3 rounded-[1.5rem] mt-10 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-w-sm mx-auto" 
         onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
        <div id="banner-content" class="banner-inner flex items-center gap-3 text-left">
            <div id="banner-icon" class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-blue-200 shadow-lg text-white font-bold">🔥</div>
            <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center">
                <h3 id="banner-title" class="font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
            </div>
        </div>
    </div>
</div>

<script>
    const data = {
        sizes: { "톨": "a Tall", "그란데": "a Grande", "벤티": "a Venti" },
        temps: { "따뜻한": "Hot", "아이스": "Iced" },
        menus: { "아메리카노": "Americano", "라떼": "Latte", "플랫 화이트": "Flat white", "콜드 브루": "Cold brew", "바닐라 라떼": "Vanilla Latte" },
        milks: { "두유": "soy milk", "오트 우유": "oat milk", "아몬드 우유": "almond milk", "무지방 우유": "non-fat milk", "저지방 우유": "low-fat milk" },
        options: { 
            "샷 추가": "with an extra shot", "샷은 반만": "with only a half-shot", "덜 달게": "half-sweet", 
            "시럽 빼고": "without syrup", "얼음 적게": "with less ice", "얼음 빼고": "without ice", 
            "휘핑 크림 많이": "with extra whipped cream", "아주 뜨겁게": "extra hot", 
            "아이용으로 미지근하게": "at kids' temperature", "캐리어에 담아서": "in a carrier", 
            "테이크아웃": "to go", "홀더와 뚜껑 끼워서": "with a sleeve and a lid", "거품 없이": "with no foam" 
        }
    };

    let currentMode = '';
    let currentTask = { kr: '', en: '' };
    let history = [];

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('action-area').classList.remove('hidden');
        document.getElementById('btn-beg').className = 'lvl-btn' + (mode === 'beginner' ? ' active-blue' : '');
        document.getElementById('btn-adv').className = 'lvl-btn' + (mode === 'advanced' ? ' active-orange' : '');
        generate();
    }

    function getRandom(obj) {
        const keys = Object.keys(obj);
        return { kr: keys[Math.floor(Math.random() * keys.length)], en: obj[keys[Math.floor(Math.random() * keys.length)]] };
    }
    
    // getRandom 버그 수정 (키와 값이 매칭되도록)
    function getRandomFixed(obj) {
        const keys = Object.keys(obj);
        const randomKey = keys[Math.floor(Math.random() * keys.length)];
        return { kr: randomKey, en: obj[randomKey] };
    }

    function generate() {
        if (!currentMode) return;
        if (currentTask.kr) history.push({...currentTask});
        if (history.length > 20) history.shift();

        const s = getRandomFixed(data.sizes);
        const t = getRandomFixed(data.temps);
        const m = getRandomFixed(data.menus);
        let krText = "";
        let enText = "";

        if (currentMode === 'beginner') {
            krText = `${s.kr} 사이즈 ${t.kr} ${m.kr} 하나 주세요.`;
            enText = `I'll have ${s.en} ${t.en} ${m.en}, please.`;
        } else {
            if (Math.random() > 0.5) {
                const mk = getRandomFixed(data.milks);
                krText = `${s.kr} ${t.kr} ${m.kr} 하나 주시고요, 우유를 ${mk.kr}로 바꿀 수 있을까요?`;
                enText = `I'll have ${s.en} ${t.en} ${m.en}, and is it possible to change the milk to ${mk.en}?`;
            } else {
                const o = getRandomFixed(data.options);
                krText = `${s.kr} ${t.kr} ${m.kr} 하나 주세요. ${o.kr} 부탁드려요.`;
                enText = `I'll have ${s.en} ${t.en} ${m.en}, and can I get this ${o.en}?`;
            }
        }
        currentTask = { kr: krText, en: enText };
        updateDisplay();
    }

    function goBack() {
        if (history.length === 0) return;
        currentTask = history.pop();
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('korean-task').innerText = currentTask.kr;
        const ans = document.getElementById('english-answer');
        ans.classList.remove('show');
        ans.innerText = currentTask.en;
    }

    function showAnswer() {
        document.getElementById('english-answer').classList.add('show');
    }

    const bannerMsgs = [
        { icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" },
        { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }
    ];
    let currentBannerIdx = 0;
    function rotateBanner() {
        currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
        const msg = bannerMsgs[currentBannerIdx];
        const content = document.getElementById('banner-content');
        if(!content) return;
        content.style.opacity = 0;
        setTimeout(() => {
            document.getElementById('banner-icon').innerText = msg.icon;
            document.getElementById('banner-title').innerText = msg.text;
            content.style.opacity = 1;
        }, 500);
    }
    setInterval(rotateBanner, 4000);
</script>

</body>
</html>
