<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Cafe Claim Trainer v3.5</title>
    <!-- Pretendard 폰트 불러오기 (CDN) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 폰트 적용 및 기본 스타일 최적화 */
        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            background-color: #f8f9fa; 
            margin: 0; 
            padding: 40px 0; 
            color: #333; 
            -webkit-font-smoothing: antialiased;
        }
        
        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 95%; max-width: 500px; border: 1px solid #eee; position: relative; }
        
        /* 🚀 제목: 프리텐다드 폰트로 훨씬 쫀득하고 세련되게 변경 */
        h1 { 
            color: #4b3621; 
            font-size: 18px !important; 
            margin-bottom: 15px; 
            font-weight: 800; 
            letter-spacing: -0.04em; 
            line-height: 1.2; 
        }

        .level-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .lvl-btn { background: #4b3621; color: white; border: 2px solid transparent; padding: 10px 20px; border-radius: 50px; font-size: 14px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .lvl-btn:active { transform: scale(0.95); }
        
        #korean-task { 
            font-size: 19px; 
            font-weight: 700; 
            margin: 25px 0; 
            min-height: 100px; 
            color: #2c3e50; 
            line-height: 1.6; 
            word-break: keep-all; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 0 10px;
            letter-spacing: -0.02em;
        }
        
        #english-answer { font-size: 16px; color: #27ae60; margin-bottom: 25px; min-height: 60px; display: none; padding: 15px; background: #f0fff4; border-radius: 12px; border: 1px solid #c6f6d5; font-weight: 500; line-height: 1.5; }
        .main-controls { display: flex; justify-content: center; gap: 8px; }
        .ans-btn { background: #4b3621; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; border:none; font-size: 15px; }
        .next-btn { background: #6f4e37; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; border:none; font-size: 15px; }
        .back-btn { background: #dee2e6; color: #495057; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; border:none; font-size: 13px; margin-top: 10px; width: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="card">
    <h1>☕ 실전 카페 클레임 트레이너</h1>

    <div class="level-selector">
        <button id="btn-start" class="lvl-btn" onclick="startTrainer()">트레이닝 시작</button>
    </div>
    
    <div id="korean-task">잘못 나온 음료, 그냥 마실 건가요? 😤</div>
    <div id="english-answer"></div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button class="ans-btn" onclick="showAnswer()">정답 확인 👀</button>
            <button class="next-btn" onclick="generate()">다음 상황 🎲</button>
        </div>
        <button class="back-btn" onclick="goBack()">이전 문장으로 ↩️</button>
    </div>

    <!-- PSE 광고 배너 -->
    <div id="banner-container" class="promo-banner bg-white border border-blue-50 p-3 rounded-[1.5rem] mt-8 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-w-sm mx-auto" 
         onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
        <div id="banner-content" class="banner-inner flex items-center gap-3 text-left">
            <div id="banner-icon" class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-blue-200 shadow-lg text-white font-bold">🔥</div>
            <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center">
                <h3 id="banner-title" class="font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
            </div>
        </div>
    </div>
</div>

<script>
    const allClaims = [
        // [패턴 1] This isn’t what I ordered. Could you [Action]?
        { kr: "제가 주문한 건 이게 아니에요. 제 주문 다시 확인해 줄래요?", en: "This isn’t what I ordered. Could you check my order again?" },
        { kr: "제가 주문한 건 이게 아니에요. 이거 다시 만들어 줄래요?", en: "This isn’t what I ordered. Could you make this again?" },
        { kr: "제가 주문한 건 이게 아니에요. 이거 아이스로 바꿔 줄래요?", en: "This isn’t what I ordered. Could you change this to an iced one?" },
        { kr: "제가 주문한 건 이게 아니에요. 이거 라떼로 바꿔 줄래요?", en: "This isn’t what I ordered. Could you replace this with a latte?" },
        { kr: "제가 주문한 건 이게 아니에요. 이거 아메리카노로 바꿔 줄래요?", en: "This isn’t what I ordered. Could you replace this with an americano?" },
        { kr: "제가 주문한 건 이게 아니에요. 이거 베이글로 바꿔 줄래요?", en: "This isn’t what I ordered. Could you replace this with a bagel?" },

        // [패턴 2] This is supposed to be [State]. Could you [Action]?
        { kr: "이거 아주 뜨거운 거여야 하는데. 데워 줄래요?", en: "This is supposed to be extra hot. Could you heat it up?" },
        { kr: "이거 디카페인이어야 하는데. 다시 한번 확인해 줄래요?", en: "This is supposed to be decaf. Could you double-check it?" },
        { kr: "이거 덜 단 거여야 하는데. 다시 만들어 줄래요?", en: "This is supposed to be less sweet. Could you remake it?" },
        { kr: "이거 아이스여야 하는데. 바꿔 줄래요?", en: "This is supposed to be iced. Could you change it?" },
        { kr: "이거 샷 추가된 거여야 하는데. 샷 좀 추가해 줄래요?", en: "This is supposed to be with an extra shot. Could you add a shot to this?" },
        { kr: "이거 샷 반만 들어간 거여야 하는데. 이것 좀 고쳐 줄래요?", en: "This is supposed to be with only a half-shot. Could you fix it?" },
        { kr: "이거 시럽 없는 거여야 하는데. 다시 만들어 줄래요?", en: "This is supposed to be without syrup. Could you remake it?" },
        { kr: "이거 얼음 없는 거여야 하는데. 이것 좀 고쳐 줄래요?", en: "This is supposed to be without ice. Could you fix it?" },
        { kr: "이거 오트 우유여야 하는데. 다시 만들어 줄래요?", en: "This is supposed to be with oat milk. Could you remake it?" },
        { kr: "이거 두유여야 하는데. 다시 확인해 줄래요?", en: "This is supposed to be with soy milk. Could you double-check it?" },

        // [패턴 3] My order hasn’t come out yet. Could you [Action]?
        { kr: "제 것이 아직 안 나왔어요. 확인 좀 해 줄래요?", en: "My order hasn’t come out yet. Could you check on it for me?" },
        { kr: "제 것이 아직 안 나왔어요. 서둘러 줄래요?", en: "My order hasn’t come out yet. Could you speed it up for me?" },
        { kr: "제 것이 아직 안 나왔어요. 얼마나 더 걸릴지 알려 줄래요?", en: "My order hasn’t come out yet. Could you tell me how much longer it'll take?" },
        { kr: "제 것이 아직 안 나왔어요. 그냥 환불해 줄래요?", en: "My order hasn’t come out yet. Could you just give me a refund?" }
    ];

    let currentTask = { kr: '', en: '' };
    let history = [];

    function startTrainer() {
        document.getElementById('btn-start').innerText = "다시 섞기 🎲";
        document.getElementById('action-area').classList.remove('hidden');
        generate();
    }

    function generate() {
        if (currentTask.kr) history.push({...currentTask});
        if (history.length > 30) history.shift();

        const randomIndex = Math.floor(Math.random() * allClaims.length);
        currentTask = allClaims[randomIndex];
        updateDisplay();
    }

    function goBack() {
        if (history.length === 0) return;
        currentTask = history.pop();
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('korean-task').innerText = currentTask.kr;
        document.getElementById('english-answer').style.display = 'none';
        document.getElementById('english-answer').innerText = currentTask.en;
    }

    function showAnswer() {
        document.getElementById('english-answer').style.display = 'block';
    }

    const bannerMsgs = [
        { icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" },
        { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }
    ];
    let currentBannerIdx = 0;
    function rotateBanner() {
        currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
        const msg = bannerMsgs[currentBannerIdx];
        const inner = document.getElementById('banner-content');
        if(!inner) return;
        inner.style.opacity = 0;
        setTimeout(() => {
            document.getElementById('banner-icon').innerText = msg.icon;
            document.getElementById('banner-title').innerText = msg.text;
            inner.style.opacity = 1;
        }, 500);
    }
    setInterval(rotateBanner, 4000);
</script>

</body>
</html>
