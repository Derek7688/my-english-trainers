<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Love Simulator - Laura Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Galmuri11:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Galmuri11', sans-serif; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { margin: 0; padding: 0; background-color: #2c2c2c; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; }
        #game-container { width: 100%; max-width: 450px; height: 100vh; max-height: 850px; background: linear-gradient(to bottom, #ff9a9e, #fecfef); position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 6px solid #000; }
        .academy-logo-bar { width: 100%; background-color: #ff6b81; color: #fff; text-align: center; padding: 8px 0; font-size: 12px; font-weight: bold; border-bottom: 4px solid #000; letter-spacing: 1px; z-index: 35; }
        #start-screen { position: absolute; top: 31px; left: 0; width: 100%; height: calc(100% - 31px); background: linear-gradient(to bottom, #2c3e50, #0a1520); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; padding: 20px; text-align: center; }
        .brand-title { font-size: 13px; color: #ff6b81; text-shadow: 2px 2px 0px #000; margin-bottom: 12px; border: 2px dashed #ff6b81; padding: 4px 10px; background-color: rgba(0,0,0,0.4); }
        .main-title { font-size: 22px; color: #fff; text-shadow: 3px 3px 0px #ff6b81; margin-bottom: 12px; line-height: 1.4; }
        .pixel-art-display { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; width: 100%; max-width: 280px; height: 90px; }
        .pixel-card { flex: 1; height: 100%; background-color: rgba(0, 0, 0, 0.4); border: 4px double #ff6b81; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .pixel-icon { font-size: 32px; margin-bottom: 4px; }
        .pixel-label { font-size: 11px; color: #ff9a9e; font-weight: bold; }
        .sub-title { font-size: 12.5px; color: #ddd; margin-bottom: 30px; line-height: 1.6; word-break: keep-all; padding: 0 10px; }
        .start-btn { background-color: #ff6b81; color: #fff; border: 4px solid #000; padding: 14px 35px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0px #b33939; }
        .start-btn:active { transform: translateY(4px); box-shadow: none; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background-color: #fff; border-bottom: 6px solid #000; color: #000; z-index: 5; }
        .status-group { display: flex; flex-direction: column; gap: 2px; }
        .status-item { font-size: 12px; font-weight: bold; color: #333; }
        .love-pts { color: #ff4d4d; }
        .progress-text { color: #2f3542; }
        .ingame-reset-btn { background-color: #f1f2f6; color: #333; border: 3px solid #000; padding: 6px 10px; font-size: 11px; font-weight: bold; cursor: pointer; box-shadow: 2px 2px 0px #ced6e0; }
        #view-container { flex: 1; position: relative; display: flex; flex-direction: column; background-color: #fff0f5; }
        #battle-screen { width: 100%; height: 290px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; border-bottom: 2px solid rgba(0,0,0,0.05); flex-shrink: 0; }
        .enemy-status-box { position: absolute; top: 15px; left: 15px; background: #fff; border: 3px solid #000; padding: 6px 12px; border-radius: 4px; color: #000; width: 170px; box-shadow: 3px 3px 0px rgba(0,0,0,0.1); z-index: 10; }
        .enemy-name { font-size: 12px; font-weight: bold; margin-bottom: 2px; color: #ff6b81; }
        .laura-emoji-avatar { font-size: 100px; margin-top: 30px; position: relative; }
        .heart-particle { position: absolute; font-size: 26px; color: #ff4d4d; opacity: 0; z-index: 25; pointer-events: none; animation: floatHeart 1.2s forwards ease-out; }
        @keyframes floatHeart { 0% { transform: translateY(20px) scale(0.5); opacity: 0; } 30% { opacity: 1; } 100% { transform: translateY(-90px) scale(1.3) translateX(15px); opacity: 0; } }
        .bounce { animation: bounceAnim 0.6s infinite alternate; }
        .shake { animation: shakeAnim 0.4s; }
        @keyframes bounceAnim { from { transform: translateY(0); } to { transform: translateY(-6px); } }
        @keyframes shakeAnim { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
        .screen-shake { animation: shakeAnim 0.4s; }
        #bottom-ui { display: flex; flex-direction: column; background-color: #fecfef; border-top: 6px solid #000; z-index: 12; height: calc(100% - 290px); }
        .dialogue-box { padding: 14px 16px; color: #2c3e50; background: rgba(255, 240, 245, 0.88); border-bottom: 4px solid #ffbbc4; font-size: 13.5px; line-height: 1.65; word-break: keep-all; flex: none; min-height: 90px; height: auto; overflow-y: visible; transition: height 0.3s ease; }
        .dialogue-box *, .options-area * { font-family: 'Galmuri11', sans-serif !important; }
        .options-area { padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; background-color: #fecfef; flex: 1; justify-content: center; }
        .option-btn { width: 100%; background-color: #fff; border: 3px solid #000; padding: 10px 14px; font-size: 12px; font-weight: bold; color: #000; text-align: left; cursor: pointer; box-shadow: 2px 2px 0px #ffbbc4; border-radius: 8px; }
        .option-btn:hover { background-color: #fff0f5; border-color: #ff6b81; color: #ff6b81; }
        .option-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #ffbbc4; }
        .system-msg-box { background-color: #ff6b81; color: #fff; border: 2px solid #000; padding: 6px 10px; text-align: center; font-size: 11.5px; margin-bottom: 8px; font-weight: bold; border-radius: 20px; box-shadow: 2px 2px 0 #000; }
        .feedback-explanation-box { font-size: 12.5px; color: #333; line-height: 1.5; }
        .box-title { font-weight: bold; margin-bottom: 4px; display: block; font-size: 13px; }
        .correct-block { border-left: 4px solid #2ecc71; padding-left: 10px; margin-bottom: 6px; color: #1e824c; }
        .wrong-block { border-left: 4px solid #ff4d4d; padding-left: 10px; color: #c0392b; }
        .next-btn { background-color: #ff9f43; color: #000; border: 4px solid #000; border-radius: 12px; padding: 12px 0; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0px 5px 0px #b35d00; width: 100%; text-align: center; display: block; }
        .result-screen { display: none; position: absolute; top: 31px; left: 0; width: 100%; height: calc(100% - 31px); background-color: #111; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; z-index: 50; overflow-y: auto; }
        .result-title { font-size: 18px; color: #ffd700; margin-bottom: 8px; text-shadow: 2px 2px 0px #000; line-height: 1.4; word-break: keep-all; }
        .result-desc { font-size: 12.5px; color: #aaa; line-height: 1.6; margin: 10px 0 20px 0; background-color:#1c1c1c; padding:12px; border: 2px solid #333; word-break: keep-all; }
        .result-score { font-size: 15px; margin-bottom: 25px; font-weight: bold; color: #ff6b81; }
        .summary-container { width: 100%; background: #222; border: 3px solid #444; padding: 10px; text-align: left; margin-bottom: 15px; flex: 1; min-height: 180px; overflow-y: auto; }
        .summary-headline { font-size: 11px; color: #00ffcc; font-weight: bold; margin-bottom: 8px; text-align: center; border-bottom: 2px dashed #444; padding-bottom: 6px; }
        .summary-item { font-size: 11.5px; line-height: 1.5; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #333; }
        .summary-lvl { color: #ffcc00; font-weight: bold; }
        .summary-eng { color: #2ecc71; font-weight: bold; display: block; margin: 2px 0; font-size: 12px; }
        .summary-kor { color: #bbb; }
        .conversion-box { width: 100%; background: rgba(0, 255, 204, 0.05); border: 3px double #00ffcc; padding: 12px 10px; margin-bottom: 12px; border-radius: 8px; }
        .conversion-tag { font-size: 11px; color: #ffcc00; margin-bottom: 6px; font-weight: bold; display: block; }
        .academy-link-btn { display: inline-block; width: 100%; max-width: 320px; background-color: #2ecc71; color: #000; border: 4px solid #000; border-radius: 12px; padding: 14px 10px; font-size: 15px; font-weight: bold; text-decoration: none; box-shadow: 0px 5px 0px #1b7a43; animation: pulseBtn 2s infinite ease-in-out; }
        @keyframes pulseBtn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); box-shadow: 0px 5px 12px rgba(46, 204, 113, 0.3), 0px 5px 0px #1b7a43; } }
        .restart-btn { background-color: #444; color: #ccc; border: 3px solid #000; padding: 8px 20px; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
<div id="game-container">
    <div class="academy-logo-bar">프린서플 어학원 - 영출어람</div>
    <div id="start-screen">
        <div class="brand-title">✨ 영출어람 캠퍼스 스페셜 ✨</div>
        <div class="main-title">🌸 뉘앙스로 설레는<br>캠퍼스 러브 시뮬레이션</div>
        <div class="pixel-art-display">
            <div class="pixel-card"><span class="pixel-icon">🏫</span><span class="pixel-label">CAMPUS</span></div>
            <div class="pixel-card"><span class="pixel-icon">👩🏼</span><span class="pixel-label">LAURA v4.0</span></div>
        </div>
        <div class="sub-title">교환학생 Laura와 대화하며 마음을 사로잡으세요!</div>
        <button class="start-btn" onclick="startGame()">캠퍼스 입장 ▶</button>
    </div>
    <div class="top-bar">
        <div class="status-group">
            <div class="status-item">Laura의 호감도: <span id="love-display" class="love-pts">50</span> / 100</div>
            <div class="status-item">진행 상황: <span id="progress-display" class="progress-text">1 / 10</span></div>
        </div>
        <button class="ingame-reset-btn" onclick="resetGame()">🔄 리셋</button>
    </div>
    <div id="view-container">
        <div id="battle-screen">
            <div class="enemy-status-box">
                <div class="enemy-name">Laura (교환학생)</div>
                <div style="font-size: 11px; color: #555;" id="stage-theme">학생회실에서</div>
            </div>
            <div class="laura-emoji-avatar bounce" id="laura-avatar-box">👩🏼</div>
        </div>
        <div id="bottom-ui">
            <div class="dialogue-box" id="dialogue-text">대화 로딩 중...</div>
            <div class="options-area" id="options-area"></div>
        </div>
    </div>
    <div class="result-screen" id="result-screen-1">
        <div class="result-title" id="result-title"></div>
        <div class="result-desc" id="result-desc"></div>
        <div class="result-score">최종 호감도 점수: <span id="final-love-score">50</span>점</div>
        <button class="next-btn" style="margin-top: 20px" onclick="showMarketingScreen()">다음 복습노트 보기 ▶</button>
    </div>
    <div class="result-screen" id="result-screen-2">
        <div class="summary-container">
            <div class="summary-headline">📝 로라와의 대화 뉘앙스 요약노트</div>
            <div id="result-summary-area"></div>
        </div>
        <div class="conversion-box">
            <span class="conversion-tag">👇 원어민을 사로잡는 뉘앙스 치트키 대공개!</span>
            <a href="https://pse-english.co.kr/Eng-chool" target="_blank" class="academy-link-btn">📢 영출어람 프로그램 안내 ▶</a>
        </div>
        <button class="restart-btn" onclick="resetGame()">처음부터 다시 대화하기</button>
    </div>
</div>
<script>
    const gameData = [
        { level: 1, theme: "🏫 대학교 과방에서 첫 만남", situation: "Laura가 전공 책을 안 가져와서 곤란해하네요.<br>'내 책 같이 볼래?'라며 다정하고 자연스럽게<br>쉐어를 제안해 보세요.", correctText: "Do you want to share?", correctExplain: "'같이 볼래?'를 뜻하는 리얼 일상 표현입니다.<br>상대에게 부담을 주지 않고 친근하게 다가가는<br>완벽한 오프너입니다.", summary: "자연스럽게 물건이나 책을 같이 쓰자고 제안하는<br>일상 대화 치트키", upReact: "🌸 Laura가 수줍게 웃으며 의자를 내 쪽으로 당겨 앉습니다! (+10)", downReact: "💧 Laura가 당황하며 거리를 둡니다. (-10)", options: [{ text: "Do you want to share?", isCorrect: true }, { text: "See my book together.", isCorrect: false, wrongExplain: "[See my book together]를 선택했습니다.<br>이는 '내 책을 같이 노려보자!'라는 식의 투박한 명령조로 들려 Laura가 당황합니다." }, { text: "I have book. You don't have.", isCorrect: false, wrongExplain: "[I have book. You don't have]를 선택했습니다.<br>이는 책이 없는 상대에게 서러움을 유발하는 눈치 없는 말입니다." }] },
        { level: 2, theme: "☕️ 카페 테라스", situation: "Laura가 당신의 옷 스타일을 보며<br>'오늘 코디 너무 예쁘다!'라고 칭찬했습니다.<br>세련되게 고마움을 받아쳐볼까요?", correctText: "I'm glad you like it.", correctExplain: "'네가 마음에 들어하니 기쁘다'며<br>기분 좋게 칭찬을 수용하는 정석 매너 화법입니다.", summary: "상대의 칭찬을 유연하게 인정하며<br>훈훈한 분위기를 이어가는 리액션", upReact: "🌸 Laura가 생긋 웃으며 소매를 만져봅니다.<br>대화에 핑크빛 활기가 도네요! (+10)", downReact: "💧 Laura는 칭찬한 자기가 더 민망해진 듯<br>서둘러 고개를 돌립니다. (-10)", options: [{ text: "No, my clothes are cheap.", isCorrect: false, wrongExplain: "[No, my clothes are cheap]를 선택했습니다.<br>이는 원가를 고백하는 동문서답형 겸손으로 상대의 안목까지 민망하게 합니다." }, { text: "I'm glad you like it.", isCorrect: true }, { text: "Thank you, I am fashion king.", isCorrect: false, wrongExplain: "[Thank you, I am fashion king]을 선택했습니다.<br>이는 과한 자만심으로 비쳐 장난기를 넘어선 부담감을 줍니다." }] },
        { level: 3, theme: "📝 동아리 방", situation: "Laura가 낸 부스 아이디어가 정말 기발하네요!<br>'나 전적으로 네 의견에 동감해!'라고<br>격하게 공감해 봅시다.", correctText: "You're telling me.", correctExplain: "'내 말이 바로 그 말이야!'급으로 격하게<br>공감할 때 쓰는 리얼 구어체입니다.", summary: "상대방의 의견에 영혼을 담아 200% 맞장구칠 때", upReact: "🌸 '역시 우리 잘 통한다니까!'라며 신나서<br>하이파이브를 청해옵니다! (+10)", downReact: "💧 Laura가 멈칫하며 노트를 덮습니다. (-10)", options: [{ text: "You're telling me.", isCorrect: true }, { text: "You are talking to me now.", isCorrect: false, wrongExplain: "[You are talking to me now]를 선택했습니다.<br>이는 '너 지금 나한테 말 걸고 있네'라는 뜻으로, 대화의 본질을 흐리는 소통 단절어입니다." }, { text: "I hear your voice.", isCorrect: false, wrongExplain: "[I hear your voice]를 선택했습니다.<br>이는 감정적 공감이 아닌 단순히 청력을 확인하는 영혼 없는 리액션입니다." }] },
        { level: 4, theme: "🍂 발표회 준비", situation: "기타 튜닝 때문에 안절부절못하는 Laura에게<br>'서두르지 마, 천천히 해'라며 안심시켜 줍시다.", correctText: "Take your time.", correctExplain: "'시간을 넉넉히 가져라'라는 뜻으로,<br>상대방의 긴장을 풀어주는 배려 멘트입니다.", summary: "당황하여 조급해하는 상대방을<br>다정하게 안심시키고 배려하는 화법", upReact: "🌸 Laura가 안도의 미소를 지으며<br>깊은숨을 내쉽니다. (+10)", downReact: "💧 Laura가 더 멘붕에 빠져 손을 떱니다. (-10)", options: [{ text: "Make it fast.", isCorrect: false, wrongExplain: "[Make it fast]를 선택했습니다.<br>이는 상대방을 다급하게 재촉하는 가혹하고 차가운 어조입니다." }, { text: "Take your time.", isCorrect: true }, { text: "Time is running out.", isCorrect: false, wrongExplain: "[Time is running out]을 선택했습니다.<br>이는 상대의 마음을 압박하는 스톱워치형 독촉입니다." }] },
        { level: 5, theme: "🍔 수제버거 맛집", situation: "취향이 소름 돋게 겹칩니다! '우리 진짜 케미가 잘 맞는다!'라고 정답 뉘앙스를 걸어볼까요?", correctText: "It clicks.", correctExplain: "기계 부품이 아귀가 맞물리듯 대화나<br>생각의 합이 척척 맞을 때 쓰는 표현입니다.", summary: "생각이나 코드가 기분 좋게 일치하고<br>케미가 터짐을 표현할 때", upReact: "🌸 Laura가 볼을 붉히며 고개를 세차게 끄덕입니다. (+10)", downReact: "💧 '소리가 난다'는 물리적 직역에<br>Laura가 소스라치게 놀랍니다. (-10)", options: [{ text: "Our sounds are good.", isCorrect: false, wrongExplain: "[Our sounds are good]을 선택했습니다.<br>이는 오디오 장비를 테스트하는 듯한 기묘한 음향학적 분석입니다." }, { text: "We have meeting.", isCorrect: false, wrongExplain: "[We have meeting]을 선택했습니다.<br>이는 낭만적인 대화 분위기를 딱딱한 비즈니스 회의로 바꿉니다." }, { text: "It clicks.", isCorrect: true }] },
        { level: 6, theme: "⛺️ 조별과제 빌런", situation: "잠수 탄 팀원에 분노하는 Laura에게<br>'완전 동감이야!'라며 공감해 주려면?", correctText: "Tell me about it.", correctExplain: "내 억울함과 동조심을 극대화하여<br>표현하는 리얼 현지인 공감 치트키입니다.", summary: "상대방의 분노에 내 영혼을 담아 100% 동조할 때", upReact: "🌸 폭풍 공감을 쏟아내며 두 사람의<br>결속력이 어마어마해집니다. (+10)", downReact: "💧 서러운 서론을 길게 빼기 시작합니다. (-10)", options: [{ text: "Tell me about it.", isCorrect: true }, { text: "Speak all story line.", isCorrect: false, wrongExplain: "[Speak all story line]을 선택했습니다.<br>이는 상황을 시나리오 플롯으로 브리핑하라는 냉혹한 형사 취조 모드입니다." }, { text: "Calm down.", isCorrect: false, wrongExplain: "[Calm down]을 선택했습니다.<br>이는 분노한 사람 마음에 부채질하는 최고의 금지어입니다." }] },
        { level: 7, theme: "📱 카톡 대화", situation: "데이트 제안을 '당연히 가야지!'라고<br>힙하게 수락하려면?", correctText: "I'm down.", correctExplain: "수락의 캐주얼한 끝판왕으로,<br>'나도 낄래, 완전 좋아!'를 힙하게 전합니다.", summary: "상대방이 던진 가벼운 데이트나<br>모임 제안을 흔쾌히 수락할 때", upReact: "🌸 3초 만에 하트 이모티콘이 폭발적으로 옵니다. (+10)", downReact: "💧 컨디션이 나빠 거절하는 줄 알고 걱정합니다. (-10)", options: [{ text: "I am falling down.", isCorrect: false, wrongExplain: "[I am falling down]을 선택했습니다.<br>이는 '추락하는 중'이라는 뜻으로 절망적인 호러 상황을 연출합니다." }, { text: "I'm down.", isCorrect: true }, { text: "I will consider your request.", isCorrect: false, wrongExplain: "[I will consider your request]를 선택했습니다.<br>이는 데이트 제안을 안건서로 접수해 검토하겠다는 오만한 답변입니다." }] },
        { level: 8, theme: "🏫 버스킹", situation: "노래가 너무 좋아 소름 돋았을 때.<br>감탄을 담아 트렌디하게 공유해 봅시다.", correctText: "I got goosebumps.", correctExplain: "피부에 닭살이 돋았다는 은유로,<br>전율이 올 때 쓰는 원어민 표현입니다.", summary: "예술 작품이나 엄청난 충격, 소름 돋는 전율의 감동을<br>실감 나게 표현할 때", upReact: "🌸 Laura가 자기 팔을 보여주며<br>환하게 웃습니다. (+10)", downReact: "💧 '거위 피부병'인 줄 알고 질겁합니다. (-10)", options: [{ text: "My skin is goose design.", isCorrect: false, wrongExplain: "[My skin is goose design]을 선택했습니다.<br>이는 정체불명의 인테리어 패턴을 설명하는 오답입니다." }, { text: "I got goosebumps.", isCorrect: true }, { text: "I am crazy animal.", isCorrect: false, wrongExplain: "[I am crazy animal]을 선택했습니다.<br>이는 본인을 야생 맹수라고 선언하는 위험한 오답입니다." }] },
        { level: 9, theme: "🍗 치맥 타임", situation: "실수로 맥주를 튀겼을 때<br>'아 미안! 내가 완전히 실수했네'라고<br>깔끔하게 사과하려면?", correctText: "My bad.", correctExplain: "일상 실수에서 미안함을 유연하게 인정하며<br>상황을 환기시키는 정석 표현입니다.", summary: "일상의 사소한 실수를 쿨하고 다정하게 인정하며<br>분위기를 반전시키는 사과", upReact: "🌸 Laura가 상냥하게 웃어넘겨 줍니다. 위기 탈출! (+10)", downReact: "💧 표정이 시베리아처럼 식어버립니다. (-10)", options: [{ text: "It is my mistake error.", isCorrect: false, wrongExplain: "[It is my mistake error]를 선택했습니다.<br>이는 컴퓨터 버그를 고백하는 듯한 어색한 기술적 오답입니다." }, { text: "You dress bad.", isCorrect: false, wrongExplain: "[You dress bad]를 선택했습니다.<br>이는 사과 대신 상대의 옷을 탓하는 무례한 적반하장입니다." }, { text: "My bad.", isCorrect: true }] },
        { level: 10, theme: "🌉 한강 다리 위 로맨틱한 고백", situation: "Laura와 단둘이 서 있는 순간!<br>마음을 전해볼까요?", correctText: "You are the one I've been waiting for.", correctExplain: "'내가 찾던 그 사람이야'라는 로맨틱한 고백으로, 그동안의 모든 순간이 너를 위한 것이었음을 전달하는 진심 어린 고백 멘트입니다.", summary: "지금까지 망설였던 마음을 우아하고 로맨틱하게 고백하여 결실을 맺을 때", upReact: "🌸 Laura의 눈동자가 깊게 흔들리더니, 이내 환한 미소와 함께 당신의 손을 따스하게 맞잡습니다. (+10)", downReact: "💧 어색한 침묵이 흐르며 Laura가 거절한다는 눈빛으로 가방을 챙깁니다. (-10)", options: [{ text: "You are the one I've been waiting for.", isCorrect: true }, { text: "I want to date with you.", isCorrect: false, wrongExplain: "[I want to date with you]를 선택했습니다.<br>콩글리쉬 표현으로, 마치 비즈니스 약속을 잡듯 딱딱하게 들립니다." }, { text: "You are my girlfriend now.", isCorrect: false, wrongExplain: "[You are my girlfriend now]를 선택했습니다.<br>상대의 동의도 없이 일방적으로 통보하는 강압적이고 무례한 고백입니다." }] }
    ];

    let currentIdx = 0; let lovePoints = 50; let playedStages = [];
    const dialogueEl = document.getElementById('dialogue-text'), optionsArea = document.getElementById('options-area'), loveDisplay = document.getElementById('love-display'), progressDisplay = document.getElementById('progress-display');

    function startGame() { document.getElementById('start-screen').style.display = 'none'; loadStage(); }
    function loadStage() {
        if (currentIdx >= gameData.length) return endGame();
        const data = gameData[currentIdx];
        document.getElementById('stage-theme').innerText = data.theme; dialogueEl.innerHTML = data.situation; progressDisplay.innerText = `${currentIdx + 1} / ${gameData.length}`; loveDisplay.innerText = lovePoints; optionsArea.innerHTML = '';
        data.options.forEach(opt => { const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = opt.text; btn.onclick = () => handleAnswer(opt); optionsArea.appendChild(btn); });
    }
    function handleAnswer(opt) {
        if (!playedStages.includes(currentIdx)) playedStages.push(currentIdx);
        optionsArea.innerHTML = '';
        if (opt.isCorrect) {
            lovePoints = Math.min(100, lovePoints + 10);
            createHearts();
            dialogueEl.innerHTML = `<div class="system-msg-box">${gameData[currentIdx].upReact}</div><div class="feedback-explanation-box"><div class="correct-block"><span class="box-title">♥ 정답: ${gameData[currentIdx].correctText}</span><p style="margin:0; font-size:12px; color:#1e824c; font-weight:bold;">${gameData[currentIdx].correctExplain}</p></div></div>`;
        } else {
            shakeScreen();
            lovePoints = Math.max(0, lovePoints - 10);
            dialogueEl.innerHTML = `<div class="system-msg-box" style="background-color:#747d8c">${gameData[currentIdx].downReact}</div><div class="feedback-explanation-box"><div class="correct-block" style="color:#747d8c; border-left-color:#747d8c"><span class="box-title">🎯 정답: ${gameData[currentIdx].correctText}</span><p style="margin:0; font-size:12px;">${gameData[currentIdx].correctExplain}</p></div><div class="wrong-block"><span class="box-title">❌ 오답 피드백:</span><p style="margin:0; font-size:12px; font-weight:bold;">${opt.wrongExplain}</p></div></div>`;
        }
        loveDisplay.innerText = lovePoints;
        const btn = document.createElement('button'); btn.className = 'next-btn'; btn.innerText = '다음 대화로 넘어가기 ▶'; btn.onclick = () => { currentIdx++; loadStage(); }; optionsArea.appendChild(btn);
    }
    function createHearts() {
        const box = document.getElementById('laura-avatar-box');
        for (let i = 0; i < 5; i++) {
            const h = document.createElement('div'); h.className = 'heart-particle'; h.innerText = '❤️';
            h.style.left = (Math.random()*40+30) + 'px'; h.style.top = '20px';
            h.style.animationDelay = (i*0.1) + 's'; box.appendChild(h);
            setTimeout(() => h.remove(), 1500);
        }
    }
    function shakeScreen() {
        const container = document.getElementById('game-container');
        container.classList.add('screen-shake');
        setTimeout(() => container.classList.remove('screen-shake'), 400);
    }
    function endGame() {
        document.getElementById('result-screen-1').style.display = 'flex'; document.getElementById('final-love-score').innerText = lovePoints;
        const titleEl = document.getElementById('result-title'), descEl = document.getElementById('result-desc');
        if (lovePoints >= 80) { titleEl.innerText = "❤️ HAPPY ENDING"; titleEl.style.color = "#2ecc71"; descEl.innerHTML = "당신의 센스 넘치는 원어민식 뉘앙스에 완전히 매료된 Laura.<br>노을 지는 한강의 야경을 바라보며 건넨 당신의 고백을<br>수줍게 수락했습니다! 축하합니다, 완벽한 로맨스 성공! 🎉"; }
        else if (lovePoints >= 40) { titleEl.innerText = "😐 NORMAL ENDING"; titleEl.style.color = "#ffd700"; descEl.innerHTML = "대화는 큰 탈 없이 통했지만, 표현의 깊이가 조금 아쉬웠습니다.<br>Laura는 당신을 최고의 '영원한 베스트 프렌드'로 정의했습니다.<br>친구 창가 자리에 안착했네요."; }
        else { titleEl.innerText = "💔 BAD ENDING"; titleEl.style.color = "#ff4d4d"; descEl.innerHTML = "투박한 무맥락 화법 폭탄에 Laura의 마음이 닫혔습니다.<br>학교 복도에서 마주쳐도 눈인사조차 나누지 않는<br>슬픈 남남 사이가 되었네요."; }
        let html = ""; playedStages.forEach(i => html += `<div class="summary-item"><span class="summary-lvl">Stage.${i+1}</span><span class="summary-eng">👉 ${gameData[i].correctText}</span><span class="summary-kor">${gameData[i].summary}</span></div>`);
        document.getElementById('result-summary-area').innerHTML = html;
    }
    function showMarketingScreen() { document.getElementById('result-screen-1').style.display = 'none'; document.getElementById('result-screen-2').style.display = 'flex'; }
    function resetGame() { location.reload(); }
</script>
</body>
</html>
