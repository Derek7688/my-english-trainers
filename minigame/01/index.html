<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Office Survival Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Galmuri11:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Galmuri11', sans-serif;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #2c2c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            background: linear-gradient(to bottom, #2b5c8f, #1c3b5e);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 6px solid #000;
        }
        
        /* 🏷️ 상시 노출 학원 브랜드 로고 바 */
        .academy-logo-bar {
            width: 100%;
            background-color: #111;
            color: #ffcc00;
            text-align: center;
            padding: 8px 0;
            font-size: 12px;
            font-weight: bold;
            border-bottom: 4px solid #000;
            letter-spacing: 1px;
            z-index: 35;
        }

        #start-screen {
            position: absolute;
            top: 31px; left: 0; width: 100%; height: calc(100% - 31px);
            background: linear-gradient(to bottom, #1a2a3a, #0a1520);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            padding: 20px;
            text-align: center;
        }

        .brand-title {
            font-size: 13px;
            color: #00ffcc;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 12px;
            border: 2px dashed #00ffcc;
            padding: 4px 10px;
            background-color: rgba(0,0,0,0.4);
        }

        .main-title {
            font-size: 22px;
            color: #ffcc00;
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .pixel-art-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 280px;
            height: 90px;
        }
        .pixel-card {
            flex: 1;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            border: 4px double #555;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .pixel-icon {
            font-size: 32px;
            margin-bottom: 4px;
        }
        .pixel-label {
            font-size: 11px;
            color: #aaa;
            font-weight: bold;
        }

        .sub-title {
            font-size: 12.5px;
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.6;
            word-break: keep-all;
            padding: 0 10px;
        }
        .start-btn {
            background-color: #2ecc71;
            color: #000;
            border: 4px solid #000;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0px #1e7e44;
        }
        .start-btn:active { transform: translateY(4px); box-shadow: none; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background-color: #f8f8f8;
            border-bottom: 6px solid #000;
            color: #000;
        }
        .status-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .status-item { font-size: 12px; font-weight: bold; }
        .hearts { color: #ff4d4d; letter-spacing: 1px; }
        .gold { color: #b8860b; }
        
        .ingame-reset-btn {
            background-color: #ffcc00;
            color: #000;
            border: 3px solid #000;
            padding: 6px 10px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0px #997a00;
        }
        .ingame-reset-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #997a00; }
        
        .stage-area {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #78a8a0;
            padding: 20px;
            transition: background-color 0.5s ease;
        }
        .enemy-status-box {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #fff;
            border: 4px solid #000;
            padding: 8px 15px;
            border-radius: 4px;
            color: #000;
            width: 200px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }
        .enemy-name { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        .enemy-hp-bar { width: 100%; height: 8px; background-color: #ccc; border: 2px solid #000; }
        .enemy-hp-fill { width: 100%; height: 100%; background-color: #2ecc71; transition: width 0.3s; }
        
        .npc-box { width: 140px; height: 140px; display: flex; justify-content: center; align-items: center; margin-top: 40px; }
        .npc-image { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
        .bounce { animation: bounceAnim 0.6s infinite alternate; }
        .shake { animation: shakeAnim 0.4s; }
        @keyframes bounceAnim { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        @keyframes shakeAnim { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
        
        .screen-shake {
            animation: screenShakeAnim 0.4s ease-in-out;
        }
        @keyframes screenShakeAnim {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-4px, -2px) rotate(-0.5deg); }
            20% { transform: translate(3px, 4px) rotate(0.5deg); }
            30% { transform: translate(-4px, 2px) rotate(-0.5deg); }
            40% { transform: translate(3px, -2px) rotate(0.5deg); }
            50% { transform: translate(-2px, 3px) rotate(-0.5deg); }
            60% { transform: translate(2px, 2px) rotate(0.5deg); }
            70% { transform: translate(-3px, -2px) rotate(-0.5deg); }
            80% { transform: translate(2px, -3px) rotate(0.5deg); }
            90% { transform: translate(-2px, 2px) rotate(-0.5deg); }
        }

        .dialogue-box {
            width: 100%;
            background-color: #fff;
            border-top: 6px solid #000;
            border-bottom: 6px solid #000;
            padding: 18px;
            color: #000;
            min-height: 110px;
            font-size: 14px;
            line-height: 1.6;
            word-break: keep-all;
        }
        .options-area { padding: 15px; display: flex; flex-direction: column; gap: 8px; background-color: #f8f8f8; }
        .option-btn {
            width: 100%;
            background-color: #fff;
            border: 4px solid #000;
            padding: 14px 15px;
            font-size: 13.5px;
            font-weight: bold;
            color: #000;
            text-align: left;
            cursor: pointer;
            box-shadow: 3px 3px 0px #ccc;
        }
        .option-btn:hover { background-color: #e8f4fd; }
        .option-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #ccc; }
        
        .feedback-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 15px;
        }
        .feedback-content { font-size: 22px; font-weight: bold; text-shadow: 2px 2px 0px #000; text-align: center; margin-bottom: 15px; }
        .feedback-explanation { font-size: 13px; color: #ddd; background: rgba(255,255,255,0.08); border: 2px solid #555; padding: 12px; border-radius: 6px; width: 100%; line-height: 1.5; word-break: keep-all; margin-bottom: 20px; max-height: 480px; overflow-y: auto; }
        
        .box-title { color: #ffcc00; font-weight: bold; margin-bottom: 4px; display: block; }
        .correct-block { border-left: 4px solid #2ecc71; padding-left: 8px; margin-bottom: 12px; }
        .wrong-block { border-left: 4px solid #ff4d4d; padding-left: 8px; }

        .next-btn { 
            background-color: #ff9f43; 
            color: #000; 
            border: 4px solid #000; 
            border-radius: 12px;
            padding: 12px 35px; 
            font-size: 15px; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0px 5px 0px #b35d00; 
            transition: all 0.1s ease;
        }
        .next-btn:hover { background-color: #ffaf5e; }
        .next-btn:active { transform: translateY(4px); box-shadow: 0px 1px 0px #b35d00; }

        /* 📉 결과 화면 레이아웃 및 영출어람 마케팅 배너 최적화 */
        .result-screen {
            display: none;
            position: absolute;
            top: 31px; left: 0; width: 100%; height: calc(100% - 31px);
            background-color: #111;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 15px;
            text-align: center;
            z-index: 20;
            overflow-y: auto;
        }
        .result-title { font-size: 17px; color: #ffd700; margin-top: 5px; margin-bottom: 4px; text-shadow: 2px 2px 0px #000; line-height: 1.4; word-break: keep-all; }
        .result-desc { font-size: 11.5px; color: #aaa; line-height: 1.5; margin: 0 5px 12px 5px; word-break: keep-all; background-color:#1c1c1c; padding:8px; border: 2px solid #333; }
        .result-score { font-size: 13px; margin-bottom: 10px; font-weight: bold; }
        
        .summary-container {
            width: 100%;
            background: #222;
            border: 3px solid #444;
            padding: 10px;
            text-align: left;
            margin-bottom: 12px;
            flex: 1;
            min-height: 140px;
            overflow-y: auto;
            border-radius: 4px;
        }
        .summary-headline {
            font-size: 11px;
            color: #00ffcc;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
            border-bottom: 2px dashed #444;
            padding-bottom: 6px;
        }
        .summary-item {
            font-size: 11.5px;
            line-height: 1.5;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
        .summary-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .summary-lvl { color: #ffcc00; font-weight: bold; }
        .summary-eng { color: #2ecc71; font-weight: bold; display: block; margin: 2px 0; font-size: 12px; }
        .summary-kor { color: #bbb; }

        /* 🚀 영출어람 외부 프로그램 전환 유도 구역 구조화 */
        .conversion-box {
            width: 100%;
            background: rgba(0, 255, 204, 0.05);
            border: 3px double #00ffcc;
            padding: 12px 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .conversion-tag {
            font-size: 11px;
            color: #ffcc00;
            margin-bottom: 6px;
            font-weight: bold;
            display: block;
        }
        /* 메인 목적: 초특급 강조 네온그린 링크 버튼 및 펄스 애니메이션 적용 */
        .academy-link-btn {
            display: inline-block;
            width: 100%;
            max-width: 320px;
            background-color: #2ecc71;
            color: #000;
            border: 4px solid #000;
            border-radius: 12px;
            padding: 14px 10px;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0px 5px 0px #1b7a43;
            animation: pulseBtn 2s infinite ease-in-out;
            cursor: pointer;
        }
        .academy-link-btn:active {
            transform: translateY(4px);
            box-shadow: 0px 1px 0px #1b7a43;
        }
        /* 시선 집중을 유도하는 서서히 커졌다 작아지는 서사형 애니메이션 */
        @keyframes pulseBtn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0px 5px 15px rgba(46, 204, 113, 0.4), 0px 5px 0px #1b7a43; }
        }

        /* 서브 버튼: 처음부터 다시 출근 (마케팅 방해 요소를 줄이기 위해 사이즈 축소 및 그레이 색상화) */
        .restart-btn { 
            background-color: #444; 
            color: #ccc; 
            border: 3px solid #000; 
            padding: 8px 20px; 
            font-size: 11px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 2px 2px 0px #222; 
            flex-shrink: 0; 
            margin-bottom: 5px;
            border-radius: 4px;
        }
        .restart-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #222; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="academy-logo-bar">프린서플 어학원 - 영출어람</div>

    <div id="start-screen">
        <div class="brand-title">✨ 영출어람 by 프린서플 어학원 ✨</div>
        <div class="main-title">💼 K-직장생활<br>위기탈출 시뮬레이터</div>
        
        <div class="pixel-art-display">
            <div class="pixel-card">
                <span class="pixel-icon">🏢</span>
                <span class="pixel-label">GLOBAL CO.</span>
            </div>
            <div class="pixel-card">
                <span class="pixel-icon">🧑‍💼</span>
                <span class="pixel-label">LV.1 NEWBIE</span>
            </div>
        </div>

        <div class="sub-title">말 한마디로 평판이 갈리는 글로벌 오피스!<br>원어민 뉘앙스 스킬로 빌런들을 처단하고<br>초고속 승진에 성공하세요.</div>
        <button class="start-btn" onclick="startGame()">배틀 시작 ▶</button>
    </div>

    <div class="top-bar">
        <div class="status-group">
            <div class="status-item">내 평판(HP): <span id="heart-display" class="hearts">❤️❤️❤️</span></div>
            <div class="status-item">EXP: <span id="gold-display" class="gold">0</span></div>
        </div>
        <button class="ingame-reset-btn" onclick="confirmReset()">🔄 리셋</button>
    </div>

    <div class="stage-area" id="stage-view-area">
        <div class="enemy-status-box">
            <div class="enemy-name" id="enemy-name">오피스 챌린저</div>
            <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemy-hp"></div></div>
        </div>
        
        <div class="npc-box bounce" id="npc-box">
            <img src="" class="npc-image" id="npc-img" alt="상대">
        </div>
    </div>

    <div class="dialogue-box" id="dialogue-text">게임 준비 중...</div>
    <div class="options-area" id="options-area"></div>

    <div class="feedback-overlay" id="feedback-overlay">
        <div class="feedback-content" id="feedback-content">결과</div>
        <div class="feedback-explanation" id="feedback-explanation"></div>
        <button class="next-btn" id="next-stage-btn">다음 직급으로 ▶</button>
    </div>

    <div class="result-screen" id="result-screen">
        <div class="result-title" id="result-title">결과 타이틀</div>
        <div class="result-desc" id="result-desc">결과 세부 에피소드 스토리 사유</div>
        <div class="result-score">최종 획득 EXP: <span id="final-gold" style="color:#ffd700;">0</span></div>
        
        <div class="summary-container">
            <div class="summary-headline">📝 이번 출근 비즈니스 뉘앙스 요약노트</div>
            <div id="result-summary-area"></div>
        </div>

        <!-- 🚀 마케팅 핵심 목적 구역: 영출어람 홍보 카드 배너 연동 -->
        <div class="conversion-box">
            <span class="conversion-tag">👇 실전 비즈니스 영어 뉘앙스 마스터 치트키 대공개!</span>
            <a href="https://pse-english.co.kr/Eng-chool" target="_blank" class="academy-link-btn">📢 영출어람 프로그램 안내 ▶</a>
        </div>

        <button class="restart-btn" onclick="resetGame()">처음부터 다시 출근</button>
    </div>
</div>

<script>
    const gameData = [
        { level: 1, enemy: "지각해서 뛰어온 동료", situation: "⏰ 출근 직후 미안해하며 뛰어온 외국인 동료. 팀장님 눈치 보지 않게 '에이 별거 아냐, 쿨하게 신경 쓰지 마!'라며 긴장을 풀어주자.", correctText: "It's not a big deal.", correctExplain: "동료의 미안함에 대해 '큰일 아니니 개의치 말라'고 시원하게 털어버리는 모범적인 쿨 이펙트 문장입니다.", summary: "큰일 아니니 신경 쓰지 말라며 상대의 미안함을 쿨하게 풀어주는 직장 윤활유 표현", options: [{ text: "It's not a big deal.", isCorrect: true }, { text: "Forget my time.", isCorrect: false, wrongExplain: "'내 시간은 잊어라'라는 출처 불명의 영작입니다. 원어민이 들으면 판타지 영화 대사나 호러 장르처럼 들려 당황합니다." }, { text: "You are late.", isCorrect: false, wrongExplain: "이미 쫄아있는 동료의 뚝배기를 사정없이 깨부수는 팩트 폭행입니다. '너 지각이야!'라고 광고해서 팀장님 귀에 꽂아버리는 눈치 제로의 대사입니다." }], seed: "co1" },
        { level: 2, enemy: "점심 메뉴 고르는 사수", situation: "🤔 결정 장애가 와서 메뉴를 못 고르는 사수. 눈치껏 점심 분위기를 띄우며 '선배가 하고 싶은 대로 해요, 다 좋아요!'라고 선택권을 넘기자.", correctText: "It's up to you.", correctExplain: "상대방에게 부담을 주지 않으면서 가장 친근하고 부드럽게 주도권과 결정권을 넘겨주는 직장인 필수 점심 매너 문장입니다.", summary: "부담을 주지 않고 부드럽게 주도권과 결정권을 상대에게 양보하는 매너 멘트", options: [{ text: "Do whatever you want.", isCorrect: false, wrongExplain: "직역하면 네 맘대로 하라는 뜻이지만, 오피스 뉘앙스로는 '너 맘대로 하든가 말든가 나랑 뭔 상관'이라며 대놓고 삐딱하게 짜증을 내는 말투가 됩니다." }, { text: "It's up to you.", isCorrect: true }, { text: "You choose now.", isCorrect: false, wrongExplain: "'너 지금 당장 골라'라는 군대식 압박 명령조입니다. 메뉴판 앞에서 괴로워하는 사수의 숨통을 막히게 만듭니다." }], seed: "co2" },

            setTimeout(() => {
                gameContainer.classList.remove('screen-shake');
            }, 400);

            hearts--;
            updateHearts();
            npcBox.className = "npc-box shake";
            feedbackContent.innerHTML = "🤦‍♂️ 평판이 무참히 깎였습니다!";
            feedbackContent.style.color = "#ff4d4d";

            HTMLTemplate = `
                <div class="correct-block">
                    <span class="box-title">🎯 정답은 이겁니다: ${currentData.correctText}</span>
                    <p style="margin:4px 0 0 0;">${currentData.correctExplain}</p>
                </div>
                <div class="wrong-block">
                    <span class="box-title">💥 내가 고른 오답 (${selectedOption.text})의 실체:</span>
                    <p style="margin:4px 0 0 0; color:#ff9999;">${selectedOption.wrongExplain}</p>
                </div>
            `;
        }

        feedbackExplanation.innerHTML = HTMLTemplate;

        nextStageBtn.onclick = () => {
            feedbackOverlay.style.display = 'none';
            if (hearts <= 0) { endGame(false); } else { currentIdx++; loadStage(); }
        };
    }

    function updateHearts() {
        let heartStr = '';
        for (let i = 0; i < 3; i++) {
            if (i < hearts) heartStr += '❤️';
            else heartStr += '🖤';
        }
        heartDisplay.innerText = heartStr;
    }

    function confirmReset() {
        if (confirm("진행 상황이 초기화됩니다. 처음부터 다시 출근하시겠습니까?")) {
            feedbackOverlay.style.display = 'none';
            resetGame();
        }
    }

    function endGame(isSuccess) {
        feedbackOverlay.style.display = 'none';
        resultScreen.style.display = 'flex';
        finalGoldEl.innerText = gold;
        
        if (isSuccess) {
            resultTitleEl.innerText = "👑 글로벌 오피스 최고경영자(CEO) 등극!";
            resultTitleEl.style.color = "#ffd700";
            resultDescEl.innerText = "축하합니다! 완벽한 원어민식 비즈니스 뉘앙스 감각으로 사내 모든 빌런들을 잠재우고 기업의 정상에 올랐습니다. 당신이 바로 진정한 글로벌 리더입니다.";
        } else {
            resultTitleEl.style.color = "#ff4d4d";
            const failedLevel = currentIdx + 1;

            if (failedLevel >= 1 && failedLevel <= 5) {
                resultTitleEl.innerText = "😢 수습기간 만료! 다음 기회에...";
                resultDescEl.innerText = "원어민 빌런들의 기세에 눌려 첫 달을 버티지 못했습니다. 인사팀에서 \"우리와는 결이 조금 맞지 않는 것 같다\"며 조용히 짐을 싸라고 하네요. 뉘앙스 내공을 더 쌓아서 재도전하세요!";
            } else if (failedLevel >= 6 && failedLevel <= 10) {
                resultTitleEl.innerText = "📑 평판 관리 실패! 자진 사직서 제출";
                resultDescEl.innerText = "일은 손에 익었지만, 툭 던진 직설적인 콩글리시로 인해 사내 사방에 적을 만들었습니다. 동료들의 차가운 시선을 견디지 못하고 결국 이직을 결심하며 사직서를 던집니다.";
            } else if (failedLevel >= 11 && failedLevel <= 15) {
                resultTitleEl.innerText = "🌪️ 만년 과장 낙인! 자발적 희망퇴직";
                resultDescEl.innerText = "본부장님과 해외 바이어 사이에서 아슬아슬한 줄타기를 하다가 뉘앙스 한 끗 차이로 대형 오해를 낳았습니다. 승진 누락의 쓴잔을 마시고, 회사에서 쥐어주는 희망퇴직 위로금을 챙겨 쓸쓸히 야생으로 나갑니다.";
            } else if (failedLevel >= 16 && failedLevel <= 19) {
                resultTitleEl.innerText = "🤝 계약 파기 책임! 고문직으로 좌천";
                resultDescEl.innerText = "임원 자리가 코앞이었는데, 블랙컨슈머와 컨설턴트의 고급 압박 화법에 말려들어 회사의 핵심 계약을 날려버렸습니다. 실무 라인에서 배제되어 창가 쪽 '상임 고문' 자리로 밀려났습니다.";
            } else if (failedLevel === 20) {
                resultTitleEl.innerText = "🛑 유리천장의 벽! 명예로운 퇴임";
                resultDescEl.innerText = "최종 단계인 부사장님의 리스크 트라우마를 캐어하지 못해 아쉽게 CEO 등극에 실패했습니다. 비록 왕좌에는 앉지 못했지만, 그동안의 공로를 인정받아 전 직원의 박수를 받으며 화려한 은퇴식을 치릅니다.";
            }
        }

        let summaryHTML = "";
        const limitCount = Math.max(1, (isSuccess ? gameData.length : currentIdx + 1));
        const finalLoopLimit = Math.min(gameData.length, limitCount);

        for(let i = 0; i < finalLoopLimit; i++) {
            const stage = gameData[i];
            summaryHTML += `
                <div class="summary-item">
                    <span class="summary-lvl">Lv.${stage.level} ${stage.enemy}</span>
                    <span class="summary-eng">👉 ${stage.correctText}</span>
                    <span class="summary-kor">${stage.summary}</span>
                </div>
            `;
        }
        resultSummaryArea.innerHTML = summaryHTML;
    }

    function resetGame() {
        currentIdx = 0; gold = 0; hearts = 3;
        goldDisplay.innerText = gold;
        updateHearts();
        stageViewArea.style.backgroundColor = "#78a8a0";
        resultScreen.style.display = 'none';
        startScreen.style.display = 'flex';
        resultSummaryArea.innerHTML = "";
    }
</script>

</body>
</html>
