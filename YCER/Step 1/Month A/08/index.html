<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>영출어람 Practice: Echo (A-08)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght=400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; touch-action: manipulation; }
        .banner-inner { transition: all 0.5s ease; }
        .card-container { min-height: 420px; display: flex; flex-direction: column; justify-content: center; }
        .match-success { color: #2563eb !important; font-weight: 900; }
        .report-scroll::-webkit-scrollbar { width: 6px; }
        .report-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .report-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-start p-4">

    <template id="banner-template">
        <div class="promo-banner bg-white border border-blue-50 p-3 sm:p-4 rounded-2xl mb-6 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-w-sm mx-auto" 
             onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
            <div class="banner-inner flex items-center gap-3">
                <div class="banner-icon w-9 h-9 sm:w-10 sm:h-10 bg-blue-600 rounded-xl flex items-center justify-center text-lg shadow-blue-200 shadow-lg text-white font-bold flex-shrink-0">🔥</div>
                <div class="flex-1 overflow-hidden flex flex-col justify-center text-left min-w-0">
                    <h3 class="banner-title font-black text-slate-800 text-[12px] sm:text-[14px] tracking-tight leading-tight whitespace-nowrap overflow-hidden text-ellipsis">하루 1분 투자! 실전 패턴 Pop!</h3>
                    <p class="text-blue-600 font-bold text-[8px] sm:text-[9px] uppercase tracking-widest mt-0.5 whitespace-nowrap">수강 신청하고 영어 실력 Pop! →</p>
                </div>
            </div>
        </div>
    </template>

    <div id="auth-screen" class="bg-white p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full border border-slate-100 my-auto text-center">
        <span class="bg-blue-100 text-blue-600 px-4 py-1 rounded-full text-sm font-black mb-3 inline-block uppercase tracking-widest">영출어람</span>
        <h1 class="text-3xl font-black text-slate-800 mb-2 tracking-tight">Practice: Echo</h1>
        <p class="text-blue-600 font-extrabold text-sm mb-4">강의: A-08</p>
        
        <p class="text-[11px] font-bold text-slate-400 mb-6 flex items-center justify-center gap-1 bg-slate-50 py-1.5 px-4 rounded-full w-max max-w-full mx-auto border border-slate-100 select-none tracking-tight">
            🌐 <span class="text-slate-600 font-extrabold">Google Chrome</span> 브라우저에 최적화되어 있습니다.
        </p>
        
        <div id="login-banner-area"></div>

        <button id="login-btn" onclick="startDrilling()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all">훈련 시작하기</button>
    </div>

    <div id="study-screen" class="hidden w-full max-w-lg text-slate-900 mx-auto mt-4">
        <div class="flex justify-between items-center mb-4 px-2">
            <div id="target-session-display" class="text-slate-400 font-black text-xs tracking-widest uppercase">A-08 Practice</div>
            <div class="text-blue-600 font-bold text-xs uppercase tracking-wider">Self Practice Mode</div>
        </div>

        <div class="bg-white p-10 rounded-[3rem] shadow-2xl card-container text-center mb-6 border border-slate-50 relative overflow-hidden">
            <div class="absolute top-6 left-8 right-8 flex justify-between items-center">
                <span id="sentence-number" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-tighter">Loading...</span>
                <button id="mute-toggle-btn" onclick="toggleMuteMode()" class="px-3 py-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-[10px] rounded-full transition-all flex items-center gap-1">
                    <span id="mute-icon">🔈</span> <span id="mute-text">자동재생 ON</span>
                </button>
            </div>
            
            <div id="kr-box" class="text-2xl font-black text-slate-800 leading-relaxed mb-4 break-keep font-black mt-4">데이터 로딩 중...</div>
            <div id="en-target-box" class="text-lg font-bold text-slate-400 mb-6 tracking-tight"></div>
            
            <div id="audio-control-panel" class="flex items-center justify-center gap-4 mb-6">
                <button onclick="userTriggerAudio(1.0)" class="px-4 py-2 bg-blue-50 hover:bg-blue-100 border border-blue-100 text-blue-600 font-black text-xs rounded-full shadow-sm transition-all flex items-center gap-1">
                    💬 1배속 재생
                </button>
                <button onclick="userTriggerAudio(0.8)" class="px-4 py-2 bg-orange-50 hover:bg-orange-100 border border-orange-100 text-orange-600 font-black text-xs rounded-full shadow-sm transition-all flex items-center gap-1">
                    🐢 0.8배속 재생
                </button>
            </div>
            
            <div class="bg-slate-50 rounded-2xl p-4 min-h-[80px] flex items-center justify-center mb-4 border border-slate-100">
                <p id="stt-output" class="text-xl font-black text-slate-400 italic">마이크 버튼을 누르고 소리 내어 에코하세요...</p>
            </div>
        </div>

        <div id="study-banner-area"></div>

        <div class="flex gap-3 mb-6">
            <button onclick="prevSentence()" id="prev-btn" class="w-16 bg-white border-2 border-slate-100 text-slate-400 py-5 rounded-[1.8rem] font-black text-xl active:scale-95 transition-all">◀</button>
            <button onclick="toggleListening()" id="mic-btn" class="flex-1 bg-slate-900 text-white py-5 rounded-[1.8rem] font-black text-lg shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-2">
                <span id="mic-icon">🎙️</span> <span id="mic-text">에코 매칭 도전!</span>
            </button>
            <button onclick="nextSentence()" id="next-btn" class="w-16 bg-white border-2 border-slate-100 text-slate-400 py-5 rounded-[1.8rem] font-black text-xl active:scale-95 transition-all">▶</button>
        </div>

        <div class="h-1.5 w-full bg-slate-200 rounded-full overflow-hidden mb-2">
            <div id="progress-bar" class="h-full bg-blue-600 transition-all duration-300" style="width: 0%"></div>
        </div>
        <p id="progress-text" class="text-center text-slate-400 text-[10px] font-bold tracking-widest uppercase">Loading...</p>
    </div>

    <div id="finish-screen" class="hidden w-full max-w-md bg-white p-8 sm:p-10 rounded-[2.5rem] shadow-2xl text-center my-auto border border-slate-100 flex flex-col items-center justify-start">
        <p class="text-4xl mb-2 animate-bounce">🏆</p>
        <h2 class="text-2xl font-black text-blue-600 mb-1 tracking-tight">PRACTICE COMPLETE!</h2>
        <p id="finish-session-display" class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">A-08 완료</p>
        
        <div id="report-box" class="w-full text-left bg-slate-50 border border-slate-100 rounded-2xl p-4 mb-4 max-h-[240px] overflow-y-auto report-scroll flex flex-col gap-2.5">
        </div>

        <div class="w-full mb-4">
            <button id="toggle-calendar-btn" onclick="toggleCalendarSection()" class="w-full bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-600 py-3 rounded-xl text-xs font-black transition-all flex items-center justify-center gap-1.5">
                🗓️ 구글 캘린더에 복습 일정 지정하기 ⚡
            </button>
            
            <div id="calendar-input-section" class="hidden mt-2 bg-blue-50/50 border border-blue-100/60 rounded-2xl p-3 text-left">
                <label class="block text-slate-700 font-black text-[11px] uppercase mb-1 pl-0.5">📅 복습할 날짜와 시간 설정</label>
                <div class="flex gap-2">
                    <input type="datetime-local" id="next-practice-date" class="flex-1 px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-600 text-xs font-bold text-slate-800 bg-white">
                    <button id="calendar-btn" onclick="syncToMyCalendarDirect()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-xl text-xs font-black shadow transition-all active:scale-95 flex-shrink-0">
                        일정 등록
                    </button>
                </div>
            </div>
        </div>

        <div id="finish-banner-area" class="w-full mb-4"></div>
        
        <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-all text-sm">
            다시 연습하러 가기
        </button>
    </div>

    <script>
        // 새로 제공해주신 구글 웹앱 URL 적용 완료
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzaBiZCd9SoYpkZCQE9GUyn28bhNkp0AM5z5PlZ6rfD9k4yZEfnuc4DvL2ujsA9kyOQ1A/exec";

        let scriptData = [];
        let currentIdx = 0;
        let selectedTargetEpisode = "A-08"; 
        let isListening = false;
        let isMuteMode = false; 
        let recognition;
        let currentAudio = null;
        let audioCtx = null; 

        const bannerMsgs = [
            { icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" },
            { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }
        ];
        let currentBannerIdx = 0;

        function injectBanners() {
            const template = document.getElementById('banner-template').content;
            ['login-banner-area', 'study-banner-area', 'finish-banner-area'].forEach(id => {
                const area = document.getElementById(id);
                if (area) area.appendChild(template.cloneNode(true));
            });
        }

        function rotateBanners() {
            currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
            const msg = bannerMsgs[currentBannerIdx];
            document.querySelectorAll('.promo-banner').forEach(banner => {
                const inner = banner.querySelector('.banner-inner');
                if(!inner) return;
                inner.style.opacity = 0;
                inner.style.transform = "translateY(3px)";
                setTimeout(() => {
                    banner.querySelector('.banner-icon').innerText = msg.icon;
                    banner.querySelector('.banner-title').innerText = msg.text;
                    inner.style.opacity = 1;
                    inner.style.transform = "translateY(0)";
                }, 500);
            });
        }

        // GAS 서버로부터 MonthA 탭의 A-08 데이터를 로드하는 함수
        async function loadScriptFromGAS() {
            try {
                const requestUrl = `${GAS_WEBAPP_URL}?month=MonthA&episode=A-08`;
                const res = await fetch(requestUrl);
                const result = await res.json();
                
                if(result.status === "success") {
                    scriptData = result.data;
                    scriptData = scriptData.map(item => ({ ...item, isPassed: false }));
                    return scriptData.length > 0;
                }
                return false;
            } catch (e) {
                console.error(e);
                return false;
            }
        }

        async function startDrilling() {
            const loginBtn = document.getElementById('login-btn');
            loginBtn.innerText = "구글 시트 대본 동기화 중...";
            loginBtn.disabled = true;

            const isLoaded = await loadScriptFromGAS();
            if(!isLoaded) {
                alert("대본 데이터 스트리밍에 실패했습니다.\n\n구글 웹앱 권한, 시트 탭 이름(MonthA), 또는 에피소드 식별자(A-08)를 확인하세요.");
                loginBtn.innerText = "훈련 시작하기";
                loginBtn.disabled = false;
                return;
            }

            try {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            } catch (e) { console.log("AudioContext 생성 실패", e); }

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('study-screen').classList.remove('hidden');
            
            initSTT();
            render();
        }

        function toggleMuteMode() {
            isMuteMode = !isMuteMode;
            const btn = document.getElementById('mute-toggle-btn');
            const icon = document.getElementById('mute-icon');
            const text = document.getElementById('mute-text');
            
            if (isMuteMode) {
                btn.className = "px-3 py-1 bg-red-50 hover:bg-red-100 text-red-600 font-bold text-[10px] rounded-full transition-all flex items-center gap-1";
                icon.innerText = "🔇";
                text.innerText = "자동재생 OFF";
                if (currentAudio) currentAudio.pause(); 
            } else {
                btn.className = "px-3 py-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-[10px] rounded-full transition-all flex items-center gap-1";
                icon.innerText = "🔈";
                text.innerText = "자동재생 ON";
                playAudio(1.0); 
            }
        }

        function playAudio(speed, isAutoPlay = false) {
            if (scriptData.length === 0) return;
            if (isAutoPlay && isMuteMode) return;

            const streamUrl = scriptData[currentIdx].audio;
            if (!streamUrl || streamUrl.trim() === "") return;
            
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (currentAudio) {
                currentAudio.pause();
                currentAudio.src = ""; 
            }
            
            try {
                currentAudio = new Audio(streamUrl.trim());
                currentAudio.playbackRate = speed;
                
                currentAudio.preload = "auto";
                currentAudio.setAttribute('playsinline', '');
                
                var playPromise = currentAudio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("자동재생 인터럽트 방어 성공:", error);
                    });
                }
            } catch (error) {
                console.error("Audio play error:", error);
            }
        }

        function userTriggerAudio(speed) {
            if (audioCtx) audioCtx.resume();
            playAudio(speed, false);
        }

        function buildReviewReport() {
            const reportBox = document.getElementById('report-box');
            reportBox.innerHTML = ""; 

            scriptData.forEach((item) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "border-b border-slate-200/60 pb-2 last:border-none last:pb-0";
                
                const badgeClass = item.isPassed ? "bg-blue-100 text-blue-700" : "bg-red-100 text-red-600";
                const badgeText = item.isPassed ? "✅ PASS" : "❌ TRY/SKIP";
                const englishTextColor = item.isPassed ? "text-blue-600" : "text-slate-400 italic";

                itemDiv.innerHTML = `
                    <div class="flex items-start gap-2">
                        <div class="flex flex-col gap-1 flex-shrink-0 items-start">
                            <span class="text-[9px] bg-slate-200 text-slate-700 px-1.5 py-0.5 rounded font-bold">No.${item.num}</span>
                            <span class="text-[8px] ${badgeClass} px-1 rounded font-black tracking-tighter">${badgeText}</span>
                        </div>
                        <div class="flex-1 pl-1">
                            <p class="text-xs font-black text-slate-800 break-keep">${item.kr}</p>
                            <p class="text-xs font-bold ${englishTextColor} mt-0.5">${item.en}</p>
                        </div>
                    </div>
                `;
                reportBox.appendChild(itemDiv);
            });
        }

        function toggleCalendarSection() {
            const section = document.getElementById('calendar-input-section');
            const toggleBtn = document.getElementById('toggle-calendar-btn');
            if (section.classList.contains('hidden')) {
                section.classList.remove('hidden');
                toggleBtn.innerText = "❌ 입력창 닫기";
            } else {
                section.classList.add('hidden');
                toggleBtn.innerText = "🗓️ 구글 캘린더에 복습 일정 지정하기 ⚡";
            }
        }

        function syncToMyCalendarDirect() {
            const dateInput = document.getElementById('next-practice-date').value;
            
            if(!dateInput) {
                alert("복습할 날짜와 시간을 선택해 주세요.");
                return;
            }

            const selectedDate = new Date(dateInput);
            const startStr = selectedDate.toISOString().replace(/-|:|\.\d+/g, '').slice(0, 15) + "Z";
            
            const endDate = new Date(selectedDate.getTime() + 45 * 60 * 1000);
            const endStr = endDate.toISOString().replace(/-|:|\.\d+/g, '').slice(0, 15) + "Z";
            
            const title = encodeURIComponent(`🎧 [영출어람] ${selectedTargetEpisode} 섀도잉 복습 드릴링`);
            const details = encodeURIComponent(`원어민의 호흡 그대로 소리쳐 뱉는 영출어람 복습 세션입니다. 🔥\n\n🔗 섀도잉 훈련소 링크 즉시 진입:\n${window.location.href}`);
            
            const googleCalendarUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&details=${details}&dates=${startStr}/${endStr}`;
            
            window.open(googleCalendarUrl, '_blank');
        }

        function showFinishUI() {
            if (currentAudio) currentAudio.pause();
            
            document.getElementById('study-screen').classList.add('hidden');
            document.getElementById('finish-screen').classList.remove('hidden');
            
            buildReviewReport(); 
            
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(9, 0, 0, 0);
            document.getElementById('next-practice-date').value = tomorrow.toISOString().slice(0, 16);
        }

        function initSTT() {
            if (!('webkitSpeechRecognition' in window) && !('speechRecognition' in window)) {
                alert("이 브라우저는 음성 인식을 지원하지 않습니다. 크롬 또는 사파리를 이용해 주세요.");
                return;
            }
            const SpeechObj = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechObj();
            recognition.lang = 'en-US';
            
            recognition.interimResults = false; 
            recognition.continuous = false;
            recognition.maxAlternatives = 1;

            recognition.onresult = (event) => {
                const speechText = event.results[0][0].transcript;
                document.getElementById('stt-output').innerText = `내가 뱉은 소리: "${speechText}"`;
                processEvaluation(speechText);
            };

            recognition.onerror = (event) => {
                console.error("STT Error:", event.error);
                document.getElementById('stt-output').innerText = "소리를 제대로 듣지 못했습니다. 다시 시도해 주세요.";
            };

            recognition.onend = () => {
                isListening = false;
                
                document.getElementById('mic-btn').className = "flex-1 bg-slate-900 text-white py-5 rounded-[1.8rem] font-black text-lg shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-2";
                document.getElementById('mic-icon').style.display = "inline";
                document.getElementById('mic-text').innerText = "에코 매칭 도전!";
                
                if (audioCtx) {
                    audioCtx.resume();
                }
            };
        }

        function processEvaluation(speechText) {
            let speechResult = speechText.toLowerCase().trim();
            let targetResult = scriptData[currentIdx].en.toLowerCase().trim();

            targetResult = targetResult.replace(/:/g, ' ');
            speechResult = speechResult.replace(/:/g, ' ');

            const numMap = {
                "1": "one", "2": "two", "3": "three", "4": "four", "5": "five",
                "6": "six", "7": "seven", "8": "eight", "9": "nine", "10": "ten",
                "11": "eleven", "12": "twelve", "20": "twenty", "30": "thirty",
                "40": "forty", "50": "fifty"
            };

            for (let num in numMap) {
                const regex = new RegExp(`\\b${num}\\b`, 'g');
                targetResult = targetResult.replace(regex, numMap[num]);
                speechResult = speechResult.replace(regex, numMap[num]);
            }

            speechResult = speechResult.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?'"]/g,"").replace(/\s+/g, " ").trim();
            targetResult = targetResult.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?'"]/g,"").replace(/\s+/g, " ").trim();

            if(speechResult === targetResult || targetResult.includes(speechResult)) {
                document.getElementById('stt-output').className = "text-xl match-success text-center";
                scriptData[currentIdx].isPassed = true; 
            } else {
                document.getElementById('stt-output').className = "text-xl text-red-500 font-bold text-center";
            }
        }

        function toggleListening() {
            if (audioCtx) audioCtx.resume(); 

            if(isListening) {
                recognition.stop();
            } else {
                isListening = true;
                
                document.getElementById('mic-btn').className = "flex-1 bg-blue-600 text-white py-5 rounded-[1.8rem] font-black text-lg shadow-2xl active:scale-95 transition-all flex items-center justify-center animate-pulse";
                document.getElementById('mic-icon').style.display = "none";
                document.getElementById('mic-text').innerText = "음성 인식 중";
                
                document.getElementById('stt-output').innerText = "원어민의 호흡 그대로 소리 내어 던지세요!";
                document.getElementById('stt-output').className = "text-xl text-slate-400 italic text-center";
                
                if (currentAudio) currentAudio.pause(); 
                recognition.start();
            }
        }

        function render() {
            if(scriptData.length === 0) return;
            
            if (currentAudio) currentAudio.pause();
            
            const item = scriptData[currentIdx];
            document.getElementById('sentence-number').innerText = `No.${item.num}`;
            document.getElementById('kr-box').innerText = item.kr;
            document.getElementById('en-target-box').innerText = item.en;
            document.getElementById('stt-output').innerText = "마이크 버튼을 누르고 소리 내어 에코하세요...";
            document.getElementById('stt-output').className = "text-xl text-slate-400 italic text-center";
            
            document.getElementById('progress-text').innerText = `Sentence ${currentIdx + 1} / ${scriptData.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / scriptData.length) * 100}%`;
            
            setTimeout(() => {
                playAudio(1.0, true);
            }, 300);
        }

        function nextSentence() {
            if(currentIdx < scriptData.length - 1) { 
                currentIdx++; 
                render(); 
            } else {
                showFinishUI();
            }
        }

        function prevSentence() {
            if(currentIdx > 0) { currentIdx--; render(); }
        }

        window.onload = () => {
            injectBanners();
            setInterval(rotateBanners, 4000);
        };
    </script>
</body>
</html>
