<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 🚀 모바일 자동 줌인 버그 원천 차단 및 user-scalable 방어 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>🧱 영어 블록 조립소 (과거)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght=400;700;900&display=swap');
        
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --dark: #1e293b;
            --light: #f8fafc;
            --warning: #f59e0b;
        }
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Pretendard', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body { background-color: var(--light); color: var(--dark); padding: 15px; display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; }
        
        header { width: 100%; max-width: 480px; padding: 12px 20px; background: var(--dark); color: white; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 18px; font-weight: 900; text-align: center; flex: 1; }
        
        .home-btn, .setting-open-btn { background: rgba(255, 255, 255, 0.1); border: none; border-radius: 8px; width: 36px; height: 36px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .home-btn:active, .setting-open-btn:active { transform: scale(0.95); }

        .main-container { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 480px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; padding: 15px; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: white; border-radius: 16px; width: 100%; max-width: 400px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transform: scale(0.9); transition: transform 0.2s ease; }
        .modal-overlay.active .modal-content { transform: scale(1); }

        .panel-title { font-weight: bold; margin-bottom: 6px; color: #64748b; font-size: 12px; text-transform: uppercase; }
        
        .pattern-grid-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 4px; }
        .pattern-mini-btn { padding: 10px 2px; border: 2px solid #e2e8f0; border-radius: 8px; background: white; font-weight: bold; cursor: pointer; transition: all 0.15s; font-size: 12px; text-align: center; }
        .pattern-mini-btn:hover { border-color: var(--primary); }
        .pattern-mini-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .pattern-mini-btn.danger.active { background: var(--danger); border-color: var(--danger); }
        
        .time-select-container { display: flex; flex-wrap: wrap; gap: 4px; }
        .time-btn { flex: 1; min-width: 40px; padding: 8px 2px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff; cursor: pointer; font-size: 11px; font-weight: bold; }
        .time-btn.active { background: #cbd5e1; border-color: #cbd5e1; }

        .list-btn, .mod-btn { width: 100%; text-align: left; padding: 10px 8px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; cursor: pointer; transition: all 0.15s; }
        .list-btn.active, .mod-btn.active { border-color: var(--primary); background: #eff6ff; }

        .display-board { background: var(--dark); color: white; border-radius: 18px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 22px 12px; text-align: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); min-height: 190px; cursor: pointer; }
        .kor-hint { font-size: 21px; color: #e2e8f0; margin-bottom: 10px; font-weight: bold; word-break: keep-all; line-height: 1.35; }
        .eng-sentence { font-size: 19px; font-weight: 800; min-height: 45px; display: flex; flex-wrap: wrap; justify-content: center; items: center; gap: 6px; margin-top: 6px; margin-bottom: 8px; width: 100%; }
        
        .inline-challenge-btn { padding: 10px 30px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; background: var(--warning); color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.15); }
        .inline-next-btn { padding: 10px 26px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; background: #6366f1; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.15); margin-bottom: 2px; }

        .tile { padding: 3px 8px; border-radius: 6px; background: rgba(255,255,255,0.1); animation: pop 0.25s ease; white-space: nowrap; font-size: 15px; }
        .tile.skeleton { background: #3b82f6; color: white; }
        .tile.skeleton.neg { background: #ef4444; }
        .tile.verb { background: #10b981; color: white; }
        .tile.modifier { background: #8b5cf6; color: white; }
        
        @media (min-width: 480px) { .tile { font-size: 16px; } }
        
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .timer-container { width: 100%; height: 6px; background: #475569; position: absolute; bottom: 0; left: 0; border-radius: 0 0 18px 18px; overflow: hidden; }
        .timer-bar { width: 0%; height: 100%; background: var(--success); transform-origin: left; }

        .toggle-label { display: flex; align-items: center; cursor: pointer; gap: 6px; font-weight: bold; font-size: 13px; color: #475569; }
        .toggle-checkbox { position: absolute; opacity: 0; width: 0; height: 0; }
        .toggle-switch { width: 40px; height: 22px; background: #cbd5e1; border-radius: 20px; position: relative; transition: background 0.2s; }
        .toggle-switch:before { content: ""; position: absolute; width: 16px; height: 18px; border-radius: 50%; top: 2px; left: 2px; background: white; transition: transform 0.2s; }
        .toggle-checkbox:checked + .toggle-switch { background: var(--primary); }
        .toggle-checkbox:checked + .toggle-switch:before { transform: translateX(20px); }

        .banner-inner { transition: all 0.5s ease; }
    </style>
</head>
<body>

    <template id="banner-template">
        <div class="promo-banner bg-white border border-blue-50 p-3 rounded-[2rem] mb-3 cursor-pointer shadow-md transition-all active:scale-95 w-full max-w-[480px]" 
             onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
            <div class="banner-inner flex items-center gap-3">
                <div class="banner-icon w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-lg text-white font-bold">🔥</div>
                <div class="flex-1 overflow-hidden h-9 flex flex-col justify-center text-left">
                    <h3 class="banner-title font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                    <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
                </div>
            </div>
        </div>
    </template>

    <header>
        <button class="home-btn" onclick="resetFactory()">🏠</button>
        <h1>🧱 영어 블록 조립소 (과거)</h1>
        <button class="setting-open-btn" onclick="openSettings()">⚙️</button>
    </header>

    <div class="main-container">
        <div class="stage w-full">
            <div id="main-banner-area" class="w-full"></div>

            <!-- 전광판 -->
            <div class="display-board" onclick="handleBoardClick()">
                <div class="kor-hint" id="kor-display">원하는 주말 블록들을 조합하세요!</div>
                <div class="eng-sentence" id="eng-display"></div>
                <div id="challenge-btn-zone" class="w-full flex justify-center mt-2">
                    <button class="inline-challenge-btn" onclick="event.stopPropagation(); startChallenge();">🔥 도전</button>
                </div>
                <div class="timer-container">
                    <div class="timer-bar" id="timer"></div>
                </div>
            </div>

            <!-- 1. 구조 선택 -->
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-1.5">
                <div class="panel-title">1. 구조 선택 (과거 시제)</div>
                <div class="pattern-grid-row" id="pattern-grid">
                    <button class="pattern-mini-btn active" data-pattern="pos" onclick="setPattern('pos', this)">평서문</button>
                    <button class="pattern-mini-btn danger" data-pattern="neg" onclick="setPattern('neg', this)">부정문</button>
                    <button class="pattern-mini-btn" data-pattern="ques" onclick="setPattern('ques', this)">의문문</button>
                    <button class="pattern-mini-btn danger" data-pattern="neg_ques" onclick="setPattern('neg_ques', this)">부정의문</button>
                </div>
            </div>

            <!-- 2. 동사/상태 선택 -->
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-1.5">
                <div class="panel-title">2. 주말 동사/상태 선택 (일반동사 vs Be동사)</div>
                <div id="verb-list" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
            </div>

            <!-- 3. 살 붙이기 -->
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-1.5">
                <div class="panel-title">3. 살 붙이기 (주말 시점/조건 파츠 - 단일 선택)</div>
                <div id="mod-storage" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
            </div>
        </div>
    </div>

    <!-- 설정 모달 -->
    <div class="modal-overlay" id="setting-modal" onclick="closeSettings()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-base font-black text-slate-800">🛠️ 조립소 환경 설정</h2>
                <button class="text-slate-400 text-xl font-bold" onclick="closeSettings()">&times;</button>
            </div>
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <span class="font-bold text-xs text-slate-700">🔤 한국어 + 영어 함께 보기</span>
                    <label class="toggle-label">
                        <input type="checkbox" id="showEnglishCheck" class="toggle-checkbox" onchange="handleLangOptionChange()">
                        <div class="toggle-switch"></div>
                    </label>
                </div>
                <div>
                    <div class="panel-title">⏱️ 제한 시간 세팅 (⏱️ <span id="time-val">2</span>초)</div>
                    <div class="time-select-container">
                        <button class="time-btn" onclick="setLimitTime(1, this)">1초</button>
                        <button class="time-btn active" onclick="setLimitTime(2, this)">2초</button>
                        <button class="time-btn" onclick="setLimitTime(3, this)">3초</button>
                        <button class="time-btn" onclick="setLimitTime(4, this)">4초</button>
                        <button class="time-btn" onclick="setLimitTime(5, this)">5초</button>
                    </div>
                </div>
                <div class="border-t pt-3">
                    <div class="panel-title">🎲 랜덤 문제 필터링 설정</div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 flex flex-col gap-2.5">
                        <label class="toggle-label justify-between w-full">
                            <span class="text-xs font-bold text-slate-600">형태 고정</span>
                            <input type="checkbox" id="fixPatternCheck" class="toggle-checkbox">
                            <div class="toggle-switch"></div>
                        </label>
                        <label class="toggle-label justify-between w-full">
                            <span class="text-xs font-bold text-slate-600">동사 고정</span>
                            <input type="checkbox" id="fixVerbCheck" class="toggle-checkbox">
                            <div class="toggle-switch"></div>
                        </label>
                        <label class="toggle-label justify-between w-full">
                            <span class="text-xs font-bold text-slate-600">수식어 제외</span>
                            <input type="checkbox" id="noModCheck" class="toggle-checkbox">
                            <div class="toggle-switch"></div>
                        </label>
                    </div>
                </div>
            </div>
            <button class="w-full mt-5 bg-slate-800 text-white font-bold p-2.5 rounded-xl text-sm" onclick="closeSettings()">설정 완료</button>
        </div>
    </div>

    <script>
        const verbs = [
            { id: 1, type: "status", engPos: "busy", engNeg: "busy", engQues: "busy", korBase: "바빴어", conjugation: { pos: "", neg: "안 바빴어", ques: "?", neg_ques: "안 바빴어?" } },
            { id: 2, type: "status", engPos: "in a bad mood", engNeg: "in a bad mood", engQues: "in a bad mood", korBase: "기분이 안 좋았어", conjugation: { pos: "", neg: "기분이 안 좋지 않았어", ques: "?", neg_ques: "기분이 안 좋지 않았어?" } },
            { id: 3, type: "status", engPos: "bored", engNeg: "bored", engQues: "bored", korBase: "심심했어", conjugation: { pos: "", neg: "안 심심했어", ques: "?", neg_ques: "안 심심했어?" } },
            { id: 4, type: "action", engPos: "overslept", engNeg: "oversleep", engQues: "oversleep", korBase: "늦잠 잤어", conjugation: { pos: "", neg: "안 잤어", ques: "?", neg_ques: "안 잤어?" } },
            { id: 5, type: "action", engPos: "binge-watched a drama", engNeg: "binge-watch a drama", engQues: "binge-watch a drama", korBase: "드라마를 몰아서 봤어", conjugation: { pos: "", neg: "안 했어", ques: "?", neg_ques: "안 했어?" } },
            { id: 6, type: "action", engPos: "went on a trip", engNeg: "go on a trip", engQues: "go on a trip", korBase: "여행을 다녀왔어", conjugation: { pos: "", neg: "안 갔어", ques: "?", neg_ques: "안 갔니?" } },
            { id: 7, type: "action", engPos: "went shopping", engNeg: "go shopping", engQues: "go shopping", korBase: "쇼핑을 다녀왔어", conjugation: { pos: "", neg: "안 갔어", ques: "?", neg_ques: "안 갔니?" } },
            { id: 8, type: "action", engPos: "cleaned the room", engNeg: "clean the room", engQues: "clean the room", korBase: "방 청소를 했어", conjugation: { pos: "", neg: "안 했어", ques: "?", neg_ques: "안 했어?" } },
            { id: 9, type: "action", engPos: "had a drink with friends", engNeg: "have a drink with friends", engQues: "have a drink with friends", korBase: "친구들이랑 한잔했어", conjugation: { pos: "", neg: "안 했어", ques: "?", neg_ques: "안 했어?" } },
            { id: 10, type: "action", engPos: "get some rest", engNeg: "get some rest", engQues: "get some rest", korBase: "쉬었어", conjugation: { pos: "", neg: "안 쉬었어", ques: "?", neg_ques: "안 쉬었어?" } }
        ];

        const modifiers = [
            { id: 1, engPos: "yesterday", engQues: "yesterday", korPos: "어제", korQues: "어제" },
            { id: 2, engPos: "this morning", engQues: "this morning", korPos: "오늘 아침에", korQues: "오늘 아침에" },
            { id: 3, engPos: "last weekend", engQues: "last weekend", korPos: "지난 주말에", korQues: "지난 주말에" },
            { id: 4, engPos: "last Sunday", engQues: "last Sunday", korPos: "지난 일요일에", korQues: "지난 일요일에" },
            { id: 5, engPos: "alone", engQues: "alone", korPos: "혼자", korQues: "혼자" },
            { id: 6, engPos: "all day long", engQues: "all day long", korPos: "하루 종일", korQues: "하루 종일" },
            { id: 7, engPos: "this time", engQues: "this time", korPos: "이번에는", korQues: "이번에는" },
            { id: 8, engPos: "at night", engQues: "at night", korPos: "밤에", korQues: "밤에" }
        ];

        let currentPattern = 'pos'; let currentVerb = null; let selectedMods = [];
        let isChallengeStarted = false; let isRevealed = false; let timerInterval = null; let limitTime = 2000;
        let shuffledQuizPool = []; let poolPointer = 0; let currentBannerIdx = 0;

        document.addEventListener('DOMContentLoaded', () => { injectBanners(); init(); setInterval(rotateBanners, 4000); });
        function openSettings() { document.getElementById('setting-modal').classList.add('active'); }
        function closeSettings() { document.getElementById('setting-modal').classList.remove('active'); }
        function injectBanners() { const template = document.getElementById('banner-template'); const area = document.getElementById('main-banner-area'); if (area) area.appendChild(template.content.cloneNode(true)); }
        
        function rotateBanners() {
            const bannerMsgs = [{ icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" }, { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }];
            currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length; const msg = bannerMsgs[currentBannerIdx];
            document.querySelectorAll('.promo-banner').forEach(banner => {
                const inner = banner.querySelector('.banner-inner'); if(!inner) return;
                inner.style.opacity = 0; inner.style.transform = "translateY(2px)";
                setTimeout(() => { banner.querySelector('.banner-icon').innerText = msg.icon; banner.querySelector('.banner-title').innerText = msg.text; inner.style.opacity = 1; inner.style.transform = "translateY(0)"; }, 500);
            });
        }

        function init() { renderVerbs(); renderModifiers(); resetFactory(); }

        function renderVerbs() {
            const showEnglish = document.getElementById('showEnglishCheck')?.checked || false;
            const container = document.getElementById('verb-list');
            container.innerHTML = verbs.map(v => {
                const hintEng = showEnglish ? `<span class="font-black block text-[10px] opacity-60 overflow-hidden text-ellipsis whitespace-nowrap">${v.engNeg}</span>` : '';
                return `<button class="list-btn" data-eng="${v.engPos}" onclick="selectVerb('${v.engPos}', this)">${hintEng}<span class="font-bold text-sm block text-slate-800">${v.korBase}</span></button>`;
            }).join('');
        }

        function renderModifiers() {
            const showEnglish = document.getElementById('showEnglishCheck')?.checked || false;
            const container = document.getElementById('mod-storage');
            const isQues = (currentPattern === 'ques' || currentPattern === 'neg_ques');
            container.innerHTML = modifiers.map(m => {
                const displayEng = isQues ? m.engQues : m.engPos; const displayKor = isQues ? m.korQues : m.korPos;
                const activeClass = selectedMods.includes(m.id) ? 'active' : '';
                const hintEng = showEnglish ? `<span class="font-black block text-[10px] opacity-60 overflow-hidden text-ellipsis whitespace-nowrap">+ ${displayEng}</span>` : '';
                return `<button class="mod-btn ${activeClass}" data-id="${m.id}" onclick="toggleModifier(${m.id})">${hintEng}<span class="font-bold text-sm block text-slate-800">${displayKor}</span></button>`;
            }).join('');
        }

        function handleLangOptionChange() {
            renderVerbs(); renderModifiers();
            if (currentVerb) {
                document.querySelectorAll('#verb-list .list-btn').forEach(b => { if(b.getAttribute('data-eng') === currentVerb.engPos) b.classList.add('active'); });
            }
        }

        // 🧠 [선생님 지시 완벽 수렴 연산구] 단일 수식어 혹은 0개 조합만 수용하는 철벽 검수 필터링
        function checkLogicValidity(pattern, verb, mods) {
            // 🚀 대원칙: 살 붙이기(mods) 개수가 2개 이상이면 논리 검사 단계에서 통째로 소멸 (랜덤 중복 모순 원천 박멸)
            if (mods.length >= 2) return false;

            if (mods.length === 1) {
                const mid = mods[0];
                // '혼자' 결합 차단 
                if (mid === 5) {
                    if (verb.engPos === "busy" || verb.engPos === "in a bad mood" || verb.engPos === "bored" || verb.engPos === "overslept" || verb.engPos === "get some rest") return false;
                }
                // 늦잠 모순 차단
                if (verb.engPos === "overslept" && (mid === 6 || mid === 8)) return false;
                // 친구랑 한잔 모순 차단
                if (verb.engPos === "had a drink with friends" && (mid === 5 || mid === 2)) return false;
                // 여행 모순 차단
                if (verb.engPos === "went on a trip" && (mid === 2 || mid === 6 || mid === 8)) return false;
                // 쇼핑 모순 차단
                if (verb.engPos === "went shopping" && mid === 6) return false;
            }

            return true;
        }

        // 🚀 비복원 단일 결합 전용 순환 구조 셔플 엔진
        function rebuildAndShufflePool() {
            const fixPattern = document.getElementById('fixPatternCheck').checked;
            const fixVerb = document.getElementById('fixVerbCheck').checked;
            const noMod = document.getElementById('noModCheck').checked;

            const patternsPool = fixPattern ? [currentPattern] : ['pos', 'neg', 'ques', 'neg_ques'];
            const verbsPool = fixVerb ? (currentVerb ? [currentVerb] : verbs) : verbs;

            // 🚀 단일 결합 구조식으로 풀링 한계 압축 (0개 또는 1개만 허용)
            let modCombinations = [[]]; 
            if (!noMod) {
                modifiers.forEach(m => modCombinations.push([m.id]));
            }

            shuffledQuizPool = [];
            patternsPool.forEach(p => {
                verbsPool.forEach(v => {
                    modCombinations.forEach(mods => {
                        if (checkLogicValidity(p, v, mods)) {
                            shuffledQuizPool.push({ pattern: p, verb: v, mods: [...mods] });
                        }
                    });
                });
            });

            // 피셔-예이츠 셔플
            for (let i = shuffledQuizPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledQuizPool[i], shuffledQuizPool[j]] = [shuffledQuizPool[j], shuffledQuizPool[i]];
            }
            poolPointer = 0;
        }

        function generateRandomQuiz() {
            if (shuffledQuizPool.length === 0 || poolPointer >= shuffledQuizPool.length) {
                rebuildAndShufflePool();
            }

            const quiz = shuffledQuizPool[poolPointer];
            poolPointer++;

            currentPattern = quiz.pattern;
            currentVerb = quiz.verb;
            selectedMods = quiz.mods;

            document.querySelectorAll('#pattern-grid .pattern-mini-btn').forEach(b => {
                b.classList.remove('active');
                if(b.getAttribute('data-pattern') === currentPattern) b.setAttribute('class', b.getAttribute('class').includes('danger') ? 'pattern-mini-btn danger active' : 'pattern-mini-btn active');
            });

            renderVerbs();
            document.querySelectorAll('#verb-list .list-btn').forEach(b => { if(b.getAttribute('data-eng') === currentVerb.engPos) b.classList.add('active'); });

            resetChallengeState(); renderModifiers(); updateDisplay();
        }

        function resetChallengeState() {
            clearInterval(timerInterval); isChallengeStarted = false; isRevealed = false;
            document.getElementById('timer').style.transform = 'scaleX(0)';
            document.getElementById('challenge-btn-zone').innerHTML = `<button class="inline-challenge-btn" onclick="event.stopPropagation(); startChallenge();">🔥 도전</button>`;
        }

        function handleBoardClick() { if (!currentVerb) return; if (!isChallengeStarted) startChallenge(); else if (isChallengeStarted && !isRevealed) revealEnglish(); }
        function setLimitTime(seconds, btnObj) { limitTime = seconds * 1000; document.getElementById('time-val').innerText = seconds; document.querySelectorAll('.time-select-container .time-btn').forEach(b => b.classList.remove('active')); btnObj.classList.add('active'); if (isChallengeStarted && !isRevealed) startTimer(); }
        
        function setPattern(pattern, btnObj) { currentPattern = pattern; document.querySelectorAll('#pattern-grid .pattern-mini-btn').forEach(b => b.classList.remove('active')); btnObj.classList.add('active'); shuffledQuizPool = []; resetChallengeState(); renderModifiers(); updateDisplay(); }
        function selectVerb(eng, btnObj) { currentVerb = verbs.find(v => v.engPos === eng); document.querySelectorAll('#verb-list .list-btn').forEach(b => b.classList.remove('active')); btnObj.classList.add('active'); shuffledQuizPool = []; resetChallengeState(); updateDisplay(); }

        // 🚀 [수동 조작 제어] 사용자가 임의로 마구 누를 때도 단 1개만 상호 단일 선택되도록 동기화 보정
        function toggleModifier(id) {
            const index = selectedMods.indexOf(id);
            
            if (index > -1) {
                selectedMods = []; // 이미 켜져있는 걸 누르면 초기화
            } else {
                selectedMods = [id]; // 새로운 걸 누르면 무조건 1개만 단독 덮어쓰기 고정
            }
            
            document.querySelectorAll('#mod-storage .mod-btn').forEach(b => b.classList.remove('active'));
            if (selectedMods.length > 0) {
                const chip = document.querySelector(`.mod-btn[data-id="${id}"]`);
                if (chip) chip.classList.add('active');
            }

            shuffledQuizPool = []; resetChallengeState(); updateDisplay();
        }

        function startChallenge() { if (!currentVerb) { alert("연습할 동사/상태를 선택하세요!"); return; } isChallengeStarted = true; isRevealed = false; document.getElementById('challenge-btn-zone').innerHTML = ""; updateDisplay(); startTimer(); }

        function startTimer() {
            clearInterval(timerInterval); const timerBar = document.getElementById('timer');
            timerBar.style.transform = 'scaleX(1)'; timerBar.style.backgroundColor = 'var(--success)';
            let start = Date.now();
            timerInterval = setInterval(() => {
                let timePassed = Date.now() - start; let progress = 100 - (timePassed / limitTime * 100);
                if (progress <= 0) { clearInterval(timerInterval); timerBar.style.transform = 'scaleX(0)'; if(!isRevealed) revealEnglish(); } 
                else { timerBar.style.transform = `scaleX(${progress / 100})`; }
            }, 20);
        }

        function updateDisplay() {
            const korDisplay = document.getElementById('kor-display'); const engDisplay = document.getElementById('eng-display');
            if (!currentVerb) { korDisplay.innerText = "원하는 주말 블록들을 조합하세요!"; document.getElementById('challenge-btn-zone').innerHTML = `<button class="inline-challenge-btn" onclick="event.stopPropagation(); startChallenge();">🔥 도전</button>`; engDisplay.innerHTML = ""; return; }

            const isQues = (currentPattern === 'ques' || currentPattern === 'neg_ques');
            let subject = isQues ? "너 " : "나 ";
            
            let modPieces = selectedMods.map(id => { const m = modifiers.find(mod => mod.id === id); return isQues ? m.korQues : m.korPos; });
            let modText = modPieces.length > 0 ? modPieces.join(' ') + ' ' : '';
            
            let finalVerbKor = currentVerb.korBase;
            if (currentPattern === 'neg') {
                if (currentVerb.engPos === "busy") finalVerbKor = "안 바빴어";
                if (currentVerb.engPos === "in a bad mood") finalVerbKor = "기분이 안 좋지 않았어";
                if (currentVerb.engPos === "bored") finalVerbKor = "안 심심했어";
                if (currentVerb.engPos === "overslept") finalVerbKor = "늦잠 안 잤어";
                if (currentVerb.engPos === "binge-watched a drama") finalVerbKor = "드라마 몰아서 안 봤어";
                if (currentVerb.engPos === "went on a trip") finalVerbKor = "여행 안 다녀왔어";
                if (currentVerb.engPos === "went shopping") finalVerbKor = "쇼핑 안 다녀왔어";
                if (currentVerb.engPos === "cleaned the room") finalVerbKor = "방 청소 안 했어";
                if (currentVerb.engPos === "had a drink with friends") finalVerbKor = "친구들이랑 한잔 안 했어";
                if (currentVerb.engPos === "get some rest") finalVerbKor = "안 쉬었어";
            } else if (currentPattern === 'ques') {
                if (currentVerb.engPos === "busy") finalVerbKor = "바빴니?";
                if (currentVerb.engPos === "in a bad mood") finalVerbKor = "기분이 안 좋았니?";
                if (currentVerb.engPos === "bored") finalVerbKor = "심심했니?";
                if (currentVerb.engPos === "overslept") finalVerbKor = "늦잠 잤니?";
                if (currentVerb.engPos === "binge-watched a drama") finalVerbKor = "드라마 몰아서 봤니?";
                if (currentVerb.engPos === "went on a trip") finalVerbKor = "여행 다녀왔니?";
                if (currentVerb.engPos === "went shopping") finalVerbKor = "쇼핑 다녀왔니?";
                if (currentVerb.engPos === "cleaned the room") finalVerbKor = "방 청소 했니?";
                if (currentVerb.engPos === "had a drink with friends") finalVerbKor = "친구들이랑 한잔했니?";
                if (currentVerb.engPos === "get some rest") finalVerbKor = "쉬었니?";
            } else if (currentPattern === 'neg_ques') {
                if (currentVerb.engPos === "busy") finalVerbKor = "안 바빴니?";
                if (currentVerb.engPos === "in a bad mood") finalVerbKor = "기분이 안 좋지 않았니?";
                if (currentVerb.engPos === "bored") finalVerbKor = "안 심심했니?";
                if (currentVerb.engPos === "overslept") finalVerbKor = "늦잠 안 잤니?";
                if (currentVerb.engPos === "binge-watched a drama") finalVerbKor = "드라마 몰아서 안 봤니?";
                if (currentVerb.engPos === "went on a trip") finalVerbKor = "여행 안 다녀왔니?";
                if (currentVerb.engPos === "went shopping") finalVerbKor = "쇼핑 안 다녀왔니?";
                if (currentVerb.engPos === "cleaned the room") finalVerbKor = "방 청소 안 했니?";
                if (currentVerb.engPos === "had a drink with friends") finalVerbKor = "친구들이랑 한잔 안 했니?";
                if (currentVerb.engPos === "get some rest") finalVerbKor = "안 쉬었니?";
            }

            let finalKor = `${subject}${modText}${finalVerbKor}`.replace(/\s+/g, ' ').trim();
            if (isQues && !finalKor.endsWith('?')) finalKor += '?';
            if (!isQues && !finalKor.endsWith('.')) finalKor += '.';
            
            korDisplay.innerText = finalKor;

            if (!isChallengeStarted) { engDisplay.innerHTML = `<span class="text-amber-500 text-[14px] font-bold">🔥 도전을 누르세요.</span>`; return; }
            if (isChallengeStarted && !isRevealed) { engDisplay.innerHTML = `<span class="text-slate-400 text-[14px] font-bold">❓ 영어 블록을 조합하는 중... (터치 시 정답)</span>`; return; }

            let engHTML = "";
            const isBe = (currentVerb.type === "status");

            if (currentPattern === 'pos') {
                engHTML += `<span class="tile skeleton">I</span>`;
                if (isBe) engHTML += `<span class="tile skeleton">was</span>`;
            } else if (currentPattern === 'neg') {
                if (isBe) engHTML += `<span class="tile skeleton neg">I wasn't</span>`;
                else engHTML += `<span class="tile skeleton neg">I didn't</span>`;
            } else if (currentPattern === 'ques') {
                if (isBe) engHTML += `<span class="tile skeleton">Were you</span>`;
                else engHTML += `<span class="tile skeleton">Did you</span>`;
            } else if (currentPattern === 'neg_ques') {
                if (isBe) engHTML += `<span class="tile skeleton neg">Weren't you</span>`;
                else engHTML += `<span class="tile skeleton neg">Didn't you</span>`;
            }

            let coreVerbText = currentVerb.engPos;
            if (!isBe && currentPattern !== 'pos') coreVerbText = currentVerb.engNeg;
            engHTML += `<span class="tile verb">${coreVerbText}</span>`;

            selectedMods.forEach(id => { const m = modifiers.find(mod => mod.id === id); engHTML += `<span class="tile modifier">${isQues ? m.engQues : m.engPos}</span>`; });
            engHTML += `<span class="text-white ml-0.5 font-bold">${isQues ? '?' : '.'}</span>`;
            
            engDisplay.innerHTML = engHTML;
            document.getElementById('challenge-btn-zone').innerHTML = `<button class="inline-next-btn" onclick="event.stopPropagation(); generateRandomQuiz();">➡️ 다음 랜덤 문제</button>`;
        }

        function revealEnglish() { if(!currentVerb) return; isChallengeStarted = true; isRevealed = true; clearInterval(timerInterval); document.getElementById('timer').style.transform = 'scaleX(0)'; updateDisplay(); }

        function resetFactory() {
            clearInterval(timerInterval); currentVerb = null; selectedMods = []; isChallengeStarted = false; isRevealed = false; currentPattern = 'pos';
            shuffledQuizPool = []; poolPointer = 0;
            document.getElementById('fixPatternCheck').checked = false; document.getElementById('fixVerbCheck').checked = false; document.getElementById('noModCheck').checked = false;
            if(document.getElementById('showEnglishCheck')) document.getElementById('showEnglishCheck').checked = false;
            document.querySelectorAll('#pattern-grid .pattern-mini-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('#pattern-grid .pattern-mini-btn')[0].classList.add('active');
            renderVerbs(); renderModifiers(); resetChallengeState(); updateDisplay();
        }
    </script>
</body>
</html>
