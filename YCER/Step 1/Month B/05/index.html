<!DOCTYPE html>

            --light: #f8fafc;
        }

            <!-- 5대 훈련 모드 -->

                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <button id="modeStatementBtn" class="py-3.5 rounded-xl font-black text-xs sm:text-sm bg-indigo-600 text-white border-2 border-indigo-400 shadow-lg active:scale-95 transition-all text-center" onclick="switchTrainMode('statement')">
                            긍정문 모드<br>
                            <span class="text-[9px] font-normal opacity-80">(was / were)</span>
                        </button>
                        <button id="modeQuestionBtn" class="py-3.5 rounded-xl font-black text-xs sm:text-sm bg-slate-950 text-slate-400 border-2 border-slate-800 active:scale-95 transition-all text-center" onclick="switchTrainMode('question')">
                            의문문 모드<br>
                            <span class="text-[9px] font-normal opacity-80">(Was / Were ...?)</span>
                        </button>
                        <button id="modeNegativeBtn" class="py-3.5 rounded-xl font-black text-xs sm:text-sm bg-slate-950 text-slate-400 border-2 border-slate-800 active:scale-95 transition-all text-center" onclick="switchTrainMode('negative')">
                            부정문 모드<br>
                            <span class="text-[9px] font-normal opacity-80">(wasn't / weren't)</span>
                        </button>
                        <button id="modeNegQuestionBtn" class="py-3.5 rounded-xl font-black text-xs sm:text-sm bg-slate-950 text-slate-400 border-2 border-slate-800 active:scale-95 transition-all text-center" onclick="switchTrainMode('negQuestion')">
                            부정 의문문 모드<br>
                            <span class="text-[9px] font-normal opacity-80">(Wasn't / Weren't ...?)</span>
                        </button>
                    </div>
                    <button id="modeMixBtn" class="w-full py-3.5 rounded-xl font-black text-xs sm:text-sm bg-slate-950 text-slate-400 border-2 border-slate-800 active:scale-95 transition-all text-center" onclick="switchTrainMode('mix')">
                        🎲 4가지 패턴 전체 믹스 (100문장 랜덤 트레이닝)
                    </button>
                </div>
            </div>

            { eng: "take medicine", kor: "약 먹다", ing: "taking medicine", isSelfVerb: false },
            { eng: "apply lotion", kor: "로션을 바르다", ing: "applying lotion", isSelfVerb: false },
            { eng: "clip nails", kor: "손톱을 깎다", ing: "clipping nails", isSelfVerb: true, myIng: "clipping my nails", yourIng: "clipping your nails", hisIng: "clipping his nails", herIng: "clipping her nails", ourIng: "clipping our nails", theirIng: "clipping their nails" },
            { eng: "boil water", kor: "물을 끓이다", ing: "boiling water", isSelfVerb: false },
            { eng: "chop onions", kor: "양파를 다지다", ing: "chopping onions", isSelfVerb: false },
            { eng: "fry an egg", kor: "계란 프라이를 하다", ing: "frying an egg", isSelfVerb: false },
            { eng: "clean the mirror", kor: "거울을 닦다", ing: "cleaning the mirror", isSelfVerb: false },
            { eng: "make the bed", kor: "이불을 정돈하다", ing: "making the bed", isSelfVerb: false },
            { eng: "fold the clothes", kor: "옷을 개다", ing: "folding the clothes", isSelfVerb: false },
            { eng: "organize the desk", kor: "책상을 정리하다", ing: "organizing the desk", isSelfVerb: false },
            { eng: "search for a restaurant", kor: "맛집을 검색하다", ing: "searching for a restaurant", isSelfVerb: false },
            { eng: "book a flight", kor: "비행기를 예약하다", ing: "booking a flight", isSelfVerb: false },
            { eng: "charge the battery", kor: "배터리를 충전하다", ing: "charging the battery", isSelfVerb: false },
            { eng: "download a file", kor: "파일을 다운로드하다", ing: "downloading a file", isSelfVerb: false },
            { eng: "edit a photo", kor: "사진을 편집하다", ing: "editing a photo", isSelfVerb: false },
            { eng: "upload a video", kor: "영상을 업로드하다", ing: "uploading a video", isSelfVerb: false }
        ];

        const subjects = [
            { eng: "I", kor: "나", wasWere: "was", wasnNot: "wasn't" },
            { eng: "You", kor: "너", wasWere: "were", wasnNot: "weren't" },
            { eng: "He", kor: "걔(남자)", wasWere: "was", wasnNot: "wasn't" },
            { eng: "She", kor: "걔(여자)", wasWere: "was", wasnNot: "wasn't" },
            { eng: "We", kor: "우리", wasWere: "were", wasnNot: "weren't" },
            { eng: "They", kor: "그들", wasWere: "were", wasnNot: "weren't" }
        ];

        let trainMode = 'statement'; 
        let cardPool = [];
        let currentIndex = 0;
        let cardStep = 0; 
        let currentBannerIdx = 0;
        let activeCardMode = 'statement'; 
        let currentSubject = {};
        
        let timeLimit = 4000;
        let timerInterval = null;
        let startTime = 0;
        let isTimedOut = false;

        document.addEventListener('DOMContentLoaded', () => { 
            injectBanners(); 
            setInterval(rotateBanners, 4000); 
        });

        function injectBanners() { 
            const template = document.getElementById('banner-template'); 
            const area = document.getElementById('main-banner-area'); 
            if (area) area.appendChild(template.content.cloneNode(true)); 
        }

        function rotateBanners() {
            const bannerMsgs = [
                { icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" }, 
                { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }
            ];
            currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length; 
            const msg = bannerMsgs[currentBannerIdx];
            document.querySelectorAll('.promo-banner').forEach(banner => {
                const inner = banner.querySelector('.banner-inner'); 
                if(!inner) return;
                inner.style.opacity = 0; 
                inner.style.transform = "translateY(3px)";
                setTimeout(() => { 
                    banner.querySelector('.banner-icon').innerText = msg.icon; 
                    banner.querySelector('.banner-title').innerText = msg.text; 
                    inner.style.opacity = 1; 
                    inner.style.transform = "translateY(0)"; 
                }, 500);
            });
        }

        function switchTrainMode(mode) {
            trainMode = mode;
            const buttons = {
                statement: document.getElementById('modeStatementBtn'),
                question: document.getElementById('modeQuestionBtn'),
                negative: document.getElementById('modeNegativeBtn'),
                negQuestion: document.getElementById('modeNegQuestionBtn'),
                mix: document.getElementById('modeMixBtn')
            };

            Object.values(buttons).forEach(btn => {
                btn.className = btn === buttons.mix 
                    ? "w-full py-3.5 rounded-xl font-black text-xs sm:text-sm bg-slate-950 text-slate-400 border-2 border-slate-800 active:scale-95 transition-all text-center"
                    : "py-3.5 rounded-xl font-black text-xs sm:text-sm bg-slate-950 text-slate-400 border-2 border-slate-800 active:scale-95 transition-all text-center";
            });

            const activeBtn = buttons[mode];
            if (mode === 'mix') {
                activeBtn.className = "w-full py-3.5 rounded-xl font-black text-xs sm:text-sm bg-indigo-600 text-white border-2 border-indigo-400 shadow-lg active:scale-95 transition-all text-center";
            } else {
                activeBtn.className = "py-3.5 rounded-xl font-black text-xs sm:text-sm bg-indigo-600 text-white border-2 border-indigo-400 shadow-lg active:scale-95 transition-all text-center";
            }
        }

        function startApp() {
            const introSelect = document.getElementById('introTimeSelect');
            timeLimit = parseInt(introSelect.value);

            document.getElementById('introScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');

            if (timeLimit === 0) {
                document.getElementById('timerContainer').classList.add('hidden');
            } else {
                document.getElementById('timerContainer').classList.remove('hidden');
            }

            cardPool = [...verbDataset];
            cardPool.sort(() => Math.random() - 0.5);
            
            currentIndex = 0;
            showCard();
        }

        function getIngWithSubject(item, subjectEng) {
            if (!item.isSelfVerb) return item.ing;
            switch(subjectEng) {
                case 'I': return item.myIng || item.ing;
                case 'You': return item.yourIng || item.ing;
                case 'He': return item.hisIng || item.ing;
                case 'She': return item.herIng || item.ing;
                case 'We': return item.ourIng || item.ing;
                case 'They': return item.theirIng || item.ing;
                default: return item.ing;
            }
        }

        // 한국인 감성에 맞춰 자연스럽게 한국어 문장을 기계식 조립이 아닌 규칙 기반으로 조립
        function makeCleanKorean(item, mode, subject) {
            let base = item.kor.trim();
            let sub = subject.kor;
            
            // 특정 가공이 필요한 예외 동사들의 맞춤형 맵핑
            if (item.eng === "talk on the phone") base = "전화통화";
            if (item.eng === "watch Shorts") base = "쇼츠";
            if (item.eng === "wash hands") base = "손";
            if (item.eng === "text a friend") base = "친구에게 문자";
            if (item.eng === "walk the dog") base = "강아지 산책";
            if (item.eng === "charge the phone") base = "핸드폰 충전";
            if (item.eng === "pack a bag") base = "짐";
            if (item.eng === "dry hair") base = "머리";
            if (item.eng === "check emails") base = "이메일 확인";
            if (item.eng === "look for keys") base = "열쇠";
            if (item.eng === "change clothes") base = "옷";
            if (item.eng === "brush teeth") base = "양치";
            if (item.eng === "water plants") base = "화분에 물";
            if (item.eng === "clip nails") base = "손톱";
            if (item.eng === "talk to the boss") base = "상사하고 이야기";
            if (item.eng === "charge the battery") base = "배터리 충전";

            // 명사목적어 분리 가공 처리된 특수 동사들의 조립 규칙
            const isSpecialNoun = ["talk on the phone", "watch Shorts", "wash hands", "text a friend", "walk the dog", "charge the phone", "pack a bag", "dry hair", "check emails", "look for keys", "change clothes", "brush teeth", "water plants", "clip nails", "talk to the boss", "charge the battery"].includes(item.eng);

            if (isSpecialNoun) {
                if (mode === 'statement') return `${sub} ${base}하고 있었어.`;
                if (mode === 'question') return `${sub} ${base}하고 있었니?`;
                if (mode === 'negative') return `${sub} ${base} 안 하고 있었어.`;
                if (mode === 'negQuestion') return `${sub} ${base} 안 하고 있었니?`;
            }

            // 일반 동사 마감 처리 규칙 (하다 동사 vs 일반 동사)
            const isYada = base.endsWith("하다");
            let stem = isYada ? base.slice(0, -2) : base.slice(0, -1);

            if (mode === 'statement') {
                return isYada ? `${sub} ${stem}하고 있었어.` : `${sub} ${stem}고 있었어.`;
            } else if (mode === 'question') {
                return isYada ? `${sub} ${stem}하고 있었니?` : `${sub} ${stem}고 있었니?`;
            } else if (mode === 'negative') {
                return isYada ? `${sub} ${stem} 안 하고 있었어.` : `${sub} 안 ${stem}고 있었어.`;
            } else if (mode === 'negQuestion') {
                return isYada ? `${sub} ${stem} 안 하고 있었니?` : `${sub} 안 ${stem}고 있었니?`;
            }
            return base;
        }

        function showCard() {
            if (currentIndex >= cardPool.length) {
                cardPool.sort(() => Math.random() - 0.5);
                currentIndex = 0;
            } else if (currentIndex < 0) {
                currentIndex = cardPool.length - 1;
            }

            cardStep = 0;
            isTimedOut = false;
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${cardPool.length}`;

            currentSubject = subjects[Math.floor(Math.random() * subjects.length)];

            if (trainMode === 'mix') {
                const modes = ['statement', 'question', 'negative', 'negQuestion'];
                activeCardMode = modes[Math.floor(Math.random() * modes.length)];
            } else {
                activeCardMode = trainMode;
            }

            const item = cardPool[currentIndex];
            document.getElementById('verbEngBaseHint').innerText = `(동사 힌트: ${item.eng})`;

            // 완벽하게 다듬어진 한국어 결합 엔진 호출
            const korQuestion = makeCleanKorean(item, activeCardMode, currentSubject);
            
            // 영어 정답 실시간 조합
            const activeIng = getIngWithSubject(item, currentSubject.eng);
            let engAns = "";

            if (activeCardMode === 'statement') {
                engAns = `${currentSubject.eng} ${currentSubject.wasWere} ${activeIng}.`;
            } else if (activeCardMode === 'question') {
                const upperWasWere = currentSubject.wasWere.charAt(0).toUpperCase() + currentSubject.wasWere.slice(1);
                engAns = `${upperWasWere} ${currentSubject.eng.toLowerCase() === 'i' ? 'I' : currentSubject.eng.toLowerCase()} ${activeIng}?`;
            } else if (activeCardMode === 'negative') {
                engAns = `${currentSubject.eng} ${currentSubject.wasnNot} ${activeIng}.`;
            } else if (activeCardMode === 'negQuestion') {
                const upperWasnNot = currentSubject.wasnNot.charAt(0).toUpperCase() + currentSubject.wasnNot.slice(1);
                engAns = `${upperWasnNot} ${currentSubject.eng.toLowerCase() === 'i' ? 'I' : currentSubject.eng.toLowerCase()} ${activeIng}?`;
            }

            document.getElementById('verbKorQuestionText').innerText = korQuestion;
            document.getElementById('answerEngText').innerText = engAns;

            updateStepUI();

            if (timeLimit > 0) {
                startTimer();
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            const timerBar = document.getElementById('timerBar');
            timerBar.className = "h-full bg-blue-500 transition-none";
            timerBar.style.width = "100%";

            startTime = Date.now();
            
            timerInterval = setInterval(() => {
                if (timeLimit === 0) return;
                const elapsedTime = Date.now() - startTime;
                const remainingRatio = Math.max(0, (timeLimit - elapsedTime) / timeLimit) * 100;
                
                timerBar.style.width = `${remainingRatio}%`;

                if (remainingRatio < 30) {
                    timerBar.className = "h-full bg-rose-500";
                } else if (remainingRatio < 60) {
                    timerBar.className = "h-full bg-amber-500";
                }

                if (elapsedTime >= timeLimit) {
                    clearInterval(timerInterval);
                    timerBar.style.width = "0%";
                    isTimedOut = true;
                    document.getElementById('stepGuideText').innerText = "⏰ 시간 초과! 정답을 확인하세요.";
                    document.getElementById('stepHeaderTag').className = "w-full bg-rose-50 border border-rose-100 rounded-2xl py-2 px-3 flex items-center justify-center gap-2 shrink-0 h-10 animate-pulse";
                    document.getElementById('stepBadge').className = "bg-rose-600 text-white text-[11px] font-black px-2.5 py-0.5 rounded-full uppercase tracking-wider";
                    document.getElementById('stepBadge').innerText = "TIME OUT";
                }
            }, 25);
        }

        function updateStepUI() {
            const stepBadge = document.getElementById('stepBadge');
            const stepGuideText = document.getElementById('stepGuideText');
            const stepHeaderTag = document.getElementById('stepHeaderTag');
            const engBox = document.getElementById('answerEngBox');
            const touchHint = document.getElementById('cardTouchHint');
            const engBoxLabel = document.getElementById('engBoxLabel');

            const modeLabels = {
                statement: "영어 정답 (긍정문)",
                question: "영어 정답 (의문문)",
                negative: "영어 정답 (부정문)",
                negQuestion: "영어 정답 (부정 의문문)"
            };
            engBoxLabel.innerText = modeLabels[activeCardMode] || "영어 정답";

            if (cardStep === 0) {
                if (!isTimedOut) {
                    stepHeaderTag.className = "w-full bg-indigo-50 border border-indigo-100 rounded-2xl py-2 px-3 flex items-center justify-center gap-2 shrink-0 h-10";
                    stepBadge.className = "bg-amber-500 text-white text-[11px] font-black px-2.5 py-0.5 rounded-full uppercase tracking-wider";
                    stepBadge.innerText = "QUESTION";
                    stepGuideText.innerText = "위 한글 문장을 소리내어 영작하세요!";
                }
                
                engBox.className = "w-full bg-indigo-50 border-2 border-indigo-300 rounded-2xl py-2.5 px-3 h-[80px] flex flex-col items-center justify-center transition-all opacity-0 invisible";
                touchHint.innerText = "👆 카드를 터치하여 [영어 정답] 확인";
            } else if (cardStep === 1) {
                stepHeaderTag.className = "w-full bg-indigo-50 border border-indigo-100 rounded-2xl py-2 px-3 flex items-center justify-center gap-2 shrink-0 h-10";
                stepBadge.className = "bg-emerald-600 text-white text-[11px] font-black px-2.5 py-0.5 rounded-full uppercase tracking-wider";
                stepBadge.innerText = "ANSWER";
                stepGuideText.innerText = "정답 확인 완료! 터치하여 다음 카드로!";
                
                engBox.className = "w-full bg-indigo-50 border-2 border-indigo-300 rounded-2xl py-2.5 px-3 h-[80px] flex flex-col items-center justify-center transition-all opacity-100 visible";
                touchHint.innerText = "✅ 확인 완료! 한번 더 터치하면 다음 카드로 넘어갑니다 ➡️";
            }
        }

        function handleCardClick() {
            if (cardStep === 0) {
                clearInterval(timerInterval); 
                cardStep = 1;
            } else {
                nextCard();
                return;
            }
            updateStepUI();
        }

        function prevCard() {
            clearInterval(timerInterval);
            currentIndex--;
            showCard();
        }

        function nextCard() {
            clearInterval(timerInterval);
            currentIndex++;
            showCard();
        }

        function goToIntro() {
            clearInterval(timerInterval);
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('introScreen').classList.remove('hidden');
        }
    </script>
</body>
</html>
