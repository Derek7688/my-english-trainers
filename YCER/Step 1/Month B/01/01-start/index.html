                { kor: "너 지금 {기다리는 중이니}?", ans: "live", eng: "Are you waiting now?" },
                { kor: "너 {설거지하고 있니}?", ans: "live", eng: "Are you washing the dishes now?" },
                { kor: "너 {빨래하고 있니}?", ans: "live", eng: "Are you doing the laundry?" },
                { kor: "너 {집안일 하고 있니}?", ans: "live", eng: "Are you doing the housework?" },
                { kor: "너 요즘 {아침 일찍 일어나고 있니}?", ans: "live", eng: "Are you waking up early these days?" },
                { kor: "너 요즘 {조깅하고 있니}?", ans: "live", eng: "Are you jogging these days?" }
            ]
        };

        let selectedTrainMode = 'statement'; 
        let currentPool = [];
        let currentIndex = 0;
        let score = 0;
        let timeLimit = 2000;
        let timerInterval = null;
        let startTime = 0;
        let warmupStartTime = 0;
        let results = [];
        let isLocked = false;

        function switchTrainMode(mode) {
            selectedTrainMode = mode;
            const sBtn = document.getElementById('modeStatementBtn');
            const qBtn = document.getElementById('modeQuestionBtn');
            
            if (mode === 'statement') {
                sBtn.className = "py-3 rounded-xl font-bold text-sm bg-blue-600 text-white border-2 border-blue-400";
                qBtn.className = "py-3 rounded-xl font-bold text-sm bg-slate-900 text-slate-400 border-2 border-slate-700";
                
                document.getElementById('btnLabel1').innerText = "습관";
                document.getElementById('btnBlock1').innerText = "I + 동사";
                document.getElementById('btnLabel2').innerText = "상태";
                document.getElementById('btnBlock2').innerText = "I am + 상태";
                document.getElementById('btnLabel3').innerText = "진행";
                document.getElementById('btnBlock3').innerText = "I am + ~ing";
                document.getElementById('coreSignalLabel').innerText = "STATEMENT CORE FILTER";
            } else {
                qBtn.className = "py-3 rounded-xl font-bold text-sm bg-blue-600 text-white border-2 border-blue-400";
                sBtn.className = "py-3 rounded-xl font-bold text-sm bg-slate-900 text-slate-400 border-2 border-slate-700";
                
                document.getElementById('btnLabel1').innerText = "습관?";
                document.getElementById('btnBlock1').innerText = "Do you + 동사";
                document.getElementById('btnLabel2').innerText = "상태?";
                document.getElementById('btnBlock2').innerText = "Are you + 상태";
                document.getElementById('btnLabel3').innerText = "진행?";
                document.getElementById('btnBlock3').innerText = "Are you + ~ing";
                document.getElementById('coreSignalLabel').innerText = "QUESTION CORE FILTER";
            }
        }

        function startWarmup(isReviewMode) {
            const introSelect = document.getElementById('introTimeSelect');
            timeLimit = parseInt(introSelect.value);

            document.getElementById('introScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');

            if (timeLimit === 0) {
                document.getElementById('timerContainer').classList.add('hidden');
            } else {
                document.getElementById('timerContainer').classList.remove('hidden');
            }

            currentIndex = 0;
            score = 0;
            isLocked = false;

            if (isReviewMode) {
                currentPool = results.filter(r => !r.success).map(r => ({
                    kor: r.rawKor,
                    ans: r.ans,
                    eng: r.eng
                }));
            } else {
                currentPool = [...masterDataset[selectedTrainMode]];
            }

            results = [];
            currentPool.sort(() => Math.random() - 0.5);
            warmupStartTime = Date.now();

            showQuestion();
        }

        function showQuestion() {
            if (currentIndex >= currentPool.length) {
                finishWarmup();
                return;
            }

            isLocked = false;
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${currentPool.length}`;
            
            const currentItem = currentPool[currentIndex];
            let rawKor = currentItem.kor;
            let formattedKor = rawKor.replace("{", "<span class='text-blue-500 font-black text-2xl sm:text-3xl mx-0.5 border-b-2 border-blue-200/60'>").replace("}", "</span>");
            
            document.getElementById('korText').innerHTML = formattedKor;
            document.getElementById('engText').innerText = currentItem.eng;
            document.getElementById('engText').classList.add('opacity-0');
            
            if (timeLimit === 0) {
                document.getElementById('effectMsg').innerText = "♾️ 시간 제한이 없습니다. 알맞은 입문 블록을 고르세요.";
                document.getElementById('effectMsg').className = "text-center font-black text-xs h-6 mb-4 text-slate-400";
            } else {
                document.getElementById('effectMsg').innerText = "⏱️ 타이머가 멈추기 전에 선택하세요!";
                document.getElementById('effectMsg').className = "text-center font-black text-xs h-6 mb-4 text-slate-400";
                startTimer();
            }

            document.getElementById('actionBtnGroup').classList.remove('hidden');
            document.getElementById('nextBtnGroup').classList.add('hidden');
        }

        function startTimer() {
            clearInterval(timerInterval);
            const timerBar = document.getElementById('timerBar');
            timerBar.className = "h-full bg-blue-500 transition-none";
            timerBar.style.width = "100%";

            startTime = Date.now();
            
            timerInterval = setInterval(() => {
                if (isLocked || timeLimit === 0) return;
                const elapsedTime = Date.now() - startTime;
                const remainingRatio = Math.max(0, (timeLimit - elapsedTime) / timeLimit) * 100;
                
                timerBar.style.width = `${remainingRatio}%`;

                if (remainingRatio < 30) {
                    timerBar.className = "h-full bg-rose-500";
                } else if (remainingRatio < 60) {
                    timerBar.className = "h-full bg-amber-500";
                }

                if (elapsedTime >= timeLimit) {
                    clearInterval(timerInterval);
                    timerBar.style.width = "0%";
                    handleTimeout();
                }
            }, 20);
        }

        function chooseAnswer(userChoice) {
            if (isLocked) return;
            isLocked = true;
            clearInterval(timerInterval);

            const currentItem = currentPool[currentIndex];
            const isCorrect = (userChoice === currentItem.ans);
            
            const labelMap = { routine: "습관", status: "상태", live: "진행" };

            if (isCorrect) {
                score++;
                document.getElementById('effectMsg').innerText = `⭕ 정답 블록 포착! [${labelMap[currentItem.ans]}]`;
                document.getElementById('effectMsg').className = "text-center font-black text-base h-6 mb-4 text-emerald-400 animate-bounce";
                
                results.push({ rawKor: currentItem.kor, kor: currentItem.kor.replace("{","").replace("}",""), ans: labelMap[currentItem.ans], eng: currentItem.eng, success: true });
                
                setTimeout(() => {
                    currentIndex++;
                    showQuestion();
                }, 500);
            } else {
                document.getElementById('effectMsg').innerText = `❌ 갈림길 실패! 정답 뼈대는 [${labelMap[currentItem.ans]}]`;
                document.getElementById('effectMsg').className = "text-center font-black text-base h-6 mb-4 text-rose-500";
                document.getElementById('engText').classList.remove('opacity-0');
                
                results.push({ rawKor: currentItem.kor, kor: currentItem.kor.replace("{","").replace("}",""), ans: labelMap[currentItem.ans], eng: currentItem.eng, success: false });

                document.getElementById('actionBtnGroup').classList.add('hidden');
                document.getElementById('nextBtnGroup').classList.remove('hidden');
            }
        }

        function handleTimeout() {
            isLocked = true;
            const currentItem = currentPool[currentIndex];
            const labelMap = { routine: "습관", status: "상태", live: "진행" };
            
            document.getElementById('effectMsg').innerText = `⏰ 반사 신경 초과! 정답 뼈대: [${labelMap[currentItem.ans]}]`;
            document.getElementById('effectMsg').className = "text-center font-black text-base h-6 mb-4 text-amber-500";
            document.getElementById('engText').classList.remove('opacity-0');

            results.push({ rawKor: currentItem.kor, kor: currentItem.kor.replace("{","").replace("}",""), ans: labelMap[currentItem.ans], eng: currentItem.eng, success: false });

            document.getElementById('actionBtnGroup').classList.add('hidden');
            document.getElementById('nextBtnGroup').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIndex++;
            showQuestion();
        }

        function finishWarmup() {
            clearInterval(timerInterval);
            
            const totalElapsedTimeMs = Date.now() - warmupStartTime;
            const totalSeconds = (totalElapsedTimeMs / 1000).toFixed(1);
            document.getElementById('totalTimeSummary').innerText = `⏱️ 전체 격파 속도: ${totalSeconds}초`;

            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');

            const ratio = Math.round((score / currentPool.length) * 100);
            document.getElementById('scoreRatioSummary').innerText = `성공률: ${score} / ${currentPool.length} (${ratio}%)`;

            let failedAnswers = results.filter(r => !r.success);
            const reviewBtn = document.getElementById('review-failed-btn');
            
            if (failedAnswers.length > 0) {
                reviewBtn.classList.remove('hidden');
                reviewBtn.innerText = `❌ 틀린 문제 ${failedAnswers.length}개만 다시 판별하기 🔄`;
            } else {
                reviewBtn.classList.add('hidden');
            }

            const resultList = document.getElementById('resultList');
            resultList.innerHTML = '';

            results.forEach(res => {
                const item = document.createElement('div');
                item.className = `p-3 rounded-2xl border ${res.success ? 'bg-emerald-950/40 border-emerald-800' : 'bg-rose-950/40 border-rose-800'} text-sm flex flex-col gap-0.5`;
                
                item.innerHTML = `
                    <div class="flex items-center gap-1.5 font-bold">
                        <span>${res.success ? '⭕' : '❌'}</span>
                        <span class="${res.success ? 'text-emerald-400' : 'text-rose-400'}">[${res.ans}] ${res.kor}</span>
                    </div>
                    <div class="text-slate-400 text-xs pl-6 italic font-medium">${res.eng}</div>
                `;
                resultList.appendChild(item);
            });
        }

        function goToIntro() {
            clearInterval(timerInterval);
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('introScreen').classList.remove('hidden');
        }
    </script>
</body>
</html>
