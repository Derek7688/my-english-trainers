<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>⚡ 과거 진행 기본 연습</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght=400;700;900&display=swap');
        
        :root {
            --primary: #f97316; 
            --dark: #0f172a;
            --light: #f8fafc;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { font-family: 'Pretendard', sans-serif; touch-action: manipulation; }

        .banner-inner { transition: all 0.5s ease; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex flex-col items-center justify-start p-4 text-white">

    <!-- 📢 프로모션 배너 템플릿 -->
    <template id="banner-template">
        <div class="promo-banner bg-white border border-blue-50 p-3.5 rounded-[2rem] mb-4 cursor-pointer shadow-lg transition-all active:scale-95 w-full mx-auto" 
             onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
            <div class="banner-inner flex items-center gap-3.5">
                <div class="banner-icon w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-blue-200 shadow-lg text-white font-bold shrink-0">🔥</div>
                <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center text-left">
                    <h3 class="banner-title font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                    <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
                </div>
            </div>
        </div>
    </template>

    <div class="w-full max-w-md my-auto">
        
        <!-- 인트로 스크린 -->

            <span class="bg-indigo-950 text-indigo-300 px-4 py-1.5 rounded-full text-xs font-bold mb-3 inline-block uppercase tracking-widest border border-indigo-900">과거 진행 기본 연습</span>
            <h1 class="text-3xl font-black text-white mb-1.5 tracking-tight">과거 진행 100 단어 카드</h1>
            <p class="text-indigo-400 font-bold text-sm italic mb-5">동사만 보고 한국어/영어 과거 진행 뱉기</p>
            
            <!-- 훈련 진행 순서 설명 박스 -->
            <div class="bg-slate-950/80 border border-slate-800 rounded-2xl p-4.5 mb-6 text-left space-y-3 shadow-inner">
                <p class="text-slate-400 font-black text-[11px] uppercase tracking-wider text-indigo-400">💡 훈련 진행 순서</p>
                
                <div class="flex items-start gap-2.5">
                    <span class="bg-indigo-600 text-white font-black text-xs px-2 py-0.5 rounded-md shrink-0 mt-0.5">1단계</span>
                    <p class="text-slate-200 font-bold text-sm sm:text-base leading-snug break-keep">
                        동사를 보자마자 <span class="text-amber-400 font-black">한국어 과거 진행형</span>을 말하세요!
                    </p>
                </div>
                
                <div class="flex items-start gap-2.5">
                    <span class="bg-blue-600 text-white font-black text-xs px-2 py-0.5 rounded-md shrink-0 mt-0.5">2단계</span>
                    <p class="text-slate-200 font-bold text-sm sm:text-base leading-snug break-keep">
                        <span class="text-blue-400 font-black">과거 진행 영어 문장</span>을 크게 뱉으세요!
                    </p>
                </div>
            </div>
            
            <!-- 3대 훈련 모드 (긍정문 / 의문문 / 전체 믹스) -->
            <div class="space-y-4 mb-7 text-left">
                <div>
                    <label class="text-slate-300 font-bold text-sm block mb-2">🎛️ 훈련 모드 선택</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button id="modeStatementBtn" class="py-3.5 rounded-2xl font-black text-xs sm:text-sm bg-indigo-600 text-white border-2 border-indigo-400 shadow-lg active:scale-95 transition-all text-center" onclick="switchTrainMode('statement')">
                            긍정문 모드<br>
                            <span class="text-[10px] font-normal opacity-80">(I was)</span>
                        </button>
                        <button id="modeQuestionBtn" class="py-3.5 rounded-2xl font-black text-xs sm:text-sm bg-slate-950 text-slate-400 border-2 border-slate-800 active:scale-95 transition-all text-center" onclick="switchTrainMode('question')">
                            의문문 모드<br>
                            <span class="text-[10px] font-normal opacity-80">(Were you)</span>
                        </button>
                        <button id="modeMixBtn" class="py-3.5 rounded-2xl font-black text-xs sm:text-sm bg-slate-950 text-slate-400 border-2 border-slate-800 active:scale-95 transition-all text-center" onclick="switchTrainMode('mix')">
                            🎲 전체 믹스<br>
                            <span class="text-[10px] font-normal opacity-80">(랜덤)</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 시작 버튼 -->
            <button class="w-full bg-gradient-to-r from-indigo-600 via-indigo-500 to-blue-600 hover:from-indigo-500 hover:to-blue-500 text-white py-5 rounded-2xl font-black text-xl shadow-2xl shadow-indigo-600/40 border border-indigo-400/30 transition-all active:scale-95 flex items-center justify-center gap-2 tracking-tight" onclick="startApp()">
                <span>훈련 시작하기</span>

            </button>
        </div>

                </button>
            </div>

            <!-- 메인 플래시 카드 -->

                        👉 긍정문으로 만드세요!
                    </div>
                </div>

                    </div>

        let trainMode = 'statement'; 
        let cardPool = [];
        let currentIndex = 0;
        let cardStep = 0; 
        let currentBannerIdx = 0;
        let activeCardMode = 'statement'; 

        document.addEventListener('DOMContentLoaded', () => { 
            injectBanners(); 
            setInterval(rotateBanners, 4000); 
        });

        function injectBanners() { 
            const template = document.getElementById('banner-template'); 
            const area = document.getElementById('main-banner-area'); 
            if (area) area.appendChild(template.content.cloneNode(true)); 
        }

        function rotateBanners() {
            const bannerMsgs = [
                { icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" }, 
                { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }
            ];
            currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length; 
            const msg = bannerMsgs[currentBannerIdx];
            document.querySelectorAll('.promo-banner').forEach(banner => {
                const inner = banner.querySelector('.banner-inner'); 
                if(!inner) return;
                inner.style.opacity = 0; 
                inner.style.transform = "translateY(3px)";
                setTimeout(() => { 
                    banner.querySelector('.banner-icon').innerText = msg.icon; 
                    banner.querySelector('.banner-title').innerText = msg.text; 
                    inner.style.opacity = 1; 
                    inner.style.transform = "translateY(0)"; 
                }, 500);
            });
        }

        function switchTrainMode(mode) {
            trainMode = mode;
            const sBtn = document.getElementById('modeStatementBtn');
            const qBtn = document.getElementById('modeQuestionBtn');
            const mBtn = document.getElementById('modeMixBtn');

            sBtn.className = "py-3.5 rounded-2xl font-black text-xs sm:text-sm bg-slate-950 text-slate-400 border-2 border-slate-800 active:scale-95 transition-all text-center";
            qBtn.className = "py-3.5 rounded-2xl font-black text-xs sm:text-sm bg-slate-950 text-slate-400 border-2 border-slate-800 active:scale-95 transition-all text-center";
            mBtn.className = "py-3.5 rounded-2xl font-black text-xs sm:text-sm bg-slate-950 text-slate-400 border-2 border-slate-800 active:scale-95 transition-all text-center";

            if (mode === 'statement') {
                sBtn.className = "py-3.5 rounded-2xl font-black text-xs sm:text-sm bg-indigo-600 text-white border-2 border-indigo-400 shadow-lg active:scale-95 transition-all text-center";
            } else if (mode === 'question') {
                qBtn.className = "py-3.5 rounded-2xl font-black text-xs sm:text-sm bg-indigo-600 text-white border-2 border-indigo-400 shadow-lg active:scale-95 transition-all text-center";
            } else if (mode === 'mix') {
                mBtn.className = "py-3.5 rounded-2xl font-black text-xs sm:text-sm bg-indigo-600 text-white border-2 border-indigo-400 shadow-lg active:scale-95 transition-all text-center";
            }
        }

        function startApp() {
            document.getElementById('introScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');

            cardPool = [...verbDataset];
            cardPool.sort(() => Math.random() - 0.5);
            
            currentIndex = 0;
            showCard();
        }

        function showCard() {
            if (currentIndex >= cardPool.length) {
                cardPool.sort(() => Math.random() - 0.5);
                currentIndex = 0;
            } else if (currentIndex < 0) {
                currentIndex = cardPool.length - 1;
            }

            cardStep = 0;
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${cardPool.length}`;

            if (trainMode === 'mix') {
                activeCardMode = Math.random() < 0.5 ? 'statement' : 'question';
            } else {
                activeCardMode = trainMode;
            }

            // 💡 [수정완료] 정적 고정 태그
            const targetBadge = document.getElementById('targetDirectionBadge');
            if (activeCardMode === 'statement') {
                targetBadge.className = "mt-1 inline-block bg-rose-50 border-2 border-rose-300 px-3 py-1 rounded-full text-rose-600 font-black text-xs sm:text-sm";
                targetBadge.innerText = "👉 긍정문으로 만드세요!";
            } else {
                targetBadge.className = "mt-1 inline-block bg-rose-50 border-2 border-rose-300 px-3 py-1 rounded-full text-rose-600 font-black text-xs sm:text-sm";
                targetBadge.innerText = "👉 의문문으로 만드세요!";
            }

            const item = cardPool[currentIndex];
            document.getElementById('verbEngText').innerText = item.eng;
            document.getElementById('verbKorMeaning').innerText = item.kor;

            const korAns = activeCardMode === 'statement' ? item.korPos : item.korQues;
            
            let engIng = item.ing;
            if (activeCardMode === 'question' && item.korQuesIng) {
                engIng = item.korQuesIng;
            }

            const engAns = activeCardMode === 'statement' 
                ? `I was ${engIng}.` 
                : `Were you ${engIng}?`;

            document.getElementById('answerKorText').innerText = korAns;
            document.getElementById('answerEngText').innerText = engAns;

            updateStepUI();
        }

        function updateStepUI() {
            const stepBadge = document.getElementById('stepBadge');
            const stepGuideText = document.getElementById('stepGuideText');
            const korBox = document.getElementById('answerKorBox');
            const engBox = document.getElementById('answerEngBox');
            const touchHint = document.getElementById('cardTouchHint');
            const engBoxLabel = document.getElementById('engBoxLabel');

            if (activeCardMode === 'statement') {
                engBoxLabel.innerText = "최종 완성 (긍정문)";
            } else {
                engBoxLabel.innerText = "최종 완성 (의문문)";
            }

            if (cardStep === 0) {
                stepBadge.className = "bg-indigo-600 text-white text-[11px] font-black px-2.5 py-0.5 rounded-full uppercase tracking-wider";
                stepBadge.innerText = "STEP 1";
                stepGuideText.innerText = "한국어 과거 진행형을 말하세요!";
                
                korBox.className = "w-full bg-amber-50 border-2 border-amber-300 rounded-2xl py-2 px-3 h-[64px] flex flex-col items-center justify-center transition-all opacity-0 invisible";
                engBox.className = "w-full bg-indigo-50 border-2 border-indigo-300 rounded-2xl py-2 px-3 h-[70px] flex flex-col items-center justify-center transition-all opacity-0 invisible";
                
                touchHint.innerText = "👆 카드를 터치하여 [1단계: 한국어] 확인";
            } else if (cardStep === 1) {
                stepBadge.className = "bg-amber-500 text-white text-[11px] font-black px-2.5 py-0.5 rounded-full uppercase tracking-wider";
                stepBadge.innerText = "STEP 2";
                stepGuideText.innerText = "과거 진행 영어 문장을 크게 뱉으세요!";
                
                korBox.className = "w-full bg-amber-50 border-2 border-amber-300 rounded-2xl py-2 px-3 h-[64px] flex flex-col items-center justify-center transition-all opacity-100 visible";
                engBox.className = "w-full bg-indigo-50 border-2 border-indigo-300 rounded-2xl py-2 px-3 h-[70px] flex flex-col items-center justify-center transition-all opacity-0 invisible";
                
                touchHint.innerText = "👆 한번 더 터치하여 [2단계: 영어 정답] 확인";
            } else if (cardStep === 2) {
                stepBadge.className = "bg-emerald-600 text-white text-[11px] font-black px-2.5 py-0.5 rounded-full uppercase tracking-wider";
                stepBadge.innerText = "SUCCESS";
                stepGuideText.innerText = "정답 확인 완료! 터치하여 다음 카드로!";
                
                korBox.className = "w-full bg-amber-50 border-2 border-amber-300 rounded-2xl py-2 px-3 h-[64px] flex flex-col items-center justify-center transition-all opacity-100 visible";
                engBox.className = "w-full bg-indigo-50 border-2 border-indigo-300 rounded-2xl py-2 px-3 h-[70px] flex flex-col items-center justify-center transition-all opacity-100 visible";
                
                touchHint.innerText = "✅ 검증 완료! 카드를 누르면 다음 카드로 넘어갑니다 ➡️";
            }
        }

        function handleCardClick() {
            if (cardStep === 0) {
                cardStep = 1;
            } else if (cardStep === 1) {
                cardStep = 2;
            } else {
                nextCard();
                return;
            }
            updateStepUI();
        }

        function prevCard() {
            currentIndex--;
            showCard();
        }

        function nextCard() {
            currentIndex++;
            showCard();
        }

        function goToIntro() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('introScreen').classList.remove('hidden');
        }
    </script>
