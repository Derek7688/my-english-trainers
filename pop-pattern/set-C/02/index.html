<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily English Trainer</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-amber: #92400e;
            --btn-amber: #d97706;
            --accent-green: #059669;
            --bg-gray: #fffbeb;
        }

        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; background-color: var(--bg-gray); margin: 0; padding: 40px 0; color: #333; -webkit-font-smoothing: antialiased;
        }

        .card { 
            background: white; padding: 30px 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            text-align: center; width: 95%; max-width: 500px; border: 1px solid #fef3c7; position: relative; 
            display: flex; flex-direction: column; align-items: center;
        }
        
        .top-controls {
            display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .top-controls.active { display: flex; }

        h1 { 
            color: var(--primary-amber); font-size: 20px !important; margin: 10px 0 25px 0; 
            font-weight: 900; letter-spacing: -0.05em; line-height: 1.2;
        }

        #korean-task { 
            font-size: 19px; font-weight: 700; margin: 20px 0 15px 0; min-height: 100px; 
            color: #451a03; line-height: 1.6; word-break: keep-all; display: flex; align-items: center; justify-content: center; 
            padding: 0 10px; letter-spacing: -0.02em;
        }

        .start-container { margin-bottom: 20px; }
        .lvl-btn { 
            background: var(--btn-amber); color: white; border: none; padding: 12px 32px; 
            border-radius: 50px; font-size: 15px; cursor: pointer; font-weight: 800; transition: all 0.2s; 
            box-shadow: 0 4px 12px rgba(146, 64, 14, 0.2);
        }
        .top-controls .lvl-btn { padding: 6px 14px; font-size: 12px; opacity: 0.9; box-shadow: 0 2px 8px rgba(146, 64, 14, 0.15); }
        .lvl-btn:active { transform: scale(0.95); }

        .auto-toggle {
            display: flex; align-items: center; gap: 5px; background: #fef3c7; padding: 4px; border-radius: 12px;
        }
        .toggle-btn {
            padding: 4px 10px; font-size: 11px; border-radius: 8px; cursor: pointer; font-weight: 700; border: none; color: #92400e;
        }
        .toggle-btn.active { background: var(--primary-amber); color: white; }
        
        .answer-container {
            min-height: 90px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; width: 100%;
        }

        #english-answer { 
            font-size: 16px; color: var(--accent-green); width: 100%; padding: 15px; 
            background: #ecfdf5; border-radius: 12px; border: 1px solid #a7f3d0; font-weight: 600; 
            line-height: 1.5; visibility: hidden; opacity: 0; transition: opacity 0.3s ease;
        }
        #english-answer.show { visibility: visible; opacity: 1; }

        #action-area { width: 100%; }
        .main-controls { display: flex; justify-content: center; gap: 8px; }
        .ans-btn { background: var(--btn-amber); color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .next-btn { background: #78350f; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .back-btn { background: transparent; color: #92400e; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; border: 1px dashed #fef3c7; font-size: 13px; margin-top: 15px; width: 100%; }
        
        .hidden { display: none !important; }

        .promo-banner { margin-top: 30px; width: 100%; }

        #auto-progress {
            width: 0%; height: 4px; background: #f59e0b; position: absolute; top: 0; left: 0; border-radius: 24px 24px 0 0; transition: width 0.1s linear;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="auto-progress"></div>

    <div id="top-controls" class="top-controls">
        <div id="lvl-container-mini">
            <button class="lvl-btn" onclick="generate()">다시 섞기 🎲</button>
        </div>
        <div class="auto-toggle">
            <button id="mode-manual" class="toggle-btn active" onclick="setPlayMode('manual')">수동</button>
            <button id="mode-auto" class="toggle-btn" onclick="setPlayMode('auto')">자동</button>
        </div>
    </div>

    <h1>✨ "I’m about to ~" 실전 트레이너</h1>
    
    <div id="korean-task">이제 막 ~하려던 참이에요! 타이밍 굿! 👍</div>
    
    <div id="start-container" class="start-container">
        <button id="btn-start-main" class="lvl-btn" onclick="startTrainer()">트레이닝 시작 🎲</button>
    </div>

    <div class="answer-container">
        <div id="english-answer"></div>
    </div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button id="manual-ans-btn" class="ans-btn" onclick="showAnswer()">정답 확인 👀</button>
            <button id="manual-next-btn" class="next-btn" onclick="generate()">다음 상황 🎲</button>
        </div>
        <button class="back-btn" onclick="goBack()">이전 문장으로 되돌리기 ↩️</button>
    </div>

    <div id="banner-container" class="promo-banner bg-white border border-blue-50 p-3 rounded-[1.5rem] mt-10 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-w-sm mx-auto" 
         onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
        <div id="banner-content" class="banner-inner flex items-center gap-3 text-left">
            <div id="banner-icon" class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-blue-200 shadow-lg text-white font-bold">🔥</div>
            <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center">
                <h3 id="banner-title" class="font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
            </div>
        </div>
    </div>
</div>

<script>
    const allClaims = [
        // 핵심 문장 (Q1-Q5)
        { kr: "이제 막 나가려던 참이야. 🏃", en: "I'm about to head out." },
        { kr: "이제 막 자려던 참이었어. 🛌", en: "I'm about to go to bed." },
        { kr: "나 지금 막 너한테 전화하려던 참이야. 📱", en: "I'm about to call you." },
        { kr: "이제 막 퇴근하려던 참이에요. 💼", en: "I'm about to get off work." },
        { kr: "이제 막 시작하려던 참이에요. 😄", en: "I'm about to start." },

        // 행동 관련 기초 변형 - 식사/음료
        { kr: "이제 막 점심 먹으려던 참이야.", en: "I'm about to eat lunch." },
        { kr: "이제 막 요리하려던 참이었어.", en: "I'm about to cook." },
        { kr: "이제 막 커피 마시려던 참이에요.", en: "I'm about to drink coffee." },
        { kr: "이제 막 저녁 주문하려던 참이야.", en: "I'm about to order dinner." },
        { kr: "이제 막 물 마시려던 참이었어.", en: "I'm about to drink some water." },

        // 행동 관련 기초 변형 - 외출/이동
        { kr: "이제 막 떠나려던 참이야.", en: "I'm about to leave." },
        { kr: "이제 막 집에 가려던 참이었어.", en: "I'm about to go home." },
        { kr: "이제 막 운전하려던 참이에요.", en: "I'm about to drive." },
        { kr: "이제 막 버스 타려던 참이야.", en: "I'm about to get on the bus." },
        { kr: "이제 막 쇼핑하러 가려던 참이었어.", en: "I'm about to go shopping." },

        // 행동 관련 기초 변형 - 업무/공부
        { kr: "이제 막 일 시작하려던 참이야.", en: "I'm about to start working." },
        { kr: "이제 막 숙제하려던 참이었어.", en: "I'm about to do my homework." },
        { kr: "이제 막 이메일 보내려던 참이에요.", en: "I'm about to send an email." },
        { kr: "이제 막 보고서 읽으려던 참이야.", en: "I'm about to read the report." },
        { kr: "이제 막 공부하려던 참이었어.", en: "I'm about to study." },

        // 행동 관련 기초 변형 - 소통/연락
        { kr: "이제 막 문자 보내려던 참이야.", en: "I'm about to text you." },
        { kr: "이제 막 물어보려던 참이었어.", en: "I'm about to ask." },
        { kr: "이제 막 말하려던 참이에요.", en: "I'm about to say that." },
        { kr: "이제 막 설명하려던 참이야.", en: "I'm about to explain." },
        { kr: "이제 막 답장하려던 참이었어.", en: "I'm about to reply." },

        // 행동 관련 기초 변형 - 일상/기타
        { kr: "이제 막 샤워하려던 참이야.", en: "I'm about to take a shower." },
        { kr: "이제 막 청소하려던 참이었어.", en: "I'm about to clean up." },
        { kr: "이제 막 운동하려던 참이에요.", en: "I'm about to exercise." },
        { kr: "이제 막 TV 켜려던 참이야.", en: "I'm about to turn on the TV." },
        { kr: "이제 막 영화 보려던 참이었어.", en: "I'm about to watch a movie." },
        { kr: "이제 막 책 읽으려던 참이야.", en: "I'm about to read a book." },
        { kr: "이제 막 낮잠 자려던 참이었어.", en: "I'm about to take a nap." },
        { kr: "이제 막 불 끄려던 참이에요.", en: "I'm about to turn off the light." },
        { kr: "이제 막 문 잠그려던 참이야.", en: "I'm about to lock the door." },
        { kr: "이제 막 화장하려던 참이었어.", en: "I'm about to put on makeup." },
        { kr: "이제 막 옷 갈아입으려던 참이야.", en: "I'm about to change my clothes." },
        { kr: "이제 막 짐 싸려던 참이었어.", en: "I'm about to pack my bag." },
        { kr: "이제 막 체크아웃하려던 참이에요.", en: "I'm about to check out." },
        { kr: "이제 막 결제하려던 참이야.", en: "I'm about to pay." },
        { kr: "이제 막 사진 찍으려던 참이었어.", en: "I'm about to take a photo." },
        { kr: "이제 막 창문 닫으려던 참이야.", en: "I'm about to close the window." },
        { kr: "이제 막 도와주려던 참이었어.", en: "I'm about to help you." },
        { kr: "이제 막 포기하려던 참이에요.", en: "I'm about to give up." },
        { kr: "이제 막 취소하려던 참이야.", en: "I'm about to cancel it." },
        { kr: "이제 막 확인하려던 참이었어.", en: "I'm about to check it." }
    ];

    let currentTask = { kr: '', en: '' };
    let history = [];
    let playMode = 'manual';
    let autoTimer = null;

    function startTrainer() {
        document.getElementById('start-container').classList.add('hidden');
        document.getElementById('top-controls').classList.add('active');
        document.getElementById('action-area').classList.remove('hidden');
        generate();
    }

    function setPlayMode(mode) {
        playMode = mode;
        document.getElementById('mode-manual').className = `toggle-btn ${mode === 'manual' ? 'active' : ''}`;
        document.getElementById('mode-auto').className = `toggle-btn ${mode === 'auto' ? 'active' : ''}`;
        
        const isAuto = (mode === 'auto');
        document.getElementById('manual-ans-btn').disabled = isAuto;
        document.getElementById('manual-next-btn').disabled = isAuto;
        document.getElementById('manual-ans-btn').style.opacity = isAuto ? "0.5" : "1";
        document.getElementById('manual-next-btn').style.opacity = isAuto ? "0.5" : "1";

        if (isAuto) {
            generate();
        } else {
            clearTimeout(autoTimer);
            updateProgressBar(0, 0);
        }
    }

    function generate() {
        clearTimeout(autoTimer);
        if (currentTask.kr) history.push({...currentTask});
        if (history.length > 50) history.shift();
        const randomIndex = Math.floor(Math.random() * allClaims.length);
        currentTask = allClaims[randomIndex];
        updateDisplay();

        if (playMode === 'auto') {
            runAutoCycle();
        }
    }

    function runAutoCycle() {
        updateProgressBar(100, 5000); 
        autoTimer = setTimeout(() => {
            showAnswer();
            updateProgressBar(100, 3000); 
            autoTimer = setTimeout(() => {
                generate();
            }, 3000);
        }, 5000);
    }

    function updateProgressBar(width, duration) {
        const bar = document.getElementById('auto-progress');
        bar.style.transition = 'none';
        bar.style.width = '0%';
        if(duration > 0) {
            setTimeout(() => {
                bar.style.transition = `width ${duration}ms linear`;
                bar.style.width = '100%';
            }, 10);
        }
    }

    function goBack() {
        if (history.length === 0) return;
        if (playMode === 'auto') setPlayMode('manual');
        currentTask = history.pop();
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('korean-task').innerText = currentTask.kr;
        const ans = document.getElementById('english-answer');
        ans.classList.remove('show');
        ans.innerText = currentTask.en;
    }

    function showAnswer() {
        document.getElementById('english-answer').classList.add('show');
    }

    const bannerMsgs = [{ icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" }, { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }];
    let currentBannerIdx = 0;
    setInterval(() => {
        currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
        const msg = bannerMsgs[currentBannerIdx];
        document.getElementById('banner-icon').innerText = msg.icon;
        document.getElementById('banner-title').innerText = msg.text;
    }, 4000);
</script>

</body>
</html>
