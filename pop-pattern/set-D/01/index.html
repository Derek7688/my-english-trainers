<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily English Trainer</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-amber: #92400e;
            --btn-amber: #d97706;
            --accent-green: #059669;
            --bg-gray: #fffbeb;
        }

        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; background-color: var(--bg-gray); margin: 0; padding: 40px 0; color: #333; -webkit-font-smoothing: antialiased;
        }

        .card { 
            background: white; padding: 30px 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            text-align: center; width: 95%; max-width: 500px; border: 1px solid #fef3c7; position: relative; 
            display: flex; flex-direction: column; align-items: center;
        }
        
        /* 1. 상단 제어 바 (다시 섞기 좌측 / 모드 전환 우측) */
        .top-controls {
            display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .top-controls.active { display: flex; }

        h1 { 
            color: var(--primary-amber); font-size: 20px !important; margin: 10px 0 25px 0; 
            font-weight: 900; letter-spacing: -0.05em; line-height: 1.2;
        }

        #korean-task { 
            font-size: 19px; font-weight: 700; margin: 20px 0 15px 0; min-height: 100px; 
            color: #451a03; line-height: 1.6; word-break: keep-all; display: flex; align-items: center; justify-content: center; 
            padding: 0 10px; letter-spacing: -0.02em;
        }

        /* 2. 시작 버튼 컨테이너: 화면 정중앙 배치 */
        .start-container { margin-bottom: 20px; }
        .lvl-btn { 
            background: var(--btn-amber); color: white; border: none; padding: 12px 32px; 
            border-radius: 50px; font-size: 15px; cursor: pointer; font-weight: 800; transition: all 0.2s; 
            box-shadow: 0 4px 12px rgba(146, 64, 14, 0.2);
        }
        /* 구석 다시 섞기 버튼 스타일 */
        .top-controls .lvl-btn { padding: 6px 14px; font-size: 12px; opacity: 0.9; box-shadow: 0 2px 8px rgba(146, 64, 14, 0.15); }
        .lvl-btn:active { transform: scale(0.95); }

        .auto-toggle {
            display: flex; align-items: center; gap: 5px; background: #fef3c7; padding: 4px; border-radius: 12px;
        }
        .toggle-btn {
            padding: 4px 10px; font-size: 11px; border-radius: 8px; cursor: pointer; font-weight: 700; border: none; color: #92400e;
        }
        .toggle-btn.active { background: var(--primary-amber); color: white; }
        
        /* 3. 정답창 영역 고정 (위아래 흔들림 방지) */
        .answer-container {
            min-height: 90px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; width: 100%;
        }

        #english-answer { 
            font-size: 16px; color: var(--accent-green); width: 100%; padding: 15px; 
            background: #ecfdf5; border-radius: 12px; border: 1px solid #a7f3d0; font-weight: 600; 
            line-height: 1.5; visibility: hidden; opacity: 0; transition: opacity 0.3s ease;
        }
        #english-answer.show { visibility: visible; opacity: 1; }

        #action-area { width: 100%; }
        .main-controls { display: flex; justify-content: center; gap: 8px; }
        .ans-btn { background: var(--btn-amber); color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .next-btn { background: #78350f; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .back-btn { background: transparent; color: #92400e; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; border: 1px dashed #fef3c7; font-size: 13px; margin-top: 15px; width: 100%; }
        
        .hidden { display: none !important; }

        /* 4. 배너 위치 최하단 고정 */
        .promo-banner { margin-top: 30px; width: 100%; }

        /* 자동 모드 진행 바 */
        #auto-progress {
            width: 0%; height: 4px; background: #f59e0b; position: absolute; top: 0; left: 0; border-radius: 24px 24px 0 0; transition: width 0.1s linear;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="auto-progress"></div>

    <!-- 연습 시작 후 상단 좌(다시섞기)/우(토글) 배치 -->
    <div id="top-controls" class="top-controls">
        <div id="lvl-container-mini">
            <button class="lvl-btn" onclick="generate()">다시 섞기 🎲</button>
        </div>
        <div class="auto-toggle">
            <button id="mode-manual" class="toggle-btn active" onclick="setPlayMode('manual')">수동</button>
            <button id="mode-auto" class="toggle-btn" onclick="setPlayMode('auto')">자동</button>
        </div>
    </div>

    <h1>✨ "It's not that ~, it's just that ~" 실전 트레이너</h1>
    
    <div id="korean-task">상대방이 오해하지 않도록 진짜 이유를 설명해봐요! 💡</div>
    
    <!-- 첫 화면 중앙 시작 버튼 -->
    <div id="start-container" class="start-container">
        <button id="btn-start-main" class="lvl-btn" onclick="startTrainer()">트레이닝 시작 🎲</button>
    </div>

    <!-- 고정된 정답창 영역 -->
    <div class="answer-container">
        <div id="english-answer"></div>
    </div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button id="manual-ans-btn" class="ans-btn" onclick="showAnswer()">정답 확인 👀</button>
            <button id="manual-next-btn" class="next-btn" onclick="generate()">다음 상황 🎲</button>
        </div>
        <button class="back-btn" onclick="goBack()">이전 문장으로 되돌리기 ↩️</button>
    </div>

    <!-- PSE 광고 배너 -->
    <div id="banner-container" class="promo-banner bg-white border border-blue-50 p-3 rounded-[1.5rem] mt-10 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-w-sm mx-auto" 
         onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
        <div id="banner-content" class="banner-inner flex items-center gap-3 text-left">
            <div id="banner-icon" class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-blue-200 shadow-lg text-white font-bold">🔥</div>
            <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center">
                <h3 id="banner-title" class="font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
            </div>
        </div>
    </div>
</div>

<script>
    const allClaims = [
        // 핵심 문장 (Q1-Q5)
        { kr: "네가 싫은 게 아니라, 그냥 오늘 기가 다 빨려서 그래. 🪫", en: "It's not that I don't like you, it's just that I'm drained today." },
        { kr: "비싸서 안 사는 게 아니라, 그냥 내 옷장에 안 어울려. 👗", en: "It's not that it's expensive, it's just that it doesn't match my closet." },
        { kr: "가기 싫은 게 아니라, 그냥 넷플릭스 보면서 쉬고 싶어. 🛋️", en: "It's not that I don't want to go, it's just that I need some Netflix time." },
        { kr: "화난 게 아니라, 그냥 좀 서운했어. 🫤", en: "It's not that I'm mad, it's just that I was a bit disappointed." },
        { kr: "못 믿는 게 아니라, 그냥 확인이 필요한 거야. ✅", en: "It's not that I don't trust you, it's just that I need to double-check." },

        // 상황 설명 변형 - 감정/상태
        { kr: "바쁜 게 아니라, 그냥 피곤해서 그래.", en: "It's not that I'm busy, it's just that I'm tired." },
        { kr: "슬픈 게 아니라, 그냥 졸려서 그래.", en: "It's not that I'm sad, it's just that I'm sleepy." },
        { kr: "지루한 게 아니라, 그냥 생각을 좀 하는 중이야.", en: "It's not that I'm bored, it's just that I'm thinking." },
        { kr: "무서운 게 아니라, 그냥 조심하는 거야.", en: "It's not that I'm afraid, it's just that I'm being careful." },
        { kr: "아픈 게 아니라, 그냥 기운이 없어.", en: "It's not that I'm sick, it's just that I have no energy." },

        // 상황 설명 변형 - 의사/의지
        { kr: "잊어버린 게 아니라, 그냥 시간이 좀 걸리는 거야.", en: "It's not that I forgot, it's just that it takes time." },
        { kr: "관심 없는 게 아니라, 그냥 좀 긴장돼서 그래.", en: "It's not that I'm not interested, it's just that I'm nervous." },
        { kr: "싫어하는 게 아니라, 그냥 커피를 안 마시는 거야.", en: "It's not that I don't like it, it's just that I don't drink coffee." },
        { kr: "무시하는 게 아니라, 그냥 전화를 못 받았어.", en: "It's not that I'm ignoring you, it's just that I missed your call." },
        { kr: "거짓말하는 게 아니라, 그냥 다 말할 수 없어.", en: "It's not that I'm lying, it's just that I can't tell you everything." },

        // 상황 설명 변형 - 업무/비즈니스
        { kr: "어려운 게 아니라, 그냥 익숙하지 않아서 그래.", en: "It's not that it's difficult, it's just that I'm not used to it." },
        { kr: "늦은 게 아니라, 그냥 길이 좀 막혔어.", en: "It's not that I'm late, it's just that the traffic was heavy." },
        { kr: "틀린 게 아니라, 그냥 생각이 다른 거야.", en: "It's not that you're wrong, it's just that we have different ideas." },
        { kr: "비밀인 게 아니라, 그냥 아직 확실하지 않아.", en: "It's not that it's a secret, it's just that I'm not sure yet." },
        { kr: "취소하는 게 아니라, 그냥 일정을 미루는 거야.", en: "It's not that I'm canceling, it's just that I'm rescheduling." },

        // 추가 연습 (동사/명사 교체)
        { kr: "배고픈 게 아니라, 그냥 목이 말라.", en: "It's not that I'm hungry, it's just that I'm thirsty." },
        { kr: "추운 게 아니라, 그냥 바람이 많이 불어.", en: "It's not that it's cold, it's just that it's windy." },
        { kr: "어두운 게 아니라, 그냥 전등이 꺼졌어.", en: "It's not that it's dark, it's just that the light is off." },
        { kr: "먼 게 아니라, 그냥 걷고 싶지 않아.", en: "It's not that it's far, it's just that I don't want to walk." },
        { kr: "복잡한 게 아니라, 그냥 좀 많아.", en: "It's not that it's complicated, it's just that there's a lot." },
        { kr: "위험한 게 아니라, 그냥 좀 조심스러워.", en: "It's not that it's dangerous, it's just that I'm being cautious." },
        { kr: "시끄러운 게 아니라, 그냥 소리가 좀 커.", en: "It's not that it's noisy, it's just that it's a bit loud." },
        { kr: "비싼 게 아니라, 그냥 돈이 없어.", en: "It's not that it's expensive, it's just that I don't have money." },
        { kr: "작은 게 아니라, 그냥 내 가방에 안 들어가.", en: "It's not that it's small, it's just that it doesn't fit in my bag." },
        { kr: "무거운 게 아니라, 그냥 들기 힘들어.", en: "It's not that it's heavy, it's just that it's hard to carry." },

        // 다양한 인칭 활용
        { kr: "그가 나쁜 게 아니라, 그냥 좀 무뚝뚝해.", en: "It's not that he's mean, it's just that he's blunt." },
        { kr: "그녀가 화난 게 아니라, 그냥 오늘 피곤해 보여.", en: "It's not that she's angry, it's just that she looks tired today." },
        { kr: "그들이 모르는 게 아니라, 그냥 말을 안 하는 거야.", en: "It's not that they don't know, it's just that they're not talking." },
        { kr: "우리가 늦은 게 아니라, 회의가 일찍 시작됐어.", en: "It's not that we're late, it's just that the meeting started early." },
        { kr: "내가 못하는 게 아니라, 그냥 연습이 더 필요해.", en: "It's not that I can't do it, it's just that I need more practice." },
        { kr: "이게 고장 난 게 아니라, 그냥 배터리가 없어.", en: "It's not that it's broken, it's just that the battery is dead." },
        { kr: "오늘 비가 오는 게 아니라, 그냥 좀 흐린 거야.", en: "It's not that it's raining today, it's just that it's cloudy." },
        { kr: "결과가 나쁜 게 아니라, 그냥 시간이 더 필요해.", en: "It's not that the result is bad, it's just that we need more time." },
        { kr: "계획이 바뀐 게 아니라, 그냥 조금 수정됐어.", en: "It's not that the plan changed, it's just that it was slightly modified." },
        { kr: "질문이 어려운 게 아니라, 그냥 답을 몰라.", en: "It's not that the question is hard, it's just that I don't know the answer." },

        // 일상 속 부드러운 거절/해명
        { kr: "도와주기 싫은 게 아니라, 그냥 하는 법을 몰라.", en: "It's not that I don't want to help, it's just that I don't know how." },
        { kr: "안 믿는 게 아니라, 그냥 좀 놀라워서 그래.", en: "It's not that I don't believe you, it's just that I'm surprised." },
        { kr: "집에 가고 싶은 게 아니라, 그냥 잠이 와.", en: "It's not that I want to go home, it's just that I'm sleepy." },
        { kr: "전화하기 싫은 게 아니라, 그냥 지금 회의 중이야.", en: "It's not that I don't want to call, it's just that I'm in a meeting." },
        { kr: "영어가 싫은 게 아니라, 그냥 좀 어려워.", en: "It's not that I don't like English, it's just that it's a bit hard." },
        { kr: "운전하기 싫은 게 아니라, 그냥 오늘 좀 피곤해.", en: "It's not that I don't want to drive, it's just that I'm tired today." },
        { kr: "요리하기 싫은 게 아니라, 그냥 재료가 없어.", en: "It's not that I don't want to cook, it's just that I have no ingredients." },
        { kr: "너랑 가기 싫은 게 아니라, 그냥 혼자 있고 싶어.", en: "It's not that I don't want to go with you, it's just that I want to be alone." },
        { kr: "이 책이 싫은 게 아니라, 그냥 너무 길어.", en: "It's not that I don't like this book, it's just that it's too long." },
        { kr: "모든 게 소용없는 게 아니라, 그냥 지금은 힘들어.", en: "It's not that it's no use, it's just that it's hard right now." }
    ];

    let currentTask = { kr: '', en: '' };
    let history = [];
    let playMode = 'manual';
    let autoTimer = null;

    function startTrainer() {
        document.getElementById('start-container').classList.add('hidden');
        document.getElementById('top-controls').classList.add('active');
        document.getElementById('action-area').classList.remove('hidden');
        generate();
    }

    function setPlayMode(mode) {
        playMode = mode;
        document.getElementById('mode-manual').className = `toggle-btn ${mode === 'manual' ? 'active' : ''}`;
        document.getElementById('mode-auto').className = `toggle-btn ${mode === 'auto' ? 'active' : ''}`;
        
        const isAuto = (mode === 'auto');
        document.getElementById('manual-ans-btn').disabled = isAuto;
        document.getElementById('manual-next-btn').disabled = isAuto;
        document.getElementById('manual-ans-btn').style.opacity = isAuto ? "0.5" : "1";
        document.getElementById('manual-next-btn').style.opacity = isAuto ? "0.5" : "1";

        if (isAuto) {
            generate();
        } else {
            clearTimeout(autoTimer);
            updateProgressBar(0, 0);
        }
    }

    function generate() {
        clearTimeout(autoTimer);
        if (currentTask.kr) history.push({...currentTask});
        if (history.length > 50) history.shift();
        const randomIndex = Math.floor(Math.random() * allClaims.length);
        currentTask = allClaims[randomIndex];
        updateDisplay();

        if (playMode === 'auto') {
            runAutoCycle();
        }
    }

    function runAutoCycle() {
        updateProgressBar(100, 5000); // 5초 대기
        autoTimer = setTimeout(() => {
            showAnswer();
            updateProgressBar(100, 3000); // 3초 정답 노출
            autoTimer = setTimeout(() => {
                generate();
            }, 3000);
        }, 5000);
    }

    function updateProgressBar(width, duration) {
        const bar = document.getElementById('auto-progress');
        bar.style.transition = 'none';
        bar.style.width = '0%';
        if(duration > 0) {
            setTimeout(() => {
                bar.style.transition = `width ${duration}ms linear`;
                bar.style.width = '100%';
            }, 10);
        }
    }

    function goBack() {
        if (history.length === 0) return;
        if (playMode === 'auto') setPlayMode('manual');
        currentTask = history.pop();
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('korean-task').innerText = currentTask.kr;
        const ans = document.getElementById('english-answer');
        ans.classList.remove('show');
        ans.innerText = currentTask.en;
    }

    function showAnswer() {
        document.getElementById('english-answer').classList.add('show');
    }

    const bannerMsgs = [
        { icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" },
        { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }
    ];
    let currentBannerIdx = 0;
    setInterval(() => {
        currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
        const msg = bannerMsgs[currentBannerIdx];
        document.getElementById('banner-icon').innerText = msg.icon;
        document.getElementById('banner-title').innerText = msg.text;
    }, 4000);
</script>

</body>
</html>
