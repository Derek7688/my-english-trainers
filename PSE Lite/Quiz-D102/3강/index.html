<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Core Pattern Trainer v11.0</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --btn-blue: #3b82f6;
            --accent-green: #10b981;
            --bg-gray: #f8fafc;
            --highlight-coral: #ef4444;
            --highlight-blue: #2563eb;
        }

        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; background-color: var(--bg-gray); margin: 0; padding: 40px 0; color: #334155; -webkit-font-smoothing: antialiased;
        }

        .card { 
            background: white; padding: 35px 25px; border-radius: 32px; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.04); 
            text-align: center; width: 95%; max-width: 530px; border: 1px solid #f1f5f9; position: relative; 
            display: flex; flex-direction: column; align-items: center;
        }
        
        .top-controls {
            display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 20px;
            order: 1;
        }
        .top-controls.active { display: flex; }

        h1 { 
            color: #0f172a; font-size: 20px !important; margin: 10px 0 8px 0; 
            font-weight: 800; letter-spacing: -0.04em; line-height: 1.2; order: 2;
        }

        .progress-counter {
            font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 20px; order: 2.5;
            background: #f1f5f9; padding: 4px 12px; border-radius: 100px; display: none;
        }
        .progress-counter.active { display: inline-block; }

        #korean-task { 
            font-size: 19px; font-weight: 600; margin: 15px 0 20px 0; min-height: 80px; 
            color: #1e293b; line-height: 1.4; display: flex; align-items: center; justify-content: center; 
            padding: 0 10px; letter-spacing: -0.03em; order: 3; width: 100%; white-space: nowrap; flex-wrap: nowrap;
        }

        .base-text { color: #475569; font-weight: 600; }
        .focus-suffix { font-size: 25px; font-weight: 900; letter-spacing: -0.02em; margin-left: 4px; display: inline; }
        .suffix-neg { color: var(--highlight-coral); }
        .suffix-pos { color: var(--highlight-blue); }

        .start-container { order: 4; margin-bottom: 10px; width: 100%; display: flex; flex-direction: column; gap: 16px; }
        
        .lvl-btn { 
            background: #0f172a; color: white; border: none; padding: 14px 40px; 
            border-radius: 100px; font-size: 15px; cursor: pointer; font-weight: 700; transition: all 0.2s; 
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15); width: 100%;
        }
        .top-controls .lvl-btn { padding: 6px 14px; font-size: 12px; width: auto; background: #f1f5f9; color: #334155; box-shadow: none; border: 1px solid #e2e8f0; }
        .lvl-btn:active { transform: scale(0.98); }

        .auto-toggle {
            display: flex; align-items: center; gap: 4px; background: #f1f5f9; padding: 4px; border-radius: 100px;
        }
        .toggle-btn {
            padding: 5px 14px; font-size: 12px; border-radius: 100px; cursor: pointer; font-weight: 700; border: none; color: #64748b; background: transparent;
        }
        .toggle-btn.active { background: white; color: #0f172a; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
        
        .answer-container {
            min-height: 90px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; width: 100%; order: 5;
        }

        #english-answer { 
            font-size: 17px; color: #047857; width: 100%; padding: 18px; 
            background: #ecfdf5; border-radius: 16px; border: 1px solid #a7f3d0; font-weight: 700; 
            line-height: 1.5; visibility: hidden; opacity: 0; transition: opacity 0.25s ease; tracking: -0.01em;
        }
        #english-answer.show { visibility: visible; opacity: 1; }

        #action-area { order: 6; width: 100%; }
        .main-controls { display: flex; justify-content: center; gap: 10px; }
        .ans-btn { background: #2563eb; color: white; flex: 1; padding: 14px; border-radius: 16px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; box-shadow: 0 4px 12px rgba(37,99,235,0.15); }
        .next-btn { background: #475569; color: white; flex: 1; padding: 14px; border-radius: 16px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .back-btn { background: transparent; color: #94a3b8; padding: 10px; border-radius: 14px; font-weight: 600; cursor: pointer; border: 1px dashed #e2e8f0; font-size: 13px; margin-top: 16px; width: 100%; }
        
        .hidden { display: none !important; }
        #banner-container { order: 7; }

        #auto-progress {
            width: 0%; height: 4px; background: #f59e0b; position: absolute; top: 0; left: 0; border-radius: 32px 32px 0 0; transition: width 0.1s linear;
        }

        .setting-panel {
            width: 100%; display: flex; flex-direction: column; gap: 16px; background: #fafafa; border: 1px solid #f1f5f9; padding: 20px; border-radius: 20px;
        }
        .setting-group-title {
            font-size: 12px; font-weight: 800; color: #94a3b8; text-align: center; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .modern-chips {
            display: flex; flex-wrap: wrap; gap: 6px; width: 100%; justify-content: center;
        }
        .modern-chip {
            background: white; border: 1px solid #e2e8f0; padding: 7px 16px; border-radius: 100px; font-size: 12px; font-weight: 700;
            color: #475569; cursor: pointer; transition: all 0.15s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .modern-chip.active {
            background: #0f172a; border-color: #0f172a; color: white;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="auto-progress"></div>

    <div id="top-controls" class="top-controls">
        <div id="lvl-container-mini"></div>
        <div class="auto-toggle">
            <button id="mode-manual" class="toggle-btn active" onclick="setPlayMode('manual')">수동</button>
            <button id="mode-auto" class="toggle-btn" onclick="setPlayMode('auto')">자동</button>
        </div>
    </div>

    <h1>⚡ 실전 필수 문형 변형 트레이너</h1>

    <div id="progress-counter" class="progress-counter">[ 0 / 0 ]</div>
    
    <div id="korean-task">
        <span class="base-text">옵션을 설정한 후</span>
        <span class="focus-suffix suffix-pos">시작하세요!</span>
    </div>
    
    <div id="start-container" class="start-container">
        <div class="setting-panel">
            <div>
                <div class="setting-group-title">⏱️ 시제 선택</div>
                <div class="modern-chips mt-2" id="filter-tense">
                    <div class="modern-chip active" onclick="toggleFilter(this, 'tense', 'present_simple')">현재 시제</div>
                    <div class="modern-chip active" onclick="toggleFilter(this, 'tense', 'present_continuous')">현재 진행</div>
                    <div class="modern-chip active" onclick="toggleFilter(this, 'tense', 'past_simple')">과거 시제</div>
                    <div class="modern-chip active" onclick="toggleFilter(this, 'tense', 'past_continuous')">과거 진행</div>
                </div>
            </div>

            <div>
                <div class="setting-group-title">📐 문장 형태</div>
                <div class="modern-chips mt-2" id="filter-type">
                    <div class="modern-chip active" onclick="toggleFilter(this, 'type', 'affirmative')">평서문</div>
                    <div class="modern-chip active" onclick="toggleFilter(this, 'type', 'negative')">부정문</div>
                    <div class="modern-chip active" onclick="toggleFilter(this, 'type', 'interrogative')">의문문</div>
                    <div class="modern-chip active" onclick="toggleFilter(this, 'type', 'negative_interrogative')">부정 의문문</div>
                </div>
            </div>
        </div>

        <button id="btn-start-main" class="lvl-btn" onclick="startTrainer()">훈련 세션 시작</button>
    </div>

    <div class="answer-container">
        <div id="english-answer"></div>
    </div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button id="manual-ans-btn" class="ans-btn" onclick="showAnswer()">정답 확인 👀</button>
            <button id="manual-next-btn" class="next-btn" onclick="generate()">다음 상황 🎲</button>
        </div>
        <button class="back-btn" onclick="goBack()">이전 문장으로 되돌리기 ↩️</button>
    </div>

    <div id="banner-container" class="promo-banner bg-white border border-blue-50 p-3 rounded-[1.5rem] mt-10 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-w-sm mx-auto" 
         onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
        <div id="banner-content" class="banner-inner flex items-center gap-3 text-left">
            <div id="banner-icon" class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-blue-200 shadow-lg text-white font-bold">🔥</div>
            <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center">
                <h3 id="banner-title" class="font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
            </div>
        </div>
    </div>
</div>

    let activeFilters = {
        tense: ['present_simple', 'present_continuous', 'past_simple', 'past_continuous'],
        type: ['affirmative', 'negative', 'interrogative', 'negative_interrogative']
    };

    let filteredClaims = [];
    let orderArray = [];        
    let orderPointer = -1;      
    let currentTask = {};
    let history = [];           
    let playMode = 'manual';
    let autoTimer = null;

    function toggleFilter(element, category, val) {
        const arr = activeFilters[category];
        const idx = arr.indexOf(val);
        if (idx > -1) {
            if(arr.length === 1) return; 
            arr.splice(idx, 1);
            element.classList.remove('active');
        } else {
            arr.push(val);
            element.classList.add('active');
        }
    }

    function applyFilters() {
        filteredClaims = claimsPool.filter(item => {
            return activeFilters.tense.includes(item.tense) && activeFilters.type.includes(item.type);
        });
    }

    function shuffleOrder() {
        orderArray = Array.from({length: filteredClaims.length}, (_, i) => i);
        for (let i = orderArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [orderArray[i], orderArray[j]] = [orderArray[j], orderArray[i]];
        }
        orderPointer = 0;
    }

    function startTrainer() {
        applyFilters();
        if(filteredClaims.length === 0) {
            alert("선택된 조건에 맞는 트레이닝 카드가 없습니다. 다시 선택해 주세요.");
            return;
        }

        document.getElementById('start-container').classList.add('hidden');
        document.getElementById('top-controls').classList.add('active');
        document.getElementById('action-area').classList.remove('hidden');
        document.getElementById('progress-counter').classList.add('active');
        
        document.getElementById('lvl-container-mini').innerHTML = 
            `<button class="lvl-btn" onclick="goHome()">↩ Home</button>`;
        
        shuffleOrder();
        generate();
    }

    function goHome() {
        clearTimeout(autoTimer);
        updateProgressBar(0, 0);
        
        document.getElementById('start-container').classList.remove('hidden');
        document.getElementById('top-controls').classList.remove('active');
        document.getElementById('action-area').classList.add('hidden');
        document.getElementById('progress-counter').classList.remove('active');
        
        document.getElementById('korean-task').innerHTML = `
            <span class="base-text">옵션을 설정한 후</span>
            <span class="focus-suffix suffix-pos">시작하세요!</span>
        `;
        document.getElementById('english-answer').classList.remove('show');
        
        currentTask = {};
        history = [];
        orderPointer = -1;
    }

    function setPlayMode(mode) {
        playMode = mode;
        document.getElementById('mode-manual').className = `toggle-btn ${mode === 'manual' ? 'active' : ''}`;
        document.getElementById('mode-auto').className = `toggle-btn ${mode === 'auto' ? 'active' : ''}`;
        
        const isAuto = (mode === 'auto');
        document.getElementById('manual-ans-btn').disabled = isAuto;
        document.getElementById('manual-next-btn').disabled = isAuto;
        document.getElementById('manual-ans-btn').style.opacity = isAuto ? "0.4" : "1";
        document.getElementById('manual-next-btn').style.opacity = isAuto ? "0.4" : "1";

        if (isAuto) {
            generate();
        } else {
            clearTimeout(autoTimer);
            updateProgressBar(0, 0);
        }
    }

    function generate() {
        clearTimeout(autoTimer);
        
        if (currentTask.base) {
            history.push({...currentTask});
        }
        if (history.length > 50) history.shift();

        if (orderPointer >= orderArray.length) {
            shuffleOrder();
        }

        const targetIndex = orderArray[orderPointer];
        currentTask = filteredClaims[targetIndex];
        
        updateDisplay();
        document.getElementById('progress-counter').innerText = `[ ${orderPointer + 1} / ${filteredClaims.length} ]`;
        
        orderPointer++;

        if (playMode === 'auto') {
            runAutoCycle();
        }
    }

    function runAutoCycle() {
        updateProgressBar(100, 5000);
        autoTimer = setTimeout(() => {
            showAnswer();
            updateProgressBar(100, 3000);
            autoTimer = setTimeout(() => {
                generate();
            }, 3000);
        }, 5000);
    }

    function updateProgressBar(width, duration) {
        const bar = document.getElementById('auto-progress');
        bar.style.transition = 'none';
        bar.style.width = '0%';
        if(duration > 0) {
            setTimeout(() => {
                bar.style.transition = `width ${duration}ms linear`;
                bar.style.width = '100%';
            }, 10);
        }
    }

    function goBack() {
        if (history.length === 0) return;
        if (playMode === 'auto') setPlayMode('manual');
        
        orderPointer--;
        if(orderPointer < 1) orderPointer = 1;

        currentTask = history.pop();
        updateDisplay();
        document.getElementById('progress-counter').innerText = `[ ${orderPointer} / ${filteredClaims.length} ]`;
    }

    function updateDisplay() {
        const taskBox = document.getElementById('korean-task');
        const colorClass = currentTask.isNeg ? 'suffix-neg' : 'suffix-pos';
        
        taskBox.innerHTML = `
            <span class="base-text">${currentTask.base}</span>
            <span class="focus-suffix ${colorClass}">${currentTask.suffix}</span>
        `;
        
        const ans = document.getElementById('english-answer');
        ans.classList.remove('show');
        ans.innerText = currentTask.en;
    }

    function showAnswer() {
        document.getElementById('english-answer').classList.add('show');
    }

    const bannerMsgs = [{ icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" }, { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }];
    let currentBannerIdx = 0;
    setInterval(() => {
        currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
        const msg = bannerMsgs[currentBannerIdx];
        document.getElementById('banner-icon').innerText = msg.icon;
        document.getElementById('banner-title').innerText = msg.text;
    }, 4000);
</script>

</body>
</html>
