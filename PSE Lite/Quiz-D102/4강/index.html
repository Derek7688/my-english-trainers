<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>What Would You Do? - 성인 기초 회화 앱</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --btn-gradient: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #2d3748;
            --text-sub: #4a5568;
            --text-hint: #718096;
        }

        body {
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            width: 95%;
            max-width: 460px;
            height: 92vh; 
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 25px 22px 20px 22px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            border: 1px solid #eee;
        }

        /* 상단 네비 바 영역 (독립 격리) */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            height: 80px; 
            position: relative;
            flex-shrink: 0;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 12px;
            margin-bottom: 10px; /* 고정 간격 확보 */
        }

        .left-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-start;
        }

        .home-btn {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            display: none;
            transition: transform 0.2s;
            padding: 0;
        }
        .home-btn:hover { transform: scale(1.1); }

        .switch-container {
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-sub);
            cursor: pointer;
            user-select: none;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e0;
            transition: .3s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px; width: 20px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #4a5568;
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .counter {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-hint);
            display: none;
            background: #edf2f7;
            padding: 4px 12px;
            border-radius: 15px;
        }

        /* 메인 시작 화면 */
        #start-screen {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            gap: 35px;
        }

        #start-screen h1 {
            font-size: 30px;
            word-break: keep-all;
            line-height: 1.5;
            margin: 0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .btn-main {
            background: var(--btn-gradient);
            color: white;
            border: none;
            padding: 15px 45px;
            font-size: 19px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.4);
            transition: all 0.3s ease;
        }

        /* 질문 콘텐츠 전체 레이아웃 (남은 가상 화면의 높이를 채우도록 flex-grow 설정) */
        #question-screen {
            display: none;
            width: 100%;
            flex-grow: 1;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 0;
        }

        /* 📌 핵심 수정: 질문과 대답 박스가 위치하는 중앙 정렬 공간 */
        .question-content {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* 👈 요소를 화면 세로축의 '정중앙'에 정렬 */
            align-items: center;
            width: 100%;
            min-height: 0;
        }

        /* 영어 질문 스타일 (정중앙 배치 핵심) */
        .en-q {
            font-size: 24px; 
            font-weight: 700;
            line-height: 1.4;
            color: #1a202c;
            word-break: keep-all;
            margin-bottom: 16px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* 흔들림 방지 고정 구조 */
        .kr-q-box {
            height: 75px; 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-bottom: 15px;
        }

        .kr-q {
            font-size: 18px;
            font-weight: 600;
            color: #313d4f;
            line-height: 1.5;
            word-break: keep-all;
            background-color: #f7fafc;
            border-left: 4px solid #667eea;
            padding: 8px 16px;
            border-radius: 4px 12px 12px 4px;
            width: 95%;
            visibility: hidden; 
            opacity: 0;
            transition: opacity 0.25s ease, visibility 0.25s;
        }

        .kr-q.show {
            visibility: visible;
            opacity: 1;
        }

        .example-box {
            height: 85px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.25s ease, visibility 0.25s;
        }

        .example-box.show {
            visibility: visible;
            opacity: 1;
        }

        .example-ans {
            font-size: 17px;
            color: #4a5568;
            font-style: italic;
            font-weight: 600;
            line-height: 1.4;
            word-break: keep-all;
        }

        .example-translation {
            font-size: 15px;
            color: #718096;
            font-weight: 500;
            margin-top: 5px;
            word-break: keep-all;
        }

        /* 하단 컨트롤 및 배너 상향 고정 */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 12px;
            margin-bottom: 15px; 
            flex-shrink: 0;
        }

        .btn-nav {
            flex: 1;
            background: #edf2f7;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 700;
            color: #4a5568;
            transition: all 0.2s;
        }

        .btn-nav:hover:not(:disabled) {
            background: #e2e8f0;
            color: #1a202c;
        }

        .btn-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #banner-container {
            flex-shrink: 0;
            width: 100%;
            margin-bottom: 35px; /* 바닥에서 위로 끌어올림 유지 */
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <div class="left-controls">
            <button class="home-btn" id="home-btn" onclick="goHome()">🏠</button>
            
            <label class="switch-container" id="kr-switch-container">
                <div class="switch">
                    <input type="checkbox" id="kr-toggle" onchange="toggleKorean()">
                    <span class="slider"></span>
                </div>
                <span>한국어 켜기</span>
            </label>

            <label class="switch-container" id="ans-switch-container">
                <div class="switch">
                    <input type="checkbox" id="ans-toggle" onchange="toggleAnswer()">
                    <span class="slider"></span>
                </div>
                <span>예시 답변 보기</span>
            </label>
        </div>
        <div class="counter" id="counter">1 / 100</div>
    </div>

    <div id="start-screen">
        <h1>다음 상황에서<br>당신은 무엇을 할 건가요?</h1>
        <button class="btn-main" onclick="startApp()">시작하기</button>
    </div>

    <div id="question-screen">
        <div class="question-content">
            <div class="en-q" id="en-question"></div>
            
            <div class="kr-q-box">
                <div class="kr-q" id="kr-question"></div>
            </div>
            
            <div class="example-box" id="example-box">
                <div class="example-ans" id="example-answer"></div>
                <div class="example-translation" id="example-translation"></div>
            </div>
        </div>

        <div class="nav-controls">
            <button class="btn-nav" id="prev-btn" onclick="prevQuestion()">이전 질문</button>
            <button class="btn-nav" id="next-btn" onclick="nextQuestion()">다음 질문</button>
        </div>
    </div>

    <div id="banner-container" class="promo-banner bg-white border border-blue-50 p-3 rounded-[1.5rem] cursor-pointer shadow-lg transition-all active:scale-95 max-w-sm mx-auto" 
         onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
        <div id="banner-content" class="banner-inner flex items-center gap-3 text-left">
            <div id="banner-icon" class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-blue-200 shadow-lg text-white font-bold">🔥</div>
            <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center">
                <h3 id="banner-title" class="font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
            </div>
        </div>
    </div>
</div>

<script>
    // 100개 질문 데이터셋 (유지)
    const originalQuestions = [
        { en: "Your best friend calls you at 3:00 AM.", kr: "절친이 새벽 3시에 전화를 합니다.", ans: "Ex) I will answer it because it can be an emergency.", trans: "(해석: 비상사태일 수 있으니 전화를 받을 것이다.)" },
        { en: "You win 1 billion won in the lottery.", kr: "로또로 10억 원에 당첨됩니다.", ans: "Ex) I am going to buy a small apartment first.", trans: "(해석: 우선 작은 아파트를 살 계획이다.)" },
        { en: "Your partner cheats on you.", kr: "애인(배우자)이 바람을 피웁니다.", ans: "Ex) I will break up with them right away.", trans: "(해석: 당장 헤어질 것이다.)" },
        { en: "Your close friend asks to borrow 10 million won.", kr: "친한 친구가 1,000만 원만 빌려달라고 합니다.", ans: "Ex) I will tell them that I don't have money.", trans: "(해석: 나는 돈이 없다고 말할 것이다.)" },
        { en: "The traffic light changes to yellow.", kr: "신호등이 노란불로 바뀝니다.", ans: "Ex) I will step on the brake and stop.", trans: "(해석: 브레이크를 밟고 멈출 것이다.)" },
        { en: "There is no food at home and you are hungry.", kr: "집에 음식이 하나도 없고 배가 고픕니다.", ans: "Ex) I am going to order food with my phone.", trans: "(해석: 휴대폰으로 음식을 배달시킬 생각이다.)" },
        { en: "You have a plan with a friend, but it rains and you are too tired.", kr: "친구와 약속이 있는데, 비가 오고 너무 피곤합니다.", ans: "Ex) I will text my friend to change the day.", trans: "(해석: 약속 날짜를 바꾸자고 친구에게 문자할 것이다.)" },
        { en: "Someone says hello to you, but you do not know them.", kr: "누군가 나에게 인사를 하는데 누군지 모르겠습니다.", ans: "Ex) I will smile and say hello back.", trans: "(해석: 웃으며 같이 인사해 줄 것이다.)" },
        { en: "You send 'I love you' to your boss by mistake.", kr: "직장 상사에게 실수로 '사랑해'라고 보냅니다.", ans: "Ex) I will send a text and say sorry quickly.", trans: "(해석: 빠르게 죄송하다고 문자를 다시 보낼 것이다.)" },
        { en: "You find a black wallet with a lot of money on the street.", kr: "길거리에서 돈이 많이 든 검은색 지갑을 발견합니다.", ans: "Ex) I am going to take it to the police station.", trans: "(해석: 경찰서로 가져갈 계획이다.)" },
        { en: "You see your friend's partner holding hands with another person.", kr: "친구의 애인이 다른 사람과 손을 잡고 있는 걸 봅니다.", ans: "Ex) I am going to take a photo and call my friend.", trans: "(해석: 사진을 찍어서 친구에게 전화할 생각이다.)" },
        { en: "You are in a public bathroom, but there is no toilet paper.", kr: "공중화장실에 있는데 휴지가 없습니다.", ans: "Ex) I will call my friend for help.", trans: "(해석: 친구에게 도와달라고 전화할 것이다.)" },
        { en: "You are at a cafe, and the barista is your ideal type.", kr: "카페에 있는데 바리스타가 내 이상형입니다.", ans: "Ex) I will give my phone number to them.", trans: "(해석: 그 사람에게 내 전화번호를 줄 것이다.)" },
        { en: "A stranger tells you that your zipper is down.", kr: "낯선 사람이 내 바지 지퍼가 열렸다고 말해줍니다.", ans: "Ex) I will turn around and zip it up fast.", trans: "(해석: 뒤돌아서 빠르게 지퍼를 올릴 것이다.)" },
        { en: "You go to a party, but you only know the host.", kr: "파티에 갔는데 주최자 한 명만 아는 사람입니다.", ans: "Ex) I am not going to stay there long.", trans: "(해석: 그곳에 오래 머물지 않을 계획이다.)" },
        { en: "You scratch an expensive sports car while parking.", kr: "주차를 하다가 실수로 비싼 스포츠카를 긁었습니다.", ans: "Ex) I will call the car owner right away.", trans: "(해석: 차 주인에게 바로 전화할 것이다.)" },
        { en: "You are on a first date, and the other person has food in their teeth.", kr: "첫 소개팅 자리인데 상대방 이빨에 고춧가루가 끼었습니다.", ans: "Ex) I will hand them a small mirror quietly.", trans: "(해석: 조용히 작은 거울을 건넬 것이다.)" },
        { en: "Your boss gives you a big work at 5:50 PM.", kr: "오후 5시 50분에 상사가 큰 업무를 줍니다.", ans: "Ex) I am going to do it tomorrow morning.", trans: "(해석: 내일 아침에 그 일을 할 생각이다.)" },
        { en: "You arrive at the airport, but you do not have your passport.", kr: "공항에 도착했는데 여권이 없습니다.", ans: "Ex) I will go back home by taxi.", trans: "(해석: 택시를 타고 집으로 돌아갈 것이다.)" },
        { en: "The restaurant serves you the wrong food, but it looks good.", kr: "식당에서 다른 음식을 잘못 주었는데 맛있어 보입니다.", ans: "Ex) I am going to eat it anyway.", trans: "(해석: 그냥 그걸 먹을 생각이다.)" },
        { en: "You drop your new smartphone into the toilet.", kr: "새 스마트폰을 변기 속에 떨어뜨립니다.", ans: "Ex) I will take it out fast and dry it.", trans: "(해석: 빠르게 꺼내서 말릴 것이다.)" },
        { en: "Your favorite actor sits next to you on the subway.", kr: "지하철에서 가장 좋아하는 배우가 내 옆에 앉습니다.", ans: "Ex) I will ask for a photo very politely.", trans: "(해석: 아주 정중하게 사진을 요청할 것이다.)" },
        { en: "You have only 24 hours left to live.", kr: "살날이 딱 24시간 남았습니다.", ans: "Ex) I am going to eat delicious food with my family.", trans: "(해석: 가족들과 맛있는 음식을 먹을 계획이다.)" },
        { en: "Your friend cooks bad food and asks, 'Is it good?'", kr: "친구가 맛없는 요리를 해주고 '맛있어?'라고 물어봅니다.", ans: "Ex) I will say, 'Yes, it is very good.'", trans: "(해석: 응, 아주 맛있어라고 말할 것이다.)" },
        { en: "You can go to any country in one second, but only once a year.", kr: "1년에 딱 한 번, 1초 만에 원하는 나라로 갈 수 있게 됩니다.", ans: "Ex) I am going to visit Hawaii next winter.", trans: "(해석: 다음 겨울에 하와이에 갈 계획이다.)" },
        { en: "Your neighbor plays loud music at 11:00 PM every day.", kr: "이웃이 매일 밤 11시에 시끄럽게 음악을 틉니다.", ans: "Ex) I am going to call the management office.", trans: "(해석: 관리사무소에 전화할 생각이다.)" },
        { en: "You can read other people's minds from today.", kr: "오늘부터 다른 사람의 마음을 읽을 수 있습니다.", ans: "Ex) I will use it to understand my boss better.", trans: "(해석: 상사를 더 잘 이해하기 위해 그것을 쓸 것이다.)" },
        { en: "You get into an elevator, and your ex is inside.", kr: "엘리베이터를 탔는데 전 애인이 타 있습니다.", ans: "Ex) I will just look at my phone.", trans: "(해석: 그냥 내 휴대폰만 볼 것이다.)" },
        { en: "You win 10 billion won, but you cannot tell anyone.", kr: "100억 원에 당첨되었지만 아무에게도 말하면 안 됩니다.", ans: "Ex) I am going to keep working at my job.", trans: "(해석: 회사에 계속 다닐 생각이다.)" },
        { en: "Your friend gets a terrible haircut and asks for your opinion.", kr: "친구가 머리를 아주 이상하게 자르고 어떠냐고 묻습니다.", ans: "Ex) I will say, 'It looks clean and neat.'", trans: "(해석: 깔끔해 보인다고 말할 것이다.)" },
        { en: "You get a job offer from a famous company in the US.", kr: "미국의 유명한 회사에서 이직 제안이 옵니다.", ans: "Ex) I am going to move to America next month.", trans: "(해석: 다음 달에 미국으로 이사할 계획이다.)" },
        { en: "You talk bad about a colleague, and they are behind you.", kr: "동료 뒷담화를 하고 있는데 그 동료가 뒤에 서 있습니다.", ans: "Ex) I will turn around and say sorry right away.", trans: "(해석: 뒤돌아서 바로 미안하다고 말할 것이다.)" },
        { en: "You have credit card debt, but you want to buy a luxury bag.", kr: "카드 할부가 밀려있는데 명품 가방이 사고 싶습니다.", ans: "Ex) I am not going to buy it this year.", trans: "(해석: 올해는 사지 않을 계획이다.)" },
        { en: "An unknown number texts you, 'I know your secret.'", kr: "모르는 번호로 '네 비밀을 안다'는 문자가 옵니다.", ans: "Ex) I am going to block the number.", trans: "(해석: 그 번호를 차단할 생각이다.)" },
        { en: "You can only choose one: no internet for a year vs no coffee for a year.", kr: "인터넷 없이 1년 살기 vs 커피 없이 1년 살기 중 골라야 합니다.", ans: "Ex) I will give up coffee to keep the internet.", trans: "(해석: 인터넷을 쓰기 위해 커피를 포기할 것이다.)" },
        { en: "You wake up and find out you are 60 years old.", kr: "아침에 일어났는데 내 나이가 60살이 되어 있습니다.", ans: "Ex) I will check my bank account first.", trans: "(해석: 내 은행 계좌부터 확인할 것이다.)" },

    let questions = [];
    let currentIndex = 0;
    let showKorean = false;
    let showAnswer = false;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function startApp() {
        questions = shuffle([...originalQuestions]);
        currentIndex = 0;
        
        showKorean = false;
        showAnswer = false;
        document.getElementById('kr-toggle').checked = false;
        document.getElementById('ans-toggle').checked = false;
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('question-screen').style.display = 'flex';
        document.getElementById('home-btn').style.display = 'block';
        document.getElementById('kr-switch-container').style.display = 'flex';
        document.getElementById('ans-switch-container').style.display = 'flex';
        document.getElementById('counter').style.display = 'block';
        
        updateQuestion();
    }

    function goHome() {
        document.getElementById('start-screen').style.display = 'flex';
        document.getElementById('question-screen').style.display = 'none';
        document.getElementById('home-btn').style.display = 'none';
        document.getElementById('kr-switch-container').style.display = 'none';
        document.getElementById('ans-switch-container').style.display = 'none';
        document.getElementById('counter').style.display = 'none';
    }

    function updateQuestion() {
        const q = questions[currentIndex];
        document.getElementById('en-question').innerText = q.en;
        document.getElementById('kr-question').innerText = q.kr;
        document.getElementById('example-answer').innerText = q.ans;
        document.getElementById('example-translation').innerText = q.trans;

        document.getElementById('counter').innerText = `${currentIndex + 1} / ${questions.length}`;

        const krQ = document.getElementById('kr-question');
        if (showKorean) {
            krQ.classList.add('show');
        } else {
            krQ.classList.remove('show');
        }

        const ansBox = document.getElementById('example-box');
        if (showAnswer) {
            ansBox.classList.add('show');
        } else {
            ansBox.classList.remove('show');
        }

        document.getElementById('prev-btn').disabled = currentIndex === 0;
        document.getElementById('next-btn').disabled = currentIndex === questions.length - 1;
    }

    function toggleKorean() {
        showKorean = document.getElementById('kr-toggle').checked;
        const krQ = document.getElementById('kr-question');
        if (showKorean) {
            krQ.classList.add('show');
        } else {
            krQ.classList.remove('show');
        }
    }

    function toggleAnswer() {
        showAnswer = document.getElementById('ans-toggle').checked;
        const ansBox = document.getElementById('example-box');
        if (showAnswer) {
            ansBox.classList.add('show');
        } else {
            ansBox.classList.remove('show');
        }
    }

    function nextQuestion() {
        if (currentIndex < questions.length - 1) {
            currentIndex++;
            updateQuestion();
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            updateQuestion();
        }
    }

    const bannerMsgs = [
        { icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" }, 
        { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }
    ];
    let currentBannerIdx = 0;
    setInterval(() => {
        currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
        const msg = bannerMsgs[currentBannerIdx];
        document.getElementById('banner-icon').innerText = msg.icon;
        document.getElementById('banner-title').innerText = msg.text;
    }, 4000);
</script>

</body>
</html>
