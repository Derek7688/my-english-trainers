<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>There is / There are Core Pattern Trainer</title>
    <!-- Pretendard 폰트 불러오기 (CDN) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-blue: #1a365d;
            --btn-blue: #2b6cb0;
            --accent-green: #27ae60;
            --bg-gray: #f8f9fa;
        }

        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; background-color: var(--bg-gray); margin: 0; padding: 40px 0; color: #333; -webkit-font-smoothing: antialiased;
        }

        .card { 
            background: white; padding: 30px 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center; width: 95%; max-width: 500px; border: 1px solid #eee; position: relative; 
            display: flex; flex-direction: column; align-items: center;
        }
        
        /* 상단 제어 바 (구석 버튼들) */
        .top-controls {
            display: none; width: 100%; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;
            order: 1; gap: 8px;
        }
        .top-controls.active { display: flex; }

        /* 우측 상단 토글들 세로 정렬 */
        .right-controls {
            display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
        }

        /* 제목 스타일 */
        h1 { 
            color: var(--primary-blue); font-size: 20px !important; margin: 10px 0 5px 0; 
            font-weight: 900; letter-spacing: -0.05em; line-height: 1.2; order: 2;
        }

        /* 진행률 표시기 */
        .progress-counter {
            font-size: 13px; font-weight: 700; color: #718096; margin-bottom: 15px; order: 2.5;
            background: #edf2f7; padding: 2px 10px; border-radius: 20px; display: none;
        }
        .progress-counter.active { display: inline-block; }

        /* 큰 문구 및 힌트 컨테이너 영역 고정 */
        .task-container {
            min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; order: 3; margin: 10px 0 15px 0; width: 100%;
        }

        #korean-task { 
            font-size: 19px; font-weight: 700; 
            color: #2d3748; line-height: 1.6; word-break: keep-all; 
            padding: 0 10px; letter-spacing: -0.02em;
        }

        /* 💡 힌트 텍스트 스타일 */
        #hint-text {
            font-size: 14px; font-weight: 600; color: #3182ce; margin-top: 8px;
            background: #ebf8ff; padding: 4px 12px; border-radius: 12px;
            display: none; word-break: keep-all;
        }
        #hint-text.show { display: inline-block; }

        /* 시작 버튼 컨테이너: 큰 문구 아래 */
        .start-container { order: 4; margin-bottom: 20px; }
        .lvl-btn { 
            background: var(--btn-blue); color: white; border: none; padding: 12px 32px; 
            border-radius: 50px; font-size: 15px; cursor: pointer; font-weight: 800; transition: all 0.2s; 
            box-shadow: 0 4px 12px rgba(43, 108, 176, 0.2);
        }
        /* 구석으로 이동했을 때의 다시 섞기 버튼 스타일 */
        .top-controls .lvl-btn { padding: 6px 14px; font-size: 12px; opacity: 0.9; box-shadow: 0 2px 8px rgba(43, 108, 176, 0.15); margin-top: 2px; }
        .lvl-btn:active { transform: scale(0.95); }

        /* 토글 버튼 공통 */
        .auto-toggle {
            display: flex; align-items: center; gap: 3px; background: #eee; padding: 4px; border-radius: 12px;
        }
        .toggle-btn {
            padding: 4px 10px; font-size: 11px; border-radius: 8px; cursor: pointer; font-weight: 700; border: none; color: #868e96; transition: all 0.15s;
        }
        .toggle-btn.active { background: var(--primary-blue); color: white; }
        .toggle-btn.hint-active { background: #3182ce; color: white; }
        
        /* 정답창 영역 고정 */
        .answer-container {
            min-height: 90px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; width: 100%; order: 5;
        }

        #english-answer { 
            font-size: 16px; color: var(--accent-green); width: 100%; padding: 15px; 
            background: #f0fff4; border-radius: 12px; border: 1px solid #c6f6d5; font-weight: 600; 
            line-height: 1.5; visibility: hidden; opacity: 0; transition: opacity 0.3s ease;
        }
        #english-answer.show { visibility: visible; opacity: 1; }

        #action-area { order: 6; width: 100%; }
        .main-controls { display: flex; justify-content: center; gap: 8px; }
        .ans-btn { background: var(--btn-blue); color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .next-btn { background: #4a5568; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .back-btn { background: transparent; color: #adb5bd; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; border: 1px dashed #dee2e6; font-size: 13px; margin-top: 15px; width: 100%; }
        
        .hidden { display: none !important; }
        #banner-container { order: 7; }

        /* 자동 모드 진행 바 */
        #auto-progress {
            width: 0%; height: 4px; background: #f59e0b; position: absolute; top: 0; left: 0; border-radius: 24px 24px 0 0; transition: width 0.1s linear;
        }
    </style>
</head>

<div class="card">
    <div id="auto-progress"></div>

    <!-- 연습 시작 후 나타날 구석 제어 바 -->
    <div id="top-controls" class="top-controls">
        <div id="lvl-container-mini"></div>
        <div class="right-controls">
            <!-- 수동/자동 토글 버튼 -->
            <div class="auto-toggle">
                <button id="mode-manual" class="toggle-btn active" onclick="setPlayMode('manual')">수동</button>
                <button id="mode-auto" class="toggle-btn" onclick="setPlayMode('auto')">자동</button>
            </div>
            <!-- 💡 힌트 토글 버튼 -->
            <div class="auto-toggle">
                <button id="hint-off" class="toggle-btn active" onclick="setHintMode(false)">힌트 끔</button>
                <button id="hint-on" class="toggle-btn" onclick="setHintMode(true)">힌트 켬</button>
            </div>
        </div>
    </div>

    <h1>⚡ There is / There are 핵심 문형 트레이너</h1>

    <!-- 실시간 진행 갯수 카운터 -->
    <div id="progress-counter" class="progress-counter">[ 0 / 113 ]</div>
    
    <!-- 한국어 문제와 힌트 텍스트가 함께 들어가는 공간 -->
    <div class="task-container">
        <div id="korean-task">입으로 소리 내어 훈련하세요! 🗣️</div>
        <div id="hint-text">💡 힌트 영역</div>
    </div>
    
    <!-- 첫 화면 중앙 시작 버튼 -->
    <div id="start-container" class="start-container">
        <button id="btn-start-main" class="lvl-btn" onclick="startTrainer()">트레이닝 시작</button>
    </div>

    <div class="answer-container">
        <div id="english-answer"></div>
    </div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button id="manual-ans-btn" class="ans-btn" onclick="showAnswer()">정답 확인 👀</button>
            <button id="manual-next-btn" class="next-btn" onclick="generate()">다음 상황 🎲</button>
        </div>
        <button class="back-btn" onclick="goBack()">이전 문장으로 되돌리기 ↩️</button>
    </div>

    <!-- PSE 광고 배너 -->
    <div id="banner-container" class="promo-banner bg-white border border-blue-50 p-3 rounded-[1.5rem] mt-10 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-w-sm mx-auto" 
         onclick="window.open('https://www.pse-learning.co.kr/course/course_list.jsp?cid=120849', '_blank')">
        <div id="banner-content" class="banner-inner flex items-center gap-3 text-left">
            <div id="banner-icon" class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-blue-200 shadow-lg text-white font-bold">🔥</div>
            <div class="flex-1 overflow-hidden h-10 flex flex-col justify-center">
                <h3 id="banner-title" class="font-black text-slate-800 text-[13px] tracking-tight leading-tight">하루 1분 투자! 실전 패턴 Pop!</h3>
                <p class="text-blue-600 font-bold text-[9px] uppercase tracking-widest mt-0.5">수강 신청하고 영어 실력 Pop! →</p>
            </div>
        </div>
    </div>
</div>

        { "kr": "서랍에 깨끗한 양말들이 있어요.", "en": "There are clean socks in the drawer.", "hint": "clean socks + the drawer" },
        { "kr": "트렁크에 우산이 있었어.", "en": "There was an umbrella in the trunk.", "hint": "an umbrella + the trunk" },
        { "kr": "화요일에 세미나 있어요?", "en": "Is there a seminar on Tuesday?", "hint": "a seminar + Tuesday" },
        { "kr": "부작용들이 있었어.", "en": "There were side effects.", "hint": "side effects" },
        { "kr": "이웃들의 항의가 있나요?", "en": "Are there complaints from the neighbors?", "hint": "complaints + the neighbors" },
        { "kr": "해변에서 콘서트가 있었어.", "en": "There was a concert at the beach.", "hint": "a concert + the beach" },
        { "kr": "천장에 물 새는 곳이 있어요.", "en": "There is a leak in the ceiling.", "hint": "a leak + the ceiling" },
        { "kr": "탁자에 흠집이 하나 있어.", "en": "There’s a scratch on the table.", "hint": "a scratch + the table" },
        { "kr": "공원 근처엔 화장실이 없어.", "en": "There isn’t a restroom near the park.", "hint": "a restroom + the park" },
        { "kr": "네 가방에 충전 케이블 있니?", "en": "Is there a charging cable in your bag?", "hint": "a charging cable + your bag" },
        { "kr": "샐러드에 토마토 들어있나요?", "en": "Are there tomatoes in the salad?", "hint": "tomatoes + the salad" },
        { "kr": "차에 흠집 하나 없었어.", "en": "There wasn’t a scratch on the car.", "hint": "a scratch + the car" },
        { "kr": "네 손가락에 반창고가 붙어 있어.", "en": "There’s a band-aid on your finger.", "hint": "a band-aid + your finger" },
        { "kr": "차에 티슈 있나요?", "en": "Is there a tissue in the car?", "hint": "a tissue + the car" },
        { "kr": "노트북에 스티커들이 붙어 있어.", "en": "There are stickers on the laptop.", "hint": "stickers + the laptop" },
        { "kr": "정수기 근처에 종이컵들이 있어요.", "en": "There are paper cups near the water dispenser.", "hint": "paper cups + the water dispenser" },
        { "kr": "케이크 위에 딸기들 있어?", "en": "Are there strawberries on the cake?", "hint": "strawberries + the cake" },
        { "kr": "웹사이트에 업데이트가 있었어요.", "en": "There was an update on the website.", "hint": "an update + the website" },
        { "kr": "벤치 근처에 쓰레기통이 없어.", "en": "There isn’t a trash can near the bench.", "hint": "a trash can + the bench" },
        { "kr": "사무실에 프린터 있나요?", "en": "Is there a printer in the office?", "hint": "a printer + the office" },
        { "kr": "강을 따라 나무들이 있어.", "en": "There are trees along the river.", "hint": "trees + the river" },
        { "kr": "쇼핑몰에서 행사가 있었어.", "en": "There was an event at the mall.", "hint": "an event + the mall" },
        { "kr": "연결에 문제가 있었나요?", "en": "Was there a problem with the connection?", "hint": "a problem + the connection" },
        { "kr": "과일 주변에 파리들이 꼬여 있어.", "en": "There are flies around the fruit.", "hint": "flies + the fruit" },
        { "kr": "수영장에 아이들이 있니?", "en": "Are there kids in the pool?", "hint": "kids + the pool" },
        { "kr": "지붕 위에 새가 한 마리 있어.", "en": "There’s a bird on the roof.", "hint": "a bird + the roof" },
        { "kr": "지하 1층에 서점이 있어요.", "en": "There is a bookstore on B1.", "hint": "a bookstore + B1" }
    ];

    let orderArray = [];       
    let orderPointer = -1;     
    let currentTask = { kr: '', en: '', hint: '' };
    let history = [];          
    let playMode = 'manual';
    let isHintEnabled = false; // 💡 초기 세팅 '힌트 끔'
    let autoTimer = null;

    function shuffleOrder() {
        orderArray = Array.from({length: allClaims.length}, (_, i) => i);
        for (let i = orderArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [orderArray[i], orderArray[j]] = [orderArray[j], orderArray[i]];
        }
        orderPointer = 0; 
    }

    function startTrainer() {
        document.getElementById('start-container').classList.add('hidden');
        document.getElementById('top-controls').classList.add('active');
        document.getElementById('action-area').classList.remove('hidden');
        document.getElementById('progress-counter').classList.add('active');
        
        const miniContainer = document.getElementById('lvl-container-mini');
        miniContainer.innerHTML = `<button class="lvl-btn" onclick="resetShuffleAndGenerate()">다시 섞기 🎲</button>`;
        
        shuffleOrder();
        generate();
    }

    function resetShuffleAndGenerate() {
        history = []; 
        shuffleOrder();
        generate();
    }

    function setHintMode(enabled) {
        isHintEnabled = enabled;
        document.getElementById('hint-off').className = `toggle-btn ${!enabled ? 'active' : ''}`;
        document.getElementById('hint-on').className = `toggle-btn ${enabled ? 'hint-active' : ''}`;
        
        const hintEl = document.getElementById('hint-text');
        if (enabled && currentTask.hint) {
            hintEl.classList.add('show');
        } else {
            hintEl.classList.remove('show');
        }
    }

    function setPlayMode(mode) {
        playMode = mode;
        document.getElementById('mode-manual').className = `toggle-btn ${mode === 'manual' ? 'active' : ''}`;
        document.getElementById('mode-auto').className = `toggle-btn ${mode === 'auto' ? 'active' : ''}`;
        
        const isAuto = (mode === 'auto');
        document.getElementById('manual-ans-btn').disabled = isAuto;
        document.getElementById('manual-next-btn').disabled = isAuto;
        document.getElementById('manual-ans-btn').style.opacity = isAuto ? "0.5" : "1";
        document.getElementById('manual-next-btn').style.opacity = isAuto ? "0.5" : "1";

        if (isAuto) {
            generate();
        } else {
            clearTimeout(autoTimer);
            updateProgressBar(0, 0);
        }
    }

    function generate() {
        clearTimeout(autoTimer);
        
        if (currentTask.kr) {
            history.push({...currentTask});
        }
        if (history.length > 50) history.shift();

        if (orderPointer >= orderArray.length || orderPointer < 0) {
            shuffleOrder();
        }

        const targetIndex = orderArray[orderPointer];
        currentTask = allClaims[targetIndex];
        
        updateDisplay();
        document.getElementById('progress-counter').innerText = `[ ${orderPointer + 1} / ${allClaims.length} ]`;
        
        orderPointer++;

        if (playMode === 'auto') {
            runAutoCycle();
        }
    }

    function runAutoCycle() {
        updateProgressBar(100, 5000);
        autoTimer = setTimeout(() => {
            showAnswer();
            updateProgressBar(100, 3000);
            autoTimer = setTimeout(() => {
                generate();
            }, 3000);
        }, 5000);
    }

    function updateProgressBar(width, duration) {
        const bar = document.getElementById('auto-progress');
        bar.style.transition = 'none';
        bar.style.width = '0%';
        if(duration > 0) {
            setTimeout(() => {
                bar.style.transition = `width ${duration}ms linear`;
                bar.style.width = '100%';
            }, 10);
        }
    }

    function goBack() {
        if (history.length === 0) return;
        if (playMode === 'auto') setPlayMode('manual');
        
        orderPointer--;
        if(orderPointer < 1) orderPointer = 1;

        currentTask = history.pop();
        updateDisplay();
        document.getElementById('progress-counter').innerText = `[ ${orderPointer - 1 || 1} / ${allClaims.length} ]`;
    }

    function updateDisplay() {
        document.getElementById('korean-task').innerText = currentTask.kr;
        
        const hintEl = document.getElementById('hint-text');
        if (currentTask.hint) {
            hintEl.innerText = `💡 단어 힌트: ${currentTask.hint}`;
            if (isHintEnabled) hintEl.classList.add('show');
            else hintEl.classList.remove('show');
        } else {
            hintEl.classList.remove('show');
        }

        const ans = document.getElementById('english-answer');
        ans.classList.remove('show');
        ans.innerText = currentTask.en;
    }

    function showAnswer() {
        document.getElementById('english-answer').classList.add('show');
    }

    const bannerMsgs = [{ icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" }, { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }];
    let currentBannerIdx = 0;
    setInterval(() => {
        currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
        const msg = bannerMsgs[currentBannerIdx];
        document.getElementById('banner-icon').innerText = msg.icon;
        document.getElementById('banner-title').innerText = msg.text;
    }, 4000);
</script>
