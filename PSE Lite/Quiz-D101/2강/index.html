<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>영어 관사 트레이너</title>
    <!-- Pretendard 폰트 불러오기 (CDN) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-blue: #1a365d;
            --btn-blue: #2b6cb0;
            --accent-green: #27ae60;
            --bg-gray: #f8f9fa;
        }

        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; background-color: var(--bg-gray); margin: 0; padding: 40px 0; color: #333; -webkit-font-smoothing: antialiased;
        }

        .card { 
            background: white; padding: 30px 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center; width: 95%; max-width: 500px; border: 1px solid #eee; position: relative; 
            display: flex; flex-direction: column; align-items: center;
        }
        
        .top-controls {
            display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 15px;
            order: 1;
        }
        .top-controls.active { display: flex; }

        h1 { 
            color: var(--primary-blue); font-size: 20px !important; margin: 10px 0 5px 0; 
            font-weight: 900; letter-spacing: -0.05em; line-height: 1.2; order: 2;
        }

        .progress-counter {
            font-size: 13px; font-weight: 700; color: #718096; margin-bottom: 15px; order: 2.5;
            background: #edf2f7; padding: 2px 10px; border-radius: 20px; display: none;
        }
        .progress-counter.active { display: inline-block; }

        #quiz-task-container { 
            width: 100%; order: 3; display: flex; flex-direction: column; gap: 10px; margin: 10px 0 15px 0;
        }
        
        .situation-text {
            font-size: 15px; font-weight: 600; color: #4a5568; line-height: 1.5;
            background: #ebf8ff; padding: 12px 16px; border-radius: 14px; text-align: left; 
            word-break: keep-all; overflow-wrap: break-word;
        }

        .sentence-text {
            font-size: 19px; font-weight: 800; color: #1a202c; line-height: 1.6;
            min-height: 60px; display: block; text-align: center;
            word-break: keep-all; 
            overflow-wrap: break-word; 
        }

        .blank-space {
            color: var(--btn-blue); border-bottom: 3px dashed var(--btn-blue);
            padding: 0 4px; margin: 0 4px; min-width: 55px; display: inline-block; text-align: center;
        }

        .start-container { order: 4; margin-bottom: 20px; }
        .lvl-btn { 
            background: var(--btn-blue); color: white; border: none; padding: 12px 32px; 
            border-radius: 50px; font-size: 15px; cursor: pointer; font-weight: 800; transition: all 0.2s; 
            box-shadow: 0 4px 12px rgba(43, 108, 176, 0.2);
        }
        .top-controls .lvl-btn { padding: 6px 14px; font-size: 12px; opacity: 0.9; box-shadow: 0 2px 8px rgba(43, 108, 176, 0.15); }
        .lvl-btn:active { transform: scale(0.95); }
        
        .options-grid {
            display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; width: 100%; order: 5; margin-top: 15px; margin-bottom: 10px;
        }
        .option-btn {
            background: #f7fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 14px 0;
            font-size: 13px; font-weight: 700; color: #4a5568; cursor: pointer; transition: all 0.2s;
            text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--btn-blue); background: #edf2f7; }
        .option-btn.correct { background: #27ae60 !important; color: white !important; border-color: #27ae60 !important; }
        .option-btn.wrong { background: #e74c3c !important; color: white !important; border-color: #e74c3c !important; }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.85; }

        .answer-container {
            min-height: 90px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; width: 100%; order: 6;
        }
        #feedback-box { 
            font-size: 14px; width: 100%; padding: 15px; border-radius: 12px; font-weight: 600; 
            line-height: 1.5; visibility: hidden; opacity: 0; transition: opacity 0.3s ease;
            text-align: left;
            word-break: keep-all; overflow-wrap: break-word;
        }
        #feedback-box.show { visibility: visible; opacity: 1; }
        #feedback-box.correct-style { background: #f0fff4; color: var(--accent-green); border: 1px solid #c6f6d5; }
        #feedback-box.wrong-style { background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }

        #action-area { order: 7; width: 100%; }
        .main-controls { display: flex; justify-content: center; gap: 8px; }
        .next-btn { background: #4a5568; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .next-btn:disabled { background: #cbd5e0; cursor: not-allowed; opacity: 0.6; }
        .back-btn { background: transparent; color: #adb5bd; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; border: 1px dashed #dee2e6; font-size: 13px; margin-top: 15px; width: 100%; }
        
        #result-area { width: 100%; order: 8; text-align: left; }
        .wrong-item { background: #fff5f5; border: 1px solid #fed7d7; padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="card">
    <div id="top-controls" class="top-controls">
        <div id="lvl-container-mini"></div>
        <div></div>
    </div>

    <h1>⚡ 영어 관사 트레이너</h1>

    <div id="progress-counter" class="progress-counter">[ 0 / 50 ]</div>
    
    <div id="quiz-task-container">
        <div class="situation-text hidden" id="situation-desc"></div>
        <div class="sentence-text" id="sentence-box">상황에 어울리는 관사를 찾아보세요</div>
    </div>
    
    <div id="start-container" class="start-container">
        <button id="btn-start-main" class="lvl-btn" onclick="startTrainer(false)">트레이닝 시작</button>
    </div>

    <div id="options-area" class="options-grid hidden">
        <button class="option-btn" onclick="submitAnswer('some / 없음')">some / 없음</button>
        <button class="option-btn" onclick="submitAnswer('a')">a</button>
        <button class="option-btn" onclick="submitAnswer('an')">an</button>
        <button class="option-btn" onclick="submitAnswer('the')">the</button>
    </div>

    <div class="answer-container">
        <div id="feedback-box"></div>
    </div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button id="manual-next-btn" class="next-btn" onclick="generate()" disabled>다음 상황 🎲</button>
        </div>
        <button id="manual-back-btn" class="back-btn" onclick="goBack()">이전 문장으로 되돌리기 ↩️</button>
    </div>

    <div id="result-area" class="hidden mt-2">
        <div class="bg-slate-100 p-4 rounded-2xl mb-4 text-center">
            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">최종 학습 성적 결과</div>
            <div class="text-3xl font-black text-slate-800" id="result-score">0 / 50</div>
            <div class="text-sm font-semibold text-blue-600 mt-2" id="result-comment"></div>
        </div>
        <div id="wrong-summary-list" class="max-h-64 overflow-y-auto mb-4 pr-1"></div>
        <div class="flex gap-2">
            <button id="retry-wrong-btn" class="lvl-btn flex-1 rounded-xl py-3 shadow-none bg-rose-600 hover:bg-rose-700 font-bold" onclick="startTrainer(true)">틀린 문제만 다시 풀기 🔄</button>
            <button class="lvl-btn flex-1 rounded-xl py-3 shadow-none bg-slate-600 hover:bg-slate-700 font-bold" onclick="resetShuffleAndGenerate()">전체 다시 풀기 🎲</button>
        </div>
    </div>
</div>

<script>
    const allClaims = [
        { sit: "방 안이 너무 덥다며 벽면에 고정되어 있는 에어컨을 켜달라고 가족에게 요구합니다.", eng: "Could you turn on [ ] air conditioner?", ans: "the", ansType: "the", comment: "대화 당사자들이 머무는 공간 내에 서로 알고 있는 특정한 에어컨을 가리키므로 정관사 'the'가 정확합니다." },
        { sit: "생일 선물로 받은 박스를 뜯어보니 최고급 만년필 한 자루가 들어있습니다.", eng: "Inside the box, there was [ ] expensive fountain pen.", ans: "an", ansType: "an", comment: "이야기 흐름상 처음 꺼내어 언급하는 셀 수 있는 명사이며, 모음 발음(expensive)으로 시작하므로 'an'이 정답입니다." },
        { sit: "카페에서 노트북을 충전하려는데 플러그를 꽂을 벽면 콘센트가 하나도 안 보입니다.", eng: "I can't find [ ] outlet in this corner.", ans: "an", ansType: "an", comment: "방 내부 코너에 있는 불특정한 하나의 콘센트를 의미하며, 모음(outlet) 사운드 앞이므로 'an'이 맞습니다." },
        { sit: "친구가 맛이 이상하다며 건네준 국을 먹고 소금이 더 필요하겠다고 말합니다.", eng: "I think this soup needs [ ] salt.", ans: "some / 없음", ansType: "both", comment: "✨ [some / 없음 둘 다 정답인정] 수량을 가볍게 한정해 주는 'some salt'와 물질명사 성격 그대로 쓰는 'salt' 모두 원어민들이 똑같이 즐겨 씁니다." },
        { sit: "공항에 마중 나와 준 친구에게 고마움을 표하며 우리가 탈 차가 어디 주차되어 있는지 물어봅니다.", eng: "Where did you park [ ] car?", ans: "the", ansType: "the", comment: "동료나 친구가 운전하고 와서 공항에 대어놓은 바로 '그 차'라는 명확한 공유 대상이 있으므로 'the'를 써야 합니다." },
        { sit: "동네에 새로 오픈해서 요즘 난리 난 '그 특정 이탈리아 레스토랑'에 이번 주말에 꼭 가보자고 제안합니다.", eng: "Let's go to [ ] new Italian restaurant this Saturday.", ans: "the", ansType: "the", comment: "특정하여 소문이 나고 서로 인지하고 있는 '바로 그 대상 식당'을 가리키므로 정관사 'the'가 알맞습니다." },
        { sit: "매일 건강을 위해 아침 공복에 따뜻한 물을 한 컵 마신다고 습관을 공유합니다.", eng: "I drink [ ] warm water every single morning.", ans: "some / 없음", ansType: "both", comment: "✨ [some / 없음 둘 다 정답인정] 매일 반복되는 일반적 습관이므로 관사가 없는 명사 본래 형태나, 수량을 약간 가미한 'some' 둘 다 통용됩니다." },
        { sit: "우연히 들른 편집숍에서 정말 마음에 쏙 드는 유니크한 가죽 지갑을 발견했습니다.", eng: "I found [ ] unique wallet at the store.", ans: "a", ansType: "a", comment: "unique의 첫 발음은 스펠링과 달리 모음이 아닌 반자음([j]) 계열의 '유' 사운드이므로 'an'이 아니라 'a'를 씁니다." },
        { sit: "지구는 태양 주위를 돌고 있다고 자연계의 유일무이한 대상에 대해 이야기합니다.", eng: "The Earth revolves around [ ] sun.", ans: "the", ansType: "the", comment: "태양(sun)은 이 세상 천체 공간에 단 하나만 규정되어 존재하는 유일명사이므로 규칙상 무조건 'the'를 붙입니다." },
        { sit: "출근길 지하철에 사람이 너무 많아서 완전히 숨이 막힐 뻔했다고 토로합니다.", eng: "There were too many people on [ ] subway today.", ans: "the", ansType: "the", comment: "우리가 보편적으로 출퇴근 시 탑승하는 공공 교통수단(subway, bus 등)을 언급할 때는 관용적으로 'the'와 결합합니다." },
        { sit: "친구가 취미를 묻자, 스트레스 해소를 위해 가끔 악기인 드럼을 연주한다고 답합니다.", eng: "I love playing [ ] drums when I'm stressed.", ans: "the", ansType: "the", comment: "악기를 다루거나 연주한다는 행위 표현(play) 구문에서는 악기 명칭 앞에 정관사 'the'를 동반하는 것이 원칙입니다." },
        { sit: "집에 오는 길에 길바닥에서 누군가 잃어버린 정체불명의 현금 뭉치를 발견했습니다.", eng: "I just found [ ] money on the sidewalk.", ans: "some / 없음", ansType: "some", comment: "✨ [some 이 더 적절] 돈은 셀 수 없는 명사이며, 길에서 '얼마간의 액수(약간의 현금)'를 주웠다는 의미 흐름이므로 'some'이 매끄럽습니다." },
        { sit: "면접장 입구에서 잔뜩 긴장하고 있는 지원자에게 깊게 숨을 한 번 들이쉬라고 권합니다.", eng: "Take [ ] deep breath before you go in.", ans: "a", ansType: "a", comment: "가산적인 성격을 갖는 신체 동작 단위 명사이므로 자음 글자구조 앞에 부정관사 'a'가 알맞습니다." },
        { sit: "가족끼리 거실에 모여 앉아 매일 고정된 시간에 방송하는 TV 뉴스를 시청하기 시작합니다.", eng: "Let's watch [ ] 8 o'clock news together.", ans: "the", ansType: "the", comment: "저녁 8시에 정해진 타이틀로 방영되는 특정한 방송 프로그램 뉴스를 명시하므로 'the'를 사용하는 것이 맞습니다." },
        { sit: "마트에 가기 전 냉장고를 열어보니 요리에 쓸 신선한 달걀들이 좀 필요한 상태입니다.", eng: "We need to buy [ ] eggs for dinner.", ans: "some / 없음", ansType: "some", comment: "✨ [some 이 더 적절] 셀 수 있는 복수형태 명사(eggs) 앞에 구체적 개수는 정하지 않고 '몇 개(약간)'를 사고자 할 때는 'some'이 가장 어울립니다." },
        { sit: "상대방의 의견을 끝까지 경청한 뒤, 그것이 아주 완벽하고 논리적인 설명이라고 맞장구칩니다.", eng: "That is [ ] perfect explanation.", ans: "a", ansType: "a", comment: "상대의 주장이 훌륭한 여러 설명의 사례 중 '하나'에 속한다는 화자의 개인적 주관 평가이므로 부정관사 'a'가 적절합니다." },
        { sit: "약속 장소에 늦은 동료가 숨을 헐떡이며 역 근처에서 심각한 사고가 있었다고 변명합니다.", eng: "Sorry, there was [ ] accident near the station.", ans: "an", ansType: "an", comment: "새롭게 알려주는 단수 사건 명사이며, 첫 알파벳 발음이 모음 사운드([애])로 출발하기에 'an'이 정답입니다." },
        { sit: "아이에게 구름 한 점 없는 맑은 밤하늘의 둥근 달을 가리키며 보라고 말합니다.", eng: "Look at [ ] bright moon in the sky.", ans: "the", ansType: "the", comment: "지구 하늘 공간에 유일한 형태로 시각화되어 있는 대상인 달(moon)을 공유하므로 무조건 정관사 'the'가 결합합니다." },
        { sit: "직업을 묻는 처음 본 사람에게 본인은 초등학교에서 아이들을 가르치는 교사라고 소개합니다.", eng: "I work as [ ] teacher at an elementary school.", ans: "a", ansType: "a", comment: "사회적인 일반 신분이나 대외적인 직업군 정보를 최초로 서술하여 설명할 때는 부정관사 'a'를 채택합니다." },
        { sit: "상대방이 약속 장소를 헤매자, 자신이 근처에 있는 우체국 앞에 서 있겠다고 위치를 고정합니다.", eng: "I'll be waiting for you right in front of [ ] post office.", ans: "the", ansType: "the", comment: "마을 인프라 내부에서 상호 간에 특정 건물 지목이 가능한 공공 편의시설물 앞에는 통상적으로 'the'를 사용합니다." },
        { sit: "친구가 가져온 수제 쿠키를 한 입 맛보고 단맛을 내는 설탕이 들어간 게 맞는지 묻습니다.", eng: "Did you forget to put [ ] sugar in this?", ans: "some / 없음", ansType: "both", comment: "✨ [some / 없음 둘 다 정답인정] 요리 배합 목적의 수량감을 뜻하는 'some sugar'와 설탕 물질 자체인 'sugar' 모두 흠잡을 데 없이 완벽합니다." },
        { sit: "업무 효율을 극대화하기 위해 매일 새벽 5시에 기상하는 일찍 일어나는 사람이 되기로 결심합니다.", eng: "I decided to become [ ] early bird from now on.", ans: "an", ansType: "an", comment: "특정 행동 성향을 지닌 한 명의 가산적 인물 개체를 명시하며, 모음(early) 발음 앞단이므로 'an'이 완벽한 정답입니다." },
        { sit: "바닥에 유리를 엎지른 아이에게 위험하니 발밑의 바닥을 조심하라고 주의를 줍니다.", eng: "Don't move. There is broken glass on [ ] floor.", ans: "the", ansType: "the", comment: "현재 대화가 진행 중인 건물 실내 조형 구조물 중 공유되는 '그 방의 바닥면'을 뜻하므로 정관사 'the'의 자리입니다." },

    let orderArray = [];

    function shuffleCustomPool(pool) {
        let indices = Array.from({length: pool.length}, (_, i) => i);
        for (let i = indices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        return indices;
    }

    function startTrainer(isWrongReview = false) {
        document.getElementById('start-container').classList.add('hidden');
        document.getElementById('result-area').classList.add('hidden');
        document.getElementById('top-controls').classList.add('active');
        document.getElementById('options-area').classList.remove('hidden');
        document.getElementById('action-area').classList.remove('hidden');
        document.getElementById('progress-counter').classList.add('active');
        document.getElementById('situation-desc').classList.remove('hidden'); 
        
        document.getElementById('lvl-container-mini').innerHTML = 
            `<button class="lvl-btn" onclick="resetShuffleAndGenerate()">다시 섞기 🎲</button>`;
        
        if (isWrongReview) {
            activePool = [...wrongQuestions]; 
        } else {
            activePool = [...allClaims];      
        }

        wrongQuestions = []; 
        currentCorrectCount = 0;
        totalInRound = activePool.length;

        orderArray = shuffleCustomPool(activePool);
        orderPointer = 0;
        
        generate();
    }

    function resetShuffleAndGenerate() {
        historyStack = [];
        startTrainer(false);
    }

    function generate() {
        resetOptionColors();
        
        if (currentTask.sit) {
            historyStack.push({...currentTask});
        }
        if (historyStack.length > 30) historyStack.shift();

        if (orderPointer >= totalInRound) {
            finishQuizRound();
            return;
        }

        const targetIndex = orderArray[orderPointer];
        currentTask = activePool[targetIndex];
        
        updateDisplay();
        document.getElementById('progress-counter').innerText = `[ ${orderPointer + 1} / ${totalInRound} ]`;
        
        orderPointer++;

        document.getElementById('manual-next-btn').disabled = true;
        toggleOptionsDisabled(false);
    }

    function submitAnswer(userChoice) {
        const correctVal = currentTask.ans; 
        const ansType = currentTask.ansType;
        const buttons = document.querySelectorAll('.option-btn');
        const fb = document.getElementById('feedback-box');

        toggleOptionsDisabled(true); 

        let isCorrect = false;
        if (userChoice === 'some / 없음' && (ansType === 'some' || ansType === 'none' || ansType === 'both')) {
            isCorrect = true;
        } else if (userChoice === correctVal) {
            isCorrect = true;
        }

        buttons.forEach(btn => {
            const btnText = btn.innerText.trim();
            if (btnText === correctVal) {
                btn.classList.add('correct'); 
            }
            if (btnText === userChoice && !isCorrect) {
                btn.classList.add('wrong'); 
            }
        });

        const filledSentence = currentTask.eng.replace("[ ]", `<span class="${isCorrect ? 'text-emerald-600' : 'text-rose-600'} underline font-black mx-1">${ansType === 'none' ? '' : correctVal === 'some / 없음' ? 'some' : correctVal}</span>`);
        document.getElementById('sentence-box').innerHTML = filledSentence;

        if (isCorrect) {
            currentCorrectCount++;
            fb.className = "show feedback-box correct-style";
            fb.innerText = `⭕ 정답입니다!\n💡 해설: ${currentTask.comment}`;
        } else {
            wrongQuestions.push({...currentTask});
            fb.className = "show feedback-box wrong-style";
            fb.innerText = `❌ 오답입니다. 정답 범위: [ ${correctVal} ]\n💡 해설: ${currentTask.comment}`;
        }

        document.getElementById('manual-next-btn').disabled = false;
    }

                    <div class="text-slate-700 font-semibold text-xs mb-1 bg-white/60 p-1.5 rounded-md border border-rose-100">${item.sit}</div>
                    <div class="font-bold text-slate-800 text-sm tracking-wide mb-1">${visualSentence}</div>
                    <div class="text-xs text-slate-500 font-medium bg-slate-50 p-2 rounded border border-slate-200 mt-1">정답 근거: ${item.comment}</div>
                `;
                summaryList.appendChild(itemDiv);
            });
        }
    }

    function goBack() {
        if (historyStack.length === 0) return;
        
        orderPointer--;
        if(orderPointer < 1) orderPointer = 1;

        currentTask = historyStack.pop();
        
        if (wrongQuestions.length > 0 && wrongQuestions[wrongQuestions.length - 1].eng === currentTask.eng) {
            wrongQuestions.pop();
        }

        resetOptionColors();
        toggleOptionsDisabled(false);
        updateDisplay();
        
        document.getElementById('progress-counter').innerText = `[ ${orderPointer} / ${totalInRound} ]`;
        document.getElementById('manual-next-btn').disabled = true;
    }

    function updateDisplay() {
        document.getElementById('situation-desc').innerText = currentTask.sit;
        const styledSentence = currentTask.eng.replace("[ ]", '<span class="blank-space">______</span>');
        document.getElementById('sentence-box').innerHTML = styledSentence;
        
        const fb = document.getElementById('feedback-box');
        fb.className = "";
        fb.innerText = "";
    }

    function resetOptionColors() {
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.className = "option-btn";
        });
    }

    function toggleOptionsDisabled(status) {
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.disabled = status;
        });
    }
</script>

</body>
</html>
