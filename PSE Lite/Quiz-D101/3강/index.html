<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Core Pattern Trainer v2.0</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-blue: #1a365d;
            --btn-blue: #2b6cb0;
            --accent-green: #27ae60;
            --bg-gray: #f8f9fa;
        }

        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; background-color: var(--bg-gray); margin: 0; padding: 40px 0; color: #333; -webkit-font-smoothing: antialiased;
        }

        .card { 
            background: white; padding: 30px 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center; width: 95%; max-width: 500px; border: 1px solid #eee; position: relative; 
            display: flex; flex-direction: column; align-items: center;
        }
        
        .top-controls {
            display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 15px;
            order: 1;
        }
        .top-controls.active { display: flex; }

        h1 { 
            color: var(--primary-blue); font-size: 20px !important; margin: 10px 0 5px 0; 
            font-weight: 900; letter-spacing: -0.05em; line-height: 1.2; order: 2;
        }

        .progress-counter {
            font-size: 13px; font-weight: 700; color: #718096; margin-bottom: 15px; order: 2.5;
            background: #edf2f7; padding: 3px 12px; border-radius: 20px; display: none;
        }
        .progress-counter.active { display: inline-block; }

        /* 한국어 문제 영역 박스 */
        .task-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 10px 0 15px 0; min-height: 130px; width: 100%; order: 3; padding: 0 10px;
        }

        /* 4대 지정 분류에 최적화된 독립 카테고리 뱃지 */
        .hint-badge {
            font-size: 12px; font-weight: 800; color: #4c51bf;
            background: #e0e7ff; padding: 4px 14px; border-radius: 20px;
            border: 1px solid #c7d2fe; margin-bottom: 8px; visibility: hidden; opacity: 0;
            transition: opacity 0.2s ease;
        }
        .hint-badge.active { visibility: visible; opacity: 1; }

        #korean-task { 
            font-size: 19px; font-weight: 700; color: #2d3748; line-height: 1.6; 
            word-break: keep-all; text-align: center; letter-spacing: -0.02em;
        }

        .start-container { order: 4; margin-bottom: 20px; }
        .lvl-btn { 
            background: var(--btn-blue); color: white; border: none; padding: 12px 32px; 
            border-radius: 50px; font-size: 15px; cursor: pointer; font-weight: 800; transition: all 0.2s; 
            box-shadow: 0 4px 12px rgba(43, 108, 176, 0.2);
        }
        .top-controls .lvl-btn { padding: 6px 14px; font-size: 12px; opacity: 0.9; box-shadow: 0 2px 8px rgba(43, 108, 176, 0.15); }
        .lvl-btn:active { transform: scale(0.95); }

        .auto-toggle {
            display: flex; align-items: center; gap: 5px; background: #eee; padding: 4px; border-radius: 12px;
        }
        .toggle-btn {
            padding: 4px 10px; font-size: 11px; border-radius: 8px; cursor: pointer; font-weight: 700; border: none; color: #868e96;
        }
        .toggle-btn.active { background: var(--primary-blue); color: white; }
        
        .answer-container {
            min-height: 90px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; width: 100%; order: 5;
        }

        #english-answer { 
            font-size: 16px; color: var(--accent-green); width: 100%; padding: 15px; 
            background: #f0fff4; border-radius: 12px; border: 1px solid #c6f6d5; font-weight: 600; 
            line-height: 1.5; visibility: hidden; opacity: 0; transition: opacity 0.3s ease;
        }
        #english-answer.show { visibility: visible; opacity: 1; }

        #action-area { order: 6; width: 100%; }
        .main-controls { display: flex; justify-content: center; gap: 8px; }
        .ans-btn { background: var(--btn-blue); color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .next-btn { background: #4a5568; color: white; flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; border:none; font-size: 15px; }
        .back-btn { background: transparent; color: #adb5bd; padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer; border: 1px dashed #dee2e6; font-size: 13px; margin-top: 15px; width: 100%; }
        
        .hidden { display: none !important; }
        #banner-container { order: 7; }

        #auto-progress {
            width: 0%; height: 4px; background: #f59e0b; position: absolute; top: 0; left: 0; border-radius: 24px 24px 0 0; transition: width 0.1s linear;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="auto-progress"></div>

    <div id="top-controls" class="top-controls">
        <div id="lvl-container-mini"></div>
        <div class="auto-toggle">
            <button id="mode-manual" class="toggle-btn active" onclick="setPlayMode('manual')">수동</button>
            <button id="mode-auto" class="toggle-btn" onclick="setPlayMode('auto')">자동</button>
        </div>
    </div>

    <h1>⚡ 실전 필수 문형 변형 트레이너</h1>

    <div id="progress-counter" class="progress-counter">[ 0 / 240 ]</div>
    
    <!-- 한국어 문제 블록 내에 한눈에 보이는 카테고리 배치 -->
    <div class="task-container">
        <div id="hint-badge" class="hint-badge">대기중</div>
        <div id="korean-task">입으로 소리 내어 훈련하세요! 🗣️</div>
    </div>
    
    <div id="start-container" class="start-container">
        <button id="btn-start-main" class="lvl-btn" onclick="startTrainer()">트레이닝 시작</button>
    </div>

    <div class="answer-container">
        <div id="english-answer"></div>
    </div>
    
    <div id="action-area" class="control-group hidden">
        <div class="main-controls">
            <button id="manual-ans-btn" class="ans-btn" onclick="showAnswer()">정답 확인 👀</button>
            <button id="manual-next-btn" class="next-btn" onclick="generate()">다음 상황 🎲</button>
        </div>
        <button class="back-btn" onclick="goBack()">이전 문장으로 되돌리기 ↩️</button>
    </div>

    <div id="banner-container" class="promo-banner bg-white border border-blue-50 p-3 rounded-[1.5rem] mt-10 cursor-pointer shadow-lg transition-all active:scale-95 w-full max-w-sm mx-auto"

</div>

    let orderArray = [];       
    let orderPointer = -1;     
    let currentTask = { kr: '', en: '', cat: '' }; 
    let history = [];          
    let playMode = 'manual';
    let autoTimer = null;

    function shuffleOrder() {
        orderArray = Array.from({length: allClaims.length}, (_, i) => i);
        for (let i = orderArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [orderArray[i], orderArray[j]] = [orderArray[j], orderArray[i]];
        }
        orderPointer = 0; 
    }

    function startTrainer() {
        document.getElementById('start-container').classList.add('hidden');
        document.getElementById('top-controls').classList.add('active');
        document.getElementById('action-area').classList.remove('hidden');
        document.getElementById('progress-counter').classList.add('active');
        
        const miniContainer = document.getElementById('lvl-container-mini');
        miniContainer.innerHTML = `<button class="lvl-btn" onclick="resetShuffleAndGenerate()">다시 섞기 🎲</button>`;
        
        shuffleOrder();
        generate();
    }

    function resetShuffleAndGenerate() {
        history = []; 
        shuffleOrder();
        generate();
    }

    function setPlayMode(mode) {
        playMode = mode;
        document.getElementById('mode-manual').className = `toggle-btn ${mode === 'manual' ? 'active' : ''}`;
        document.getElementById('mode-auto').className = `toggle-btn ${mode === 'auto' ? 'active' : ''}`;
        
        const isAuto = (mode === 'auto');
        document.getElementById('manual-ans-btn').disabled = isAuto;
        document.getElementById('manual-next-btn').disabled = isAuto;
        document.getElementById('manual-ans-btn').style.opacity = isAuto ? "0.5" : "1";
        document.getElementById('manual-next-btn').style.opacity = isAuto ? "0.5" : "1";

        if (isAuto) {
            generate();
        } else {
            clearTimeout(autoTimer);
            updateProgressBar(0, 0);
        }
    }

    function generate() {
        clearTimeout(autoTimer);
        
        if (currentTask.kr) {
            history.push({...currentTask});
        }
        if (history.length > 50) history.shift();

        if (orderPointer >= orderArray.length || orderPointer < 0) {
            shuffleOrder();
        }

        const targetIndex = orderArray[orderPointer];
        currentTask = allClaims[targetIndex];
        
        updateDisplay();
        document.getElementById('progress-counter').innerText = `[ ${orderPointer + 1} / ${allClaims.length} ]`;
        
        const badge = document.getElementById('hint-badge');
        badge.innerText = currentTask.cat;
        badge.classList.add('active');
        
        orderPointer++;

        if (playMode === 'auto') {
            runAutoCycle();
        }
    }

    function runAutoCycle() {
        updateProgressBar(100, 5000);
        autoTimer = setTimeout(() => {
            showAnswer();
            updateProgressBar(100, 3000);
            autoTimer = setTimeout(() => {
                generate();
            }, 3000);
        }, 5000);
    }

    function updateProgressBar(width, duration) {
        const bar = document.getElementById('auto-progress');
        bar.style.transition = 'none';
        bar.style.width = '0%';
        if(duration > 0) {
            setTimeout(() => {
                bar.style.transition = `width ${duration}ms linear`;
                bar.style.width = '100%';
            }, 10);
        }
    }

    function goBack() {
        if (history.length === 0) return;
        if (playMode === 'auto') setPlayMode('manual');
        
        orderPointer--;
        if(orderPointer < 1) orderPointer = 1;

        currentTask = history.pop();
        updateDisplay();
        document.getElementById('progress-counter').innerText = `[ ${orderPointer - 1 || 1} / ${allClaims.length} ]`;
        
        const badge = document.getElementById('hint-badge');
        badge.innerText = currentTask.cat;
        badge.classList.add('active');
    }

    function updateDisplay() {
        document.getElementById('korean-task').innerText = currentTask.kr;
        const ans = document.getElementById('english-answer');
        ans.classList.remove('show');
        ans.innerText = currentTask.en;
    }

    function showAnswer() {
        document.getElementById('english-answer').classList.add('show');
    }

    const bannerMsgs = [{ icon: "🔥", text: "하루 1분 투자! 실전 패턴 Pop!" }, { icon: "🎬", text: "미드 보면서 실전 영어 패턴도 Pop!" }];
    let currentBannerIdx = 0;
    setInterval(() => {
        currentBannerIdx = (currentBannerIdx + 1) % bannerMsgs.length;
        const msg = bannerMsgs[currentBannerIdx];
        document.getElementById('banner-icon').innerText = msg.icon;
        document.getElementById('banner-title').innerText = msg.text;
    }, 4000);
</script>

</body>
</html>
