<!DOCTYPE html>
<html lang="ko">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamma 201 셀프사다리 모음</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 500px;
            width: 100%;
        }
        @media (max-width: 400px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
        .btn {
            background-color: #673AB7; /* Gamma 201 구분을 위한 보라색 테마 */
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        .btn:hover {
            background-color: #5e35b1;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <h1>Gamma 201 셀프사다리</h1>
